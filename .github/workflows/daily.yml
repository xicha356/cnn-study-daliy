name: 每日CNN精读自动生成

on:
  schedule:
    # 周一到周五 北京时间 07:30 = UTC 23:30 (前一天)
    - cron: '30 23 * * 0-4'
    # 周六北京时间 07:30 再跑一次，自动回退到周五内容
    - cron: '30 23 * * 5'

  workflow_dispatch:
    inputs:
      date:
        description: '指定日期 YYYY-MM-DD（留空=自动找最近工作日）'
        required: false
        default: ''
      force_regenerate:
        description: '是否忽略已有缓存并重新生成'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

concurrency:
  group: daily-cnn-generate
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: 检出 main 分支
        uses: actions/checkout@v5
        with:
          ref: main

      - name: 设置 Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 设置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: 设置 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: 安装依赖
        run: |
          pip install requests
          pnpm install --frozen-lockfile

      - name: 生成学习内容
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ vars.ELEVENLABS_VOICE_ID || 'pNInz6obpgDQGcFmaJgB' }}
          ELEVENLABS_MODEL_ID: ${{ vars.ELEVENLABS_MODEL_ID || 'eleven_flash_v2_5' }}
          TARGET_DATE: ${{ github.event.inputs.date }}
          FORCE_REGENERATE: ${{ github.event.inputs.force_regenerate }}
          MAX_VOCAB_ITEMS: ${{ vars.MAX_VOCAB_ITEMS || '50' }}
          MIN_SENTENCE_ITEMS: ${{ vars.MIN_SENTENCE_ITEMS || '20' }}
          MAX_SENTENCE_ITEMS: ${{ vars.MAX_SENTENCE_ITEMS || '30' }}
          DEEPSEEK_MAX_TOKENS: ${{ vars.DEEPSEEK_MAX_TOKENS || '8192' }}
        run: python src/generate.py

      - name: 准备 Next.js 静态数据
        run: |
          pnpm prepare:data
          pnpm validate:data

      - name: 提交并触发 Vercel 生产部署
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ public/data/ public/audio/
          git diff --staged --quiet && exit 0
          git commit -m "📚 $(date +'%Y-%m-%d') Vercel CNN精读内容"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: 部署 PC 到 Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_AUTH_JSON_B64: ${{ secrets.VERCEL_AUTH_JSON_B64 }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID || 'team_1bo68GKRsXoT2DiPBWHiD9NK' }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_WEB_PROJECT_ID || 'prj_3cUbNdsi38fSX0bPXoZ5LZ8jOW6B' }}
        run: |
          VERCEL_AUTH_FLAGS=()
          if [ -n "$VERCEL_AUTH_JSON_B64" ]; then
            VERCEL_AUTH_DIR="$RUNNER_TEMP/vercel-auth-web"
            mkdir -p "$VERCEL_AUTH_DIR"
            printf '%s' "$VERCEL_AUTH_JSON_B64" | base64 -d > "$VERCEL_AUTH_DIR/auth.json"
            VERCEL_AUTH_FLAGS=(--global-config "$VERCEL_AUTH_DIR")
            unset VERCEL_TOKEN
          elif [ -n "$VERCEL_TOKEN" ]; then
            VERCEL_AUTH_FLAGS=(--token "$VERCEL_TOKEN")
          else
            echo "::warning::未配置 VERCEL_AUTH_JSON_B64 或 VERCEL_TOKEN，跳过 PC Vercel 自动部署。"
            exit 0
          fi
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > .vercel/project.json
          pnpm dlx vercel@54.10.2 pull --yes --environment production "${VERCEL_AUTH_FLAGS[@]}" -A vercel.web.json
          pnpm dlx vercel@54.10.2 build --prod --yes "${VERCEL_AUTH_FLAGS[@]}" -A vercel.web.json
          pnpm dlx vercel@54.10.2 deploy --prebuilt --prod --yes "${VERCEL_AUTH_FLAGS[@]}" -A vercel.web.json

      - name: 部署 H5 到 Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_AUTH_JSON_B64: ${{ secrets.VERCEL_AUTH_JSON_B64 }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID || 'team_1bo68GKRsXoT2DiPBWHiD9NK' }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_H5_PROJECT_ID || 'prj_WHlzXhnhB5UjiJOoOOoS9yhyEq0T' }}
        run: |
          VERCEL_AUTH_FLAGS=()
          if [ -n "$VERCEL_AUTH_JSON_B64" ]; then
            VERCEL_AUTH_DIR="$RUNNER_TEMP/vercel-auth-h5"
            mkdir -p "$VERCEL_AUTH_DIR"
            printf '%s' "$VERCEL_AUTH_JSON_B64" | base64 -d > "$VERCEL_AUTH_DIR/auth.json"
            VERCEL_AUTH_FLAGS=(--global-config "$VERCEL_AUTH_DIR")
            unset VERCEL_TOKEN
          elif [ -n "$VERCEL_TOKEN" ]; then
            VERCEL_AUTH_FLAGS=(--token "$VERCEL_TOKEN")
          else
            echo "::warning::未配置 VERCEL_AUTH_JSON_B64 或 VERCEL_TOKEN，跳过 H5 Vercel 自动部署。"
            exit 0
          fi
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > .vercel/project.json
          pnpm dlx vercel@54.10.2 pull --yes --environment production "${VERCEL_AUTH_FLAGS[@]}" -A vercel.h5.json
          pnpm dlx vercel@54.10.2 build --prod --yes "${VERCEL_AUTH_FLAGS[@]}" -A vercel.h5.json
          pnpm dlx vercel@54.10.2 deploy --prebuilt --prod --yes "${VERCEL_AUTH_FLAGS[@]}" -A vercel.h5.json
