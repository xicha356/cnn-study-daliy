name: 每日CNN精读自动生成

on:
  schedule:
    # 周一到周五 北京时间 07:30 = UTC 23:30 (前一天)
    - cron: '30 23 * * 0-4'
    # 周六北京时间 07:30 再跑一次，自动回退到周五内容
    - cron: '30 23 * * 5'

  workflow_dispatch:
    inputs:
      date:
        description: '指定日期 YYYY-MM-DD（留空=自动找最近工作日）'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: daily-cnn-generate
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: 检出 Vercel 生产分支
        uses: actions/checkout@v5
        with:
          ref: nextjs-main

      - name: 设置 Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 设置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: 设置 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: 安装依赖
        run: |
          pip install requests
          pnpm install --frozen-lockfile

      - name: 生成学习内容
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ vars.ELEVENLABS_VOICE_ID || 'pNInz6obpgDQGcFmaJgB' }}
          ELEVENLABS_MODEL_ID: ${{ vars.ELEVENLABS_MODEL_ID || 'eleven_flash_v2_5' }}
          TARGET_DATE: ${{ github.event.inputs.date }}
        run: python src/generate.py

      - name: 准备 Next.js 静态数据
        run: |
          pnpm prepare:data
          pnpm validate:data

      - name: 提交并触发 Vercel 生产部署
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ public/data/ public/audio/
          git diff --staged --quiet && exit 0
          git commit -m "📚 $(date +'%Y-%m-%d') Vercel CNN精读内容"
          git pull --rebase origin nextjs-main
          git push origin HEAD:nextjs-main
