name: 每日CNN精读自动生成

on:
  schedule:
    # 周一到周五 北京时间 07:30 = UTC 23:30 (前一天)
    - cron: '30 23 * * 0-4'
    # 周一 07:30 补上周五内容（UTC周一 = 北京周一早上）
    # 上面 0-4 已覆盖周日UTC=周一北京，实际周末不会有新内容
    # 保险起见额外加一条：周六UTC(=周六北京下午)也跑一次，自动回退到周五
    - cron: '30 23 * * 5'

  workflow_dispatch:
    inputs:
      date:
        description: '指定日期 YYYY-MM-DD（留空=自动找最近工作日）'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests

      - name: 生成学习内容
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TARGET_DATE: ${{ github.event.inputs.date }}
        run: python src/generate.py

      - name: 重建前端页面
        run: python src/build_index.py

      - name: 提交推送
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ index.html
          git diff --staged --quiet || git commit -m "📚 $(date +'%Y-%m-%d') CNN精读内容"
          git push
