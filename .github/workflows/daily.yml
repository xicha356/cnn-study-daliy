name: 每日CNN精读自动生成

on:
  schedule:
    # 北京时间每天早上 7:00 = UTC 23:00 (前一天)
    - cron: '0 23 * * *'

  # 允许手动触发（在 GitHub Actions 页面点 Run workflow）
  workflow_dispatch:
    inputs:
      date:
        description: '指定日期 (YYYY-MM-DD)，留空则使用今天'
        required: false
        default: ''

permissions:
  contents: write   # 允许推送生成的文件到仓库

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests python-dotenv

      - name: 生成今日学习内容
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TARGET_DATE: ${{ github.event.inputs.date }}
        run: python src/generate.py

      - name: 重建前端索引
        run: python src/build_index.py

      - name: 提交并推送生成的文件
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ index.html
          git diff --staged --quiet || git commit -m "📚 自动生成 $(date +'%Y-%m-%d') CNN精读内容"
          git push
