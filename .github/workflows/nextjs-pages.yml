name: Next.js 双端部署

on:
  workflow_dispatch:
    inputs:
      date:
        description: '指定日期 YYYY-MM-DD（留空=自动找最近工作日）'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: nextjs-cnn-study-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v5

      - name: 设置 Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 设置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: 设置 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: 安装依赖
        run: |
          pip install requests
          pnpm install --frozen-lockfile

      - name: 生成学习内容
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ vars.ELEVENLABS_VOICE_ID || 'pNInz6obpgDQGcFmaJgB' }}
          ELEVENLABS_MODEL_ID: ${{ vars.ELEVENLABS_MODEL_ID || 'eleven_flash_v2_5' }}
          TARGET_DATE: ${{ github.event.inputs.date }}
        run: python src/generate.py

      - name: 准备 Next.js 静态数据
        run: |
          pnpm prepare:data
          pnpm validate:data

      - name: 检查并构建
        run: |
          pnpm type-check
          pnpm lint
          pnpm build:pages

      - name: 保存生成内容
        continue-on-error: true
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ public/data/ public/audio/
          git diff --staged --quiet && exit 0
          git commit -m "📚 $(date +'%Y-%m-%d') Next.js CNN精读内容"
          git pull --rebase origin nextjs-main
          git push origin HEAD:nextjs-main

      - name: 上传 Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: 发布到 gh-pages 分支
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf /tmp/cnn-study-pages
          mkdir -p /tmp/cnn-study-pages
          cp -R dist/. /tmp/cnn-study-pages/
          cd /tmp/cnn-study-pages
          git init
          git checkout -b gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy Next.js study pages"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages

      - name: 尝试切换 Pages 源到 gh-pages
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -fsSL \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
            -d '{"source":{"branch":"gh-pages","path":"/"}}'

      - name: 构建 main 分支子目录版本
        run: NEXT_PUBLIC_PAGES_BASE_PATH=/cnn-study-daliy/nextjs pnpm build:pages

      - name: 发布到 main 分支 nextjs 目录
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf /tmp/cnn-study-main-pages
          git clone --depth 1 --branch main "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /tmp/cnn-study-main-pages
          cd /tmp/cnn-study-main-pages
          rm -rf nextjs
          mkdir -p nextjs
          cp -R "${GITHUB_WORKSPACE}/dist/." nextjs/
          touch .nojekyll
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .nojekyll nextjs
          git diff --staged --quiet && exit 0
          git commit -m "Deploy Next.js study app under /nextjs"
          git push origin HEAD:main
