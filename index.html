<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNN 英语精读 · 每日自动更新</title>
<style>
:root {
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#232635;
  --border:#2e3247;--border2:#3a4060;
  --text:#e8eaf0;--text2:#8b90a7;
  --blue:#4a9eff;--blue-dim:#1a3a5c;
  --red:#cc0000;--green:#2ecc71;
  --amber:#f0a500;--coral:#e05a3a;--teal:#1abc9c;
  --r:10px;--font:'Segoe UI',system-ui,sans-serif;--mono:'Consolas',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}

.wrap{max-width:900px;margin:0 auto;padding:1.5rem 1rem 5rem}

/* Header */
header{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;flex-wrap:wrap;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.logo{font-size:22px;font-weight:700;letter-spacing:-.5px}
.logo span{color:var(--red)}
.auto-badge{font-size:11px;padding:3px 9px;border-radius:20px;background:#0d2a1a;color:var(--green);font-weight:500;border:1px solid #1a4a2a}
.gh-link{margin-left:auto;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px}

/* History */
.history-wrap{margin-bottom:1.25rem}
.history-label{font-size:12px;color:var(--text2);margin-bottom:8px}
.history{display:flex;gap:6px;flex-wrap:wrap}
.hist-btn{padding:4px 11px;font-size:12px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;cursor:pointer;color:var(--text2);transition:all .15s;font-family:var(--mono)}
.hist-btn:hover,.hist-btn.active{background:var(--blue-dim);border-color:var(--blue);color:var(--blue)}

/* Summary */
.summary-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:1.5rem}
.card-label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.summary-text{font-size:15px;line-height:1.85;color:var(--text)}
.meta{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap;font-size:12px;color:var(--text2)}

/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap}
.tab{padding:8px 16px;font-size:13px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;color:var(--text2);transition:all .15s}
.tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.section{display:none}.section.active{display:block}

/* Transcript */
.trans-intro{font-size:13px;color:var(--text2);margin-bottom:12px}
.trans-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:12px}
.trans-speaker{display:inline-block;font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px;background:#1a2a4a;color:#7eb8f7;letter-spacing:.06em;margin-bottom:10px}
.trans-en{font-size:14px;line-height:1.9;color:var(--text);margin-bottom:10px;font-style:italic;border-left:2px solid var(--blue);padding-left:12px}
.trans-cn{font-size:14px;color:#6ab4f5;line-height:1.75;padding:8px 12px;background:var(--bg3);border-radius:6px;margin-bottom:8px}
.trans-note{font-size:12px;color:var(--text2);margin-top:6px}

/* Vocab */
.vcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:10px;transition:border .15s}
.vcard:hover{border-color:var(--border2)}
.vhead{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.vword{font-size:18px;font-weight:700;color:#fff}
.vph{font-size:13px;color:var(--text2);font-family:var(--mono)}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.bpos{background:#1a2a4a;color:#7eb8f7}
.blv{background:#2a1a0a;color:#f0a060}
.vcn{font-size:14px;color:var(--blue);font-weight:500;margin-bottom:4px}
.ven{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:8px}
.veg{padding:8px 12px;background:var(--bg3);border-left:2px solid var(--blue);border-radius:0 6px 6px 0;font-size:13px;line-height:1.75}
.veg em{color:var(--blue);font-style:normal;font-weight:600}
.vegcn{font-size:12px;color:var(--text2);margin-top:4px}

/* Sentences */
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:12px}
.sen-num{display:inline-block;font-size:11px;font-weight:700;width:22px;height:22px;line-height:22px;text-align:center;background:var(--blue);color:#fff;border-radius:50%;margin-bottom:10px}
.sen-en{font-size:15px;line-height:1.9;color:var(--text);margin-bottom:10px}
.sen-en mark{background:var(--blue-dim);color:#90c8ff;padding:1px 4px;border-radius:3px}
.sen-cn{font-size:14px;color:#6ab4f5;line-height:1.75;padding:8px 12px;background:var(--bg3);border-radius:6px;margin-bottom:10px}
.divider{width:100%;height:1px;background:var(--border);margin:10px 0}
.alabel{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.abody{font-size:13px;color:var(--text);line-height:1.75}
.abody .hl{color:var(--coral);font-weight:600}

/* Topics */
.tcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:12px}
.ttitle{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:600;color:var(--text);margin-bottom:10px}
.tdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tcontent{font-size:13px;color:var(--text2);line-height:1.85;margin-bottom:8px}
.tkw{font-size:12px;color:var(--blue);letter-spacing:.02em}

/* Quiz */
.qmeta{display:flex;align-items:center;gap:10px;margin-bottom:14px;font-size:12px;color:var(--text2)}
.qbar-wrap{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.qbar-fill{height:100%;background:var(--blue);border-radius:3px;transition:width .35s}
.qcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem}
.qbadge{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;margin-bottom:12px;font-weight:600}
.qbadge.vocab{background:#1a2a4a;color:#7eb8f7}
.qbadge.sentence{background:#2a1a2a;color:#c090f0}
.qqtext{font-size:15px;line-height:1.8;color:var(--text);margin-bottom:1.25rem;white-space:pre-line}
.qopts{display:flex;flex-direction:column;gap:8px}
.qopt{padding:11px 16px;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px;color:var(--text);background:var(--bg3);transition:all .15s;line-height:1.5}
.qopt:hover:not(.disabled){border-color:var(--blue);color:var(--blue);background:var(--blue-dim)}
.qopt.correct{border-color:var(--green);color:var(--green);background:#0d2a1a}
.qopt.wrong{border-color:var(--coral);color:var(--coral);background:#2a120a}
.qopt.disabled{cursor:default}
.qexp{margin-top:12px;padding:12px 14px;background:var(--bg3);border-radius:8px;font-size:13px;color:var(--text2);display:none;line-height:1.75;border-left:3px solid var(--amber)}
.qexp.show{display:block}
.qnext{margin-top:12px;padding:9px 20px;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;display:none;transition:background .15s}
.qnext:hover{background:#3a8ef0}
.qnext.show{display:inline-block}
.score-panel{text-align:center;padding:2.5rem 1rem}
.score-num{font-size:64px;font-weight:800;color:var(--blue);line-height:1}
.score-sub{font-size:16px;color:var(--text2);margin-top:10px}
.score-stars{font-size:28px;margin:10px 0}
.btn-restart{margin-top:16px;padding:10px 24px;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500}

/* Empty */
.empty{text-align:center;padding:5rem 1rem;color:var(--text2)}
.empty h3{font-size:18px;color:var(--text);margin-bottom:8px}
</style>
</head>

<script>
const ALL_DATA = {"2026-06-05": {"date": "2026-06-05", "source_url": "https://transcripts.cnn.com/show/ctmo/date/2026-06-05/segment/01", "summary": "美国参议院通过700亿美元共和党移民法案，资助ICE和边境巡逻队至特朗普任期结束，但FISA重新授权法案受阻。缅因州参议员候选人Graham Platner再陷争议，《纽约时报》报道其过往暴力行为，他否认但承认曾与PTSD斗争。Kevin O'Leary因公众抗议缩减犹他州AI数据中心项目。其他新闻包括NBA总决赛、航母火灾、世界杯临近等。", "transcript_highlights": [{"speaker": "ANCHOR", "text": "The U.S. Senate took almost 20 hours voting down amendment after amendment. But just a short time ago, they voted to approve the $70 billion Republican immigration bill.", "cn": "美国参议院花了近20个小时否决了一个又一个修正案。但就在不久前，他们投票通过了700亿美元的共和党移民法案。", "note": "参议院通过重大移民法案，体现两党在边境安全上的分歧。"}, {"speaker": "ANCHOR", "text": "More unsettling allegations in the Graham Platner saga. This is just days after the Maine Senate candidate met with Senate Democrats to assure them no other shoes were going to drop.", "cn": "Graham Platner事件中出现了更多令人不安的指控。就在几天前，这位缅因州参议员候选人还与参议院民主党人会面，向他们保证不会有其他意外发生。", "note": "Platner的争议持续发酵，民主党面临是否继续支持他的困境。"}, {"speaker": "PLATNER", "text": "There are some allegations in this piece that I just want to be kind of unequivocal about are simply not true. Anything alleging physicality; anything alleging that I knew what my tattoo was.", "cn": "这篇报道中的一些指控，我想明确表示，根本不是真的。任何关于肢体暴力的指控，任何关于我知道我的纹身含义的指控。", "note": "Platner否认《纽约时报》报道中的严重指控，但承认曾自我治疗酒精问题。"}, {"speaker": "ANCHOR", "text": "Kevin O'Leary, pulling back on some of his A.I. data center project. Is that going to be enough to ease concerns in Utah?", "cn": "Kevin O'Leary正在缩减他的一些AI数据中心项目。这足以缓解犹他州的担忧吗？", "note": "公众对数据中心资源消耗的抗议导致项目调整。"}, {"speaker": "ANCHOR", "text": "And the World Cup opener less than a week away. But could the beautiful game be clouded by a climate of fear?", "cn": "世界杯开幕战不到一周了。但这项美丽的运动会被恐惧气氛笼罩吗？", "note": "提及世界杯前的安全担忧，可能涉及恐怖主义或社会动荡。"}], "vocabulary": [{"word": "amendment", "phonetic": "/əˈmendmənt/", "pos": "n.", "level": "考研", "cn": "修正案", "en": "a minor change or addition designed to improve a text, piece of legislation, etc.", // ── State ────────────────────────────────────────────────
let currentData = null;
let qState = { cur: 0, score: 0, answered: false, qs: [] };
const COLORS = ['#4a9eff','#e05a3a','#1abc9c','#f0a500'];

// ── Init ─────────────────────────────────────────────────
(function init() {
  const latestDate = '2026-06-05';
  if (ALL_DATA[latestDate]) {
    renderAll(ALL_DATA[latestDate]);
    document.querySelector(`.hist-btn[data-date="${latestDate}"]`)?.classList.add('active');
  }
})();

// ── Load Date ────────────────────────────────────────────
function loadDate(date) {
  if (!ALL_DATA[date]) return;
  document.querySelectorAll('.hist-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.date === date));
  renderAll(ALL_DATA[date]);
}

// ── Render All ───────────────────────────────────────────
function renderAll(data) {
  currentData = data;
  document.getElementById('summaryText').textContent = data.summary || '';
  document.getElementById('metaDate').textContent = '📅 ' + (data.date || '');
  const link = document.getElementById('metaUrl');
  link.href = data.source_url || '#';

  renderTranscript(data.transcript_highlights || []);
  renderVocab(data.vocabulary || []);
  renderSentences(data.sentences || []);
  renderTopics(data.topics || []);
  initQuiz(data.quiz || []);
  switchTab('transcript');
}

// ── Transcript ───────────────────────────────────────────
function renderTranscript(list) {
  document.getElementById('transcriptList').innerHTML = list.map(t => `
    <div class="trans-card">
      <div class="trans-speaker">${esc(t.speaker || 'ANCHOR')}</div>
      <div class="trans-en">${esc(t.text)}</div>
      <div class="trans-cn">${esc(t.cn)}</div>
      ${t.note ? `<div class="trans-note">💡 ${esc(t.note)}</div>` : ''}
    </div>`).join('') || '<div style="color:var(--text2);font-size:14px">暂无逐字稿内容</div>';
}

// ── Vocab ────────────────────────────────────────────────
function renderVocab(list) {
  document.getElementById('vocabGrid').innerHTML = list.map(v => `
    <div class="vcard">
      <div class="vhead">
        <span class="vword">${esc(v.word)}</span>
        <span class="vph">${esc(v.phonetic || '')}</span>
        <span class="badge bpos">${esc(v.pos || '')}</span>
        <span class="badge blv">${esc(v.level || '')}</span>
      </div>
      <div class="vcn">${esc(v.cn)}</div>
      <div class="ven">${esc(v.en)}</div>
      <div class="veg">
        ${hl(v.example || '', v.word)}
        <div class="vegcn">${esc(v.example_cn || '')}</div>
      </div>
    </div>`).join('');
}

function hl(text, word) {
  if (!word) return esc(text);
  const re = new RegExp(`(${word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return esc(text).replace(re, '<em>$1</em>');
}

// ── Sentences ────────────────────────────────────────────
function renderSentences(list) {
  document.getElementById('sentenceList').innerHTML = list.map((s, i) => `
    <div class="scard">
      <div class="sen-num">${i + 1}</div>
      <div class="sen-en">${esc(s.en)}</div>
      <div class="sen-cn">${esc(s.cn)}</div>
      <div class="divider"></div>
      <div class="alabel">句子结构</div>
      <div class="abody" style="margin-bottom:8px">${esc(s.structure || '')}</div>
      <div class="alabel">语法分析</div>
      <div class="abody">${esc(s.analysis || '')}</div>
    </div>`).join('');
}

// ── Topics ───────────────────────────────────────────────
function renderTopics(list) {
  document.getElementById('topicList').innerHTML = list.map((t, i) => `
    <div class="tcard">
      <div class="ttitle">
        <span class="tdot" style="background:${COLORS[i % COLORS.length]}"></span>
        ${esc(t.title)}
      </div>
      <div class="tcontent">${esc(t.content)}</div>
      <div class="tkw">🔑 ${esc(t.keywords || '')}</div>
    </div>`).join('');
}

// ── Quiz ─────────────────────────────────────────────────
function initQuiz(qs) {
  qState = { cur: 0, score: 0, answered: false, qs };
  renderQ();
}

function renderQ() {
  const { cur, qs, score } = qState;
  if (!qs.length) return;

  if (cur >= qs.length) {
    const pct = Math.round(score / qs.length * 100);
    const stars = pct >= 80 ? '⭐⭐⭐' : pct >= 60 ? '⭐⭐' : '⭐';
    document.getElementById('quizContainer').innerHTML = `
      <div class="qcard score-panel">
        <div class="score-num">${score}<span style="font-size:28px;color:var(--text2)">/${qs.length}</span></div>
        <div class="score-stars">${stars}</div>
        <div class="score-sub">答对 ${score} 题（${pct}%）</div>
        <button class="btn-restart" onclick="initQuiz(currentData.quiz)">重新测验</button>
      </div>`;
    document.getElementById('qProgressText').textContent = '测验完成';
    document.getElementById('qBarFill').style.width = '100%';
    return;
  }

  const q = qs[cur];
  const pct = (cur / qs.length * 100).toFixed(0);
  document.getElementById('qProgressText').textContent = `第 ${cur+1} 题 / 共 ${qs.length} 题`;
  document.getElementById('qBarFill').style.width = pct + '%';
  document.getElementById('qScoreText').textContent = score > 0 ? `✓ ${score}` : '';
  qState.answered = false;

  document.getElementById('quizContainer').innerHTML = `
    <div class="qcard">
      <div class="qbadge ${q.type === 'vocab' ? 'vocab' : 'sentence'}">${q.type === 'vocab' ? '词汇题' : '理解题'}</div>
      <div class="qqtext">${esc(q.question)}</div>
      <div class="qopts">
        ${(q.options || []).map((opt, i) => `
          <div class="qopt" id="opt${i}" onclick="pick(${i})">${esc(opt)}</div>`).join('')}
      </div>
      <div class="qexp" id="qexp"></div>
      <button class="qnext" id="qnext" onclick="nextQ()">
        ${cur < qs.length - 1 ? '下一题 →' : '查看结果'}
      </button>
    </div>`;
}

function pick(i) {
  if (qState.answered) return;
  qState.answered = true;
  const q = qState.qs[qState.cur];
  const ans = q.answer ?? 0;
  document.querySelectorAll('.qopt').forEach((el, j) => {
    el.classList.add('disabled');
    if (j === ans) el.classList.add('correct');
    else if (j === i) el.classList.add('wrong');
  });
  if (i === ans) qState.score++;
  const exp = document.getElementById('qexp');
  exp.textContent = '解析：' + (q.explanation || '');
  exp.classList.add('show');
  document.getElementById('qnext').classList.add('show');
}

function nextQ() { qState.cur++; renderQ(); }

// ── Tabs ─────────────────────────────────────────────────
function switchTab(id) {
  ['transcript','vocab','sentences','topics','quiz'].forEach((t, i) => {
    document.querySelectorAll('.tab')[i].classList.toggle('active', t === id);
    document.getElementById(t).classList.toggle('active', t === id);
  });
}

// ── Util ─────────────────────────────────────────────────
function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
</script>
