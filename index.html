<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CNN 英语精读</title>
<style>
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#232635;--bg4:#2a2d3e;
  --border:#2e3247;--border2:#3a4060;
  --text:#e8eaf0;--text2:#8b90a7;--text3:#5a5f7a;
  --blue:#4a9eff;--blue-dim:#1a3a5c;--blue2:#2563a8;
  --red:#cc0000;--green:#2ecc71;--amber:#f0a500;
  --coral:#e05a3a;--teal:#1abc9c;--purple:#a78bfa;
  --hl-yellow:rgba(250,200,40,.22);
  --hl-yellow-border:rgba(250,200,40,.7);
  --hl-active:rgba(250,200,40,.45);
  --r:10px;--font:'Segoe UI',system-ui,sans-serif;--mono:'Consolas',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}

/* ── Layout ── */
.layout{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
@media(max-width:800px){.layout{grid-template-columns:1fr}.sidebar{display:none}}

/* ── Sidebar ── */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:1.25rem 0;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:0}
.sidebar-logo{padding:.75rem 1.25rem 1rem;font-size:17px;font-weight:700;letter-spacing:-.5px;border-bottom:1px solid var(--border);margin-bottom:.5rem}
.sidebar-logo span{color:var(--red)}
.sidebar-section{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:.75rem 1.25rem .25rem}
.hist-item{display:flex;align-items:center;padding:.55rem 1.25rem;cursor:pointer;font-size:13px;color:var(--text2);gap:8px;transition:all .15s;border-left:2px solid transparent}
.hist-item:hover{background:var(--bg3);color:var(--text)}
.hist-item.active{background:var(--bg3);color:var(--blue);border-left-color:var(--blue)}
.hist-item .date{font-family:var(--mono);font-size:12px}
.hist-item .dot{width:6px;height:6px;border-radius:50%;background:var(--border2);flex-shrink:0}
.hist-item.active .dot{background:var(--blue)}
.sidebar-nav{margin-top:auto;border-top:1px solid var(--border);padding-top:.5rem}
.nav-item{display:flex;align-items:center;gap:8px;padding:.55rem 1.25rem;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s}
.nav-item:hover{color:var(--text)}
.nav-item.active{color:var(--blue)}

/* ── Main ── */
.main{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.topbar-title{font-size:15px;font-weight:500;flex:1}
.topbar-date{font-size:12px;color:var(--text2);font-family:var(--mono)}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.badge-auto{background:#0d2a1a;color:var(--green);border:1px solid #1a4a2a}
.btn{padding:6px 14px;border:none;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.btn-src{background:var(--bg3);color:var(--text2);font-size:12px}
.btn-src:hover{color:var(--blue)}

.content{flex:1;padding:1.5rem}

/* ── Tabs ── */
.tabs{display:flex;gap:4px;margin-bottom:1.5rem;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:4px}
.tab{flex:1;padding:7px 0;font-size:13px;text-align:center;border-radius:7px;cursor:pointer;color:var(--text2);transition:all .15s}
.tab.active{background:var(--blue);color:#fff}
.section{display:none}.section.active{display:block}

/* ── Summary ── */
.summary-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:1.5rem}
.card-label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.summary-text{font-size:15px;line-height:1.85}

/* ── Full Transcript ── */
.transcript-wrap{display:grid;grid-template-columns:1fr 320px;gap:1.25rem;align-items:start}
@media(max-width:900px){.transcript-wrap{grid-template-columns:1fr}}
.transcript-body{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;font-size:14.5px;line-height:2;position:relative}
.transcript-hint{font-size:12px;color:var(--text2);margin-bottom:1rem;padding:.5rem .75rem;background:var(--bg3);border-radius:6px;border-left:2px solid var(--blue)}

/* paragraph */
.para{margin-bottom:1.1rem}
.para:last-child{margin-bottom:0}
.speaker-tag{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:3px;background:#1a2a4a;color:#7eb8f7;letter-spacing:.06em;margin-right:6px;vertical-align:middle;white-space:nowrap}

/* highlight */
.hl{background:var(--hl-yellow);border-bottom:2px solid var(--hl-yellow-border);border-radius:2px;cursor:pointer;transition:background .15s;padding:0 1px}
.hl:hover,.hl.active{background:var(--hl-active)}
.hl.level-考研{border-bottom-color:#f0a500}
.hl.level-六级{border-bottom-color:#4a9eff}
.hl.level-专八,.hl.level-专四{border-bottom-color:#a78bfa}
.hl.level-时事词汇{border-bottom-color:#2ecc71}

/* tooltip popup */
.vocab-popup{position:fixed;z-index:200;max-width:300px;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r);padding:1rem 1.1rem;box-shadow:0 8px 32px rgba(0,0,0,.5);display:none;pointer-events:none}
.vocab-popup.show{display:block}
.vp-word{font-size:17px;font-weight:700;color:#fff}
.vp-ph{font-size:12px;color:var(--text2);font-family:var(--mono);margin-left:6px}
.vp-badges{display:flex;gap:5px;margin:5px 0}
.vp-pos{font-size:11px;padding:1px 7px;border-radius:20px;background:#1a2a4a;color:#7eb8f7;font-weight:500}
.vp-lv{font-size:11px;padding:1px 7px;border-radius:20px;background:#2a1a0a;color:#f0a060;font-weight:500}
.vp-cn{font-size:14px;color:var(--blue);font-weight:500;margin-bottom:3px}
.vp-en{font-size:12px;color:var(--text2);line-height:1.6}

/* word panel (right side) */
.word-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem;position:sticky;top:80px}
.word-panel-title{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.word-list{display:flex;flex-direction:column;gap:4px;max-height:calc(100vh - 200px);overflow-y:auto}
.word-chip{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:7px;cursor:pointer;transition:all .15s;border:1px solid transparent}
.word-chip:hover{background:var(--bg3);border-color:var(--border)}
.word-chip.active{background:var(--blue-dim);border-color:var(--blue)}
.wc-word{font-size:14px;font-weight:500;color:var(--text)}
.wc-cn{font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wc-lv{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── Vocab Cards ── */
.vocab-grid{display:flex;flex-direction:column;gap:10px}
.vcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;transition:border .15s}
.vcard:hover{border-color:var(--border2)}
.vhead{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.vword{font-size:18px;font-weight:700;color:#fff}
.vph{font-size:13px;color:var(--text2);font-family:var(--mono)}
.bpos{font-size:11px;padding:2px 8px;border-radius:20px;background:#1a2a4a;color:#7eb8f7;font-weight:500}
.blv{font-size:11px;padding:2px 8px;border-radius:20px;background:#2a1a0a;color:#f0a060;font-weight:500}
.vcn{font-size:14px;color:var(--blue);font-weight:500;margin-bottom:4px}
.ven{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:8px}
.veg{padding:8px 12px;background:var(--bg3);border-left:2px solid var(--blue);border-radius:0 6px 6px 0;font-size:13px;line-height:1.75}
.veg em{color:var(--blue);font-style:normal;font-weight:600}
.vegcn{font-size:12px;color:var(--text2);margin-top:4px}

/* ── Sentences ── */
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:12px}
.snum{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;font-size:12px;font-weight:700;margin-bottom:10px}
.sen-en{font-size:15px;line-height:1.9;margin-bottom:10px}
.sen-cn{font-size:14px;color:#6ab4f5;line-height:1.75;padding:8px 12px;background:var(--bg3);border-radius:6px;margin-bottom:10px}
.alabel{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.abody{font-size:13px;line-height:1.75;margin-bottom:8px}
.hl2{color:var(--coral);font-weight:600}
.divider{height:1px;background:var(--border);margin:10px 0}

/* ── Topics ── */
.tcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:12px}
.ttitle{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:600;margin-bottom:10px}
.tdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tcontent{font-size:13px;color:var(--text2);line-height:1.85;margin-bottom:8px}
.tkw{font-size:12px;color:var(--blue)}

/* ── Quiz ── */
.qmeta{display:flex;align-items:center;gap:10px;margin-bottom:14px;font-size:12px;color:var(--text2)}
.qbar-w{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.qbar-f{height:100%;background:var(--blue);border-radius:3px;transition:width .3s}
.qcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem}
.qbadge{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;margin-bottom:12px;font-weight:600}
.qbadge.vocab{background:#1a2a4a;color:#7eb8f7}
.qbadge.sentence{background:#2a1a2a;color:#c090f0}
.qqtext{font-size:15px;line-height:1.8;margin-bottom:1.25rem;white-space:pre-line}
.qopts{display:flex;flex-direction:column;gap:8px}
.qopt{padding:11px 16px;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px;background:var(--bg3);transition:all .15s;line-height:1.5}
.qopt:hover:not(.disabled){border-color:var(--blue);color:var(--blue);background:var(--blue-dim)}
.qopt.correct{border-color:var(--green);color:var(--green);background:#0d2a1a}
.qopt.wrong{border-color:var(--coral);color:var(--coral);background:#2a120a}
.qopt.disabled{cursor:default}
.qexp{margin-top:12px;padding:12px 14px;background:var(--bg3);border-radius:8px;font-size:13px;color:var(--text2);display:none;line-height:1.75;border-left:3px solid var(--amber)}
.qexp.show{display:block}
.qnext{margin-top:12px;padding:9px 20px;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;display:none}
.qnext:hover{background:#3a8ef0}
.qnext.show{display:inline-block}
.score-panel{text-align:center;padding:2.5rem}
.score-num{font-size:64px;font-weight:800;color:var(--blue);line-height:1}
.score-sub{font-size:16px;color:var(--text2);margin-top:8px}
.score-stars{font-size:28px;margin:10px 0}
.btn-restart{margin-top:16px;padding:10px 24px;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500}

/* ── Empty ── */
.empty{text-align:center;padding:5rem 1rem;color:var(--text2)}
.empty h3{font-size:18px;color:var(--text);margin-bottom:8px}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>
<div class="layout">

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo"><span>CNN</span> 英语精读</div>
  <div class="sidebar-section">历史记录</div>
  <div id="histList"><div class="hist-item active" data-date="2026-06-05" onclick="loadDate('2026-06-05')"><span class="dot"></span><span class="date">2026-06-05</span></div>
<div class="hist-item" data-date="2026-06-04" onclick="loadDate('2026-06-04')"><span class="dot"></span><span class="date">2026-06-04</span></div></div>
  <div class="sidebar-nav">
    <div class="nav-item" onclick="window.open('https://transcripts.cnn.com','_blank')">🔗 CNN Transcripts</div>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbarTitle">CNN This Morning</div>
    <span class="topbar-date" id="topbarDate"></span>
    <span class="badge badge-auto">⚡ 每日自动更新</span>
    <button class="btn btn-src" id="srcBtn" onclick="openSource()">查看原文 →</button>
  </div>

  <div class="content">

    <!-- Summary -->
    <div class="summary-card">
      <div class="card-label">📰 内容摘要</div>
      <div class="summary-text" id="summaryText">加载中...</div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('transcript')">📝 全文稿</div>
      <div class="tab" onclick="switchTab('vocab')">📚 词汇</div>
      <div class="tab" onclick="switchTab('sentences')">🔍 难句</div>
      <div class="tab" onclick="switchTab('topics')">🌐 背景</div>
      <div class="tab" onclick="switchTab('quiz')">✅ 测验</div>
    </div>

    <!-- Transcript Tab -->
    <div id="transcript" class="section active">
      <div class="transcript-wrap">
        <div>
          <div class="transcript-hint">💡 点击 <span style="background:var(--hl-yellow);padding:0 4px;border-radius:2px;border-bottom:2px solid var(--hl-yellow-border)">高亮词汇</span> 查看注释 · 颜色代表难度：<span style="color:#f0a500">■</span>考研 <span style="color:#4a9eff">■</span>六级 <span style="color:#a78bfa">■</span>专四/八 <span style="color:#2ecc71">■</span>时事</div>
          <div class="transcript-body" id="transcriptBody"></div>
        </div>
        <div>
          <div class="word-panel">
            <div class="word-panel-title">词汇索引</div>
            <div class="word-list" id="wordList"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Vocab Tab -->
    <div id="vocab" class="section">
      <div class="vocab-grid" id="vocabGrid"></div>
    </div>

    <!-- Sentences Tab -->
    <div id="sentences" class="section">
      <div id="sentenceList"></div>
    </div>

    <!-- Topics Tab -->
    <div id="topics" class="section">
      <div id="topicList"></div>
    </div>

    <!-- Quiz Tab -->
    <div id="quiz" class="section">
      <div class="qmeta">
        <span id="qProgText">第 1 题 / 共 6 题</span>
        <div class="qbar-w"><div class="qbar-f" id="qBarF" style="width:0%"></div></div>
        <span id="qScoreT" style="color:var(--green)"></span>
      </div>
      <div id="quizContainer"></div>
    </div>

  </div>
</div>
</div>

<!-- Vocab Popup Tooltip -->
<div class="vocab-popup" id="vocabPopup">
  <div><span class="vp-word" id="vpWord"></span><span class="vp-ph" id="vpPh"></span></div>
  <div class="vp-badges"><span class="vp-pos" id="vpPos"></span><span class="vp-lv" id="vpLv"></span></div>
  <div class="vp-cn" id="vpCn"></div>
  <div class="vp-en" id="vpEn"></div>
</div>

<script>
const ALL_DATA = {"2026-06-05":{"date":"2026-06-05","source_url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-05/segment/01","summary":"美国参议院通过700亿美元共和党移民法案，资助ICE和边境巡逻队至特朗普任期结束，但FISA重新授权法案受阻。缅因州参议员候选人Graham Platner再陷争议，《纽约时报》报道其过往暴力行为，他否认但承认曾与PTSD斗争。Kevin O'Leary因公众抗议缩减犹他州AI数据中心项目。其他新闻包括NBA总决赛、航母火灾、世界杯临近等。","transcript_highlights":[{"speaker":"ANCHOR","text":"The U.S. Senate took almost 20 hours voting down amendment after amendment. But just a short time ago, they voted to approve the $70 billion Republican immigration bill.","cn":"美国参议院花了近20个小时否决了一个又一个修正案。但就在不久前，他们投票通过了700亿美元的共和党移民法案。","note":"参议院通过重大移民法案，体现两党在边境安全上的分歧。"},{"speaker":"ANCHOR","text":"More unsettling allegations in the Graham Platner saga. This is just days after the Maine Senate candidate met with Senate Democrats to assure them no other shoes were going to drop.","cn":"Graham Platner事件中出现了更多令人不安的指控。就在几天前，这位缅因州参议员候选人还与参议院民主党人会面，向他们保证不会有其他意外发生。","note":"Platner的争议持续发酵，民主党面临是否继续支持他的困境。"},{"speaker":"PLATNER","text":"There are some allegations in this piece that I just want to be kind of unequivocal about are simply not true. Anything alleging physicality; anything alleging that I knew what my tattoo was.","cn":"这篇报道中的一些指控，我想明确表示，根本不是真的。任何关于肢体暴力的指控，任何关于我知道我的纹身含义的指控。","note":"Platner否认《纽约时报》报道中的严重指控，但承认曾自我治疗酒精问题。"},{"speaker":"ANCHOR","text":"Kevin O'Leary, pulling back on some of his A.I. data center project. Is that going to be enough to ease concerns in Utah?","cn":"Kevin O'Leary正在缩减他的一些AI数据中心项目。这足以缓解犹他州的担忧吗？","note":"公众对数据中心资源消耗的抗议导致项目调整。"},{"speaker":"ANCHOR","text":"And the World Cup opener less than a week away. But could the beautiful game be clouded by a climate of fear?","cn":"世界杯开幕战不到一周了。但这项美丽的运动会被恐惧气氛笼罩吗？","note":"提及世界杯前的安全担忧，可能涉及恐怖主义或社会动荡。"}],"vocabulary":[{"word":"amendment","phonetic":"/əˈmendmənt/","pos":"n.","level":"考研","cn":"修正案","en":"a minor change or addition designed to improve a text, piece of legislation, etc.","example":"The Senate voted down amendment after amendment.","example_cn":"参议院否决了一个又一个修正案。"},{"word":"contentious","phonetic":"/kənˈtenʃəs/","pos":"adj.","level":"六级","cn":"有争议的","en":"causing or likely to cause an argument; controversial","example":"Seven Senate Republicans voted to block consideration of a contentious bill.","example_cn":"七名共和党参议员投票阻止审议一项有争议的法案。"},{"word":"reauthorize","phonetic":"/riːˈɔːθəraɪz/","pos":"v.","level":"时事词汇","cn":"重新授权","en":"to authorize again, especially to renew the legal authority for a program or agency","example":"The bill would reauthorize the nation's spy powers.","example_cn":"该法案将重新授权国家的间谍权力。"},{"word":"allegation","phonetic":"/ˌæləˈɡeɪʃn/","pos":"n.","level":"考研","cn":"指控","en":"a claim or assertion that someone has done something illegal or wrong, typically one made without proof","example":"More unsettling allegations in the Graham Platner saga.","example_cn":"Graham Platner事件中出现了更多令人不安的指控。"},{"word":"unequivocal","phonetic":"/ˌʌnɪˈkwɪvəkl/","pos":"adj.","level":"专八","cn":"明确的","en":"leaving no doubt; unambiguous","example":"I just want to be kind of unequivocal about are simply not true.","example_cn":"我想明确表示，这些根本不是真的。"},{"word":"PTSD","phonetic":"/ˌpiː tiː es ˈdiː/","pos":"abbr.","level":"时事词汇","cn":"创伤后应激障碍","en":"post-traumatic stress disorder, a mental health condition triggered by a terrifying event","example":"He says he was struggling with PTSD.","example_cn":"他说他当时正在与创伤后应激障碍作斗争。"},{"word":"self-medicate","phonetic":"/ˌself ˈmedɪkeɪt/","pos":"v.","level":"六级","cn":"自我治疗（通常指滥用药物或酒精）","en":"to treat oneself with medication or substances without professional supervision, often to alleviate symptoms of a condition","example":"Self-medicating with alcohol.","example_cn":"用酒精自我治疗。"},{"word":"volatile","phonetic":"/ˈvɒlətaɪl/","pos":"adj.","level":"考研","cn":"不稳定的；易变的","en":"liable to change rapidly and unpredictably, especially for the worse","example":"Describing volatile and toxic relationships.","example_cn":"描述不稳定且有害的关系。"},{"word":"toxic","phonetic":"/ˈtɒksɪk/","pos":"adj.", f unequivocal about) 修饰 allegations，主句谓语为 are","analysis":"口语化表达，'kind of' 缓和语气，'unequivocal' 强调明确性。"},{"en":"Seven Senate Republicans voted to block consideration of a contentious bill that would reauthorize the nation's spy powers.","cn":"七名共和党参议员投票阻止审议一项有争议的法案，该法案将重新授权国家的间谍权力。","structure":"主语 (Seven Senate Republicans) + 谓语 (voted) + 不定式短语 (to block consideration of a contentious bill) + 定语从句 (that would reauthorize the nation's spy powers) 修饰 bill","analysis":"不定式短语表示目的，定语从句说明法案内容。"},{"en":"Kevin O'Leary, pulling back on some of his A.I. data center project, is that going to be enough to ease concerns in Utah?","cn":"Kevin O'Leary正在缩减他的一些AI数据中心项目，这足以缓解犹他州的担忧吗？","structure":"主语 (Kevin O'Leary) + 现在分词短语 (pulling back on some of his A.I. data center project) 作伴随状语，主句为一般疑问句 (is that going to be enough to ease concerns in Utah?)","analysis":"现在分词短语表示正在进行的动作，主句中的'that'指代前文提到的缩减行为。"}],"topics":[{"title":"美国参议院移民法案与FISA之争","content":"2026年6月5日，美国参议院以20小时辩论后通过700亿美元共和党移民法案，旨在资助ICE和边境巡逻队至特朗普任期结束。但随后FISA（外国情报监视法）重新授权法案受阻，七名共和党参议员反对审议，该法将于一周后到期。这反映共和党内部在国家安全议题上的分歧，以及两党在移民和监控政策上的持续博弈。","keywords":"移民法案 · FISA · 参议院 · 共和党 · 边境安全"},{"title":"Graham Platner争议与民主党困境","content":"缅因州参议员候选人Graham Platner（民主党）再陷争议，《纽约时报》报道其过往暴力行为，包括扭伤女性手臂等。Platner否认肢体暴力指控，但承认曾因PTSD酗酒。此前他刚向民主党高层保证无更多丑闻。民主党面临是否支持他的抉择，州长Janet Mills仍保留参选资格。此事件凸显政治候选人的背景审查与选民宽容度问题。","keywords":"Graham Platner · 民主党 · 缅因州 · 性侵指控 · PTSD"},{"title":"AI数据中心与公众抗议","content":"Kevin O'Leary因公众抗议缩减犹他州AI数据中心项目。抗议者担忧数据中心消耗大量水资源和电力，影响当地环境。此事件反映AI产业扩张与社区资源保护之间的矛盾，类似争议在弗吉尼亚等地也曾出现。数据中心作为AI基础设施，其可持续性成为社会关注焦点。","keywords":"AI数据中心 · 公众抗议 · 资源消耗 · 犹他州 · Kevin O'Leary"},{"title":"世界杯前的安全担忧","content":"2026年世界杯开幕在即，但报道提及'恐惧气氛'可能影响赛事。这可能指恐怖主义威胁、社会动荡或公共卫生问题。世界杯作为全球盛事，安全一直是主办方首要考虑。此前多届赛事曾面临类似挑战，如2014年巴西世界杯的抗议活动。","keywords":"世界杯 · 安全 · 恐惧 · 恐怖主义 · 2026"}],"quiz":[{"type":"vocab","question":"单词 'contentious' 最接近的含义是？","options":["A. 满意的","B. 有争议的","C. 连续的","D. 满足的"],"answer":1,"explanation":"contentious 意为'有争议的'，与 controversial 同义。"},{"type":"vocab","question":"短语 'no other shoes were going to drop' 在文中的意思是？","options":["A. 没有其他鞋子会掉下来","B. 没有其他坏消息会爆出","C. 没有其他鞋子会出售","D. 没有其他事情会发生"],"answer":1,"explanation":"习语 'the other shoe drops' 指坏消息或意料中的事件发生，此处意为没有其他丑闻。"},{"type":"vocab","question":"单词 'unequivocal' 的反义词是？","options":["A. 明确的","B. 模糊的","C. 平等的","D. 独特的"],"answer":1,"explanation":"unequivocal 意为'明确的'，反义词为 ambiguous（模糊的）。"},{"type":"comprehension","question":"参议院通过的移民法案主要目的是什么？","options":["A. 削减ICE预算","B. 资助ICE和边境巡逻队至特朗普任期结束","C. 废除FISA","D. 增加移民配额"],"answer":1,"explanation":"法案提供700亿美元资助ICE和边境巡逻队至特朗普任期结束。"},{"type":"comprehension","question":"关于Graham Platner，以下哪项陈述是正确的？","options":["A. 他承认所有指控","B. 他否认肢体暴力指控但承认曾酗酒","C. 他已退出竞选","D. 民主党已放弃支持他"],"answer":1,"explanation":"Platner否认肢体暴力指控，但承认曾因PTSD酗酒。"},{"type":"comprehension","question":"Kevin O'Leary缩减数据中心项目的原因是什么？","options":["A. 资金不足","B. 公众抗议","C. 技术问题","D. 政府禁令"],"answer":1,"explanation":"报道指出公众抗议导致项目缩减，担忧资源消耗。"}]},"2026-06-04":{"date":"2026-06-04","source_url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-04/segment/01","summary":"四名共和党人跨党派投票支持限制特朗普对伊朗战争权力的决议，凸显党内对战争成本和经济压力的不满。财政部长贝森特在国会就战争对农业的影响与参议员交锋，被批缺乏同理心。纽约尼克斯队自尼克松时代以来首次有望夺冠。MMA乘客制服闹事者。","vocabulary":[{"word":"rebuke","phonetic":"/rɪˈbjuːk/","pos":"n.","level":"考研","cn":"指责，训斥","en":"an expression of sharp disapproval or criticism","excerpt":"Today in the group chat, the Republican rebuke.","example_cn":"今天群聊的话题是共和党的指责。"},{"word":"defector","phonetic":"/dɪˈfektər/","pos":"n.","level":"六级","cn":"叛离者，倒戈者","en":"a person who abandons a party, cause, or country","excerpt":"GOP defectors crossing party lines to limit President Trump's war powers.","example_cn":"共和党倒戈者跨党派投票限制特朗普总统的战争权力。"},{"word":"constitutionality","phonetic":"/ˌkɑːnstɪtuːʃəˈnæləti/","pos":"n.","level":"专八","cn":"合宪性","en":"the quality of being in accordance with a constitution","excerpt":"in addition to these concerns over constitutionality that I think Davidson and Massie share","example_cn":"除了戴维森和马西都关心的合宪性问题之外"},{"word":"erosion","phonetic":"/ɪˈroʊʒn/","pos":"n.","level":"六级","cn":"侵蚀，削弱","en":"the gradual destruction or diminution of something","excerpt":"the war vote saw the erosion of some support","example_cn":"战争投票的支持率有所下降"},{"word":"empathy","phonetic":"/ˈempəθi/","pos":"n.","level":"考研","cn":"共情，同理心","en":"the ability to understand and share the feelings of another","excerpt":"there's no empathy or humanity for people who are actually suffering","example_cn":"对那些真正受苦的人没有同理心或人性关怀"},{"word":"multibillionaire","phonetic":"/ˌmʌltiˌbɪljəˈner/","pos":"n.","level":"时事词汇","cn":"亿万富翁（数十亿身家）","en":"a person with assets worth many billions of dollars","excerpt":"These people are multibillionaires.","example_cn":"这些人都是亿万富翁。"},{"word":"ballroom","phonetic":"/ˈbɔːlruːm/","pos":"n.","level":"六级","cn":"舞厅，宴会厅","en":"a large room for formal dancing or events","excerpt":"But you're down here building a ballroom and having a UFC fight.","example_cn":"但你却在建造舞厅、举办UFC格斗赛。"},{"word":"notification","phonetic":"/ˌnoʊtɪfɪˈkeɪʃn/","pos":"n.","level":"考研","cn":"通知，告知","en":"the action of notifying someone or something","excerpt":"The War Powers Act of '73 says 48-hour notification and 60-day concurrence of Congress.","example_cn":"1973年《战争权力法》规定48小时通知和60天国会同意。"},{"word":"concurrence","phonetic":"/kənˈkɜːrəns/","pos":"n.","level":"专四","cn":"同意，一致","en":"agreement or consent","excerpt":"48-hour notification and 60-day concurrence of Congress","example_cn":"48小时通知和60天国会同意"},{"word":"fertilizer","phonetic":"/ˈfɜːrtəlaɪzər/","pos":"n.","level":"考研","cn":"肥料","en":"a chemical or natural substance added to soil to increase its fertility","excerpt":"75 percent of the fertilizer had already been purchased this year.","example_cn":"今年75%的肥料已经购买。"},{"word":"MMA","phonetic":"/ˌem em ˈeɪ/","pos":"n.","level":"时事词汇","cn":"综合格斗（Mixed Martial Arts）","en":"a full-contact combat sport that allows a wide variety of fighting techniques","excerpt":"How an MMA fighter saved the day.","example_cn":"一名综合格斗选手如何扭转局面。"},{"word":"do-or-die","phonetic":"/ˌduː ɔːr ˈdaɪ/","pos":"adj.","level":"六级","cn":"生死攸关的，孤注一掷的","en":"involving a determined or desperate effort to succeed","excerpt":"A do-or-die struggle on a plane.","example_cn":"飞机上一场生死搏斗。"}],"sentences":[{"en":"You've got four Republicans siding with Democrats on that resolution that directs Trump to remove U.S. armed forces from hostilities with Iran.","cn":"有四名共和党人与民主党站在一边，支持那项要求特朗普将美国武装部队撤出与伊朗敌对行动的决议。","structure":"主句（You've got four Republicans siding with Democrats）+ 介词短语（on that resolution）+ 定语从句（that directs Trump to remove...）","analysis":"siding with 表示‘支持，站在……一边’；directs sb. to do sth. 意为‘指示某人做某事’；remove...from... 意为‘从……撤出’。"},{"en":"But we have to do this in a way that is done through the use of force authorization that Congress has the exclusive authority over.","cn":"但我们必须通过国会拥有专属权力的武力授权方式来做到这一点。","structure":"主句（But we have to do this in a way）+ 定语从句（that is done through the use of force authorization）+ 定语从句（that Congress has the exclusive authority over）","analysis":"in a way that... 意为‘以……的方式’；exclusive authority over 意为‘对……的专属权力’。"},{"en":"And I would argue that him and Barrett, specifically, right, are under a ton of pressure to, again, show their districts that they are doing something to bring energy costs down.","cn":"而且我认为，他和巴雷特，特别是，承受着巨大压力，要再次向他们的选区表明他们正在采取措施降低能源成本。","structure":"主句（I would argue）+ 宾语从句（that him and Barrett... are under a ton of pressure）+ 不定式短语（to show their districts that...）","analysis":"under a ton of pressure 是夸张说法，意为‘承受巨大压力’；show sb. that... 意为‘向某人表明……’；bring...down 意为‘降低’。"},{"en":"And that's all the American people see: We can't afford our gas. We can't afford electricity. We can't afford groceries. But you're down here building a ballroom and having a UFC fight.","cn":"而美国人民看到的就是这些：我们付不起油钱，付不起电费，买不起食品杂货。但你却在建造舞厅、举办UFC格斗赛。","structure":"主句（And that's all the American people see）+ 冒号后列举三个并列句（We can't afford...）+ 转折句（But you're down here...）","analysis":"afford 意为‘负担得起’；down here 指代华盛顿或国会山，带有讽刺意味；UFC fight 指终极格斗冠军赛。"},{"en":"When Trump went to this war, he never went to the American people and said, this is why I'm going, and this is what I'm doing.","cn":"当特朗普发动这场战争时，他从未向美国人民说明：这就是我开战的原因，这就是我正在做的事情。","structure":"时间状语从句（When Trump went to this war）+ 主句（he never went to the American people and said）+ 直接引语（this is why... and this is what...）","analysis":"go to war 意为‘开战’；go to the American people 意为‘向美国人民说明’；直接引语中 why 和 what 引导表语从句。"}],"topics":[{"title":"伊朗战争权力决议","content":"美国众议院通过一项决议，要求特朗普总统在60天内撤出与伊朗的敌对行动。四名共和党人跨党派投票支持，理由是《战争权力法》（War Powers Act of 1973）规定国会拥有宣战专属权。此举反映党内对战争成本和经济压力的不满。","keywords":"Iran War Powers Resolution · War Powers Act · Republican defectors · hostilities"},{"title":"经济与战争成本","content":"战争导致能源和化肥价格上涨，农民负担加重。财政部长贝森特（Scott Bessent）在国会听证中与参议员史密斯（Tina Smith）交锋，强调伊朗核威胁，但被批评缺乏同理心。民众对高油价、高电费和高食品价格感到愤怒。","keywords":"affordability · fertilizer · empathy · energy costs"},{"title":"纽约尼克斯队夺冠希望","content":"纽约尼克斯队（New York Knicks）在NBA总决赛第一场获胜，球迷期待自尼克松总统时期（1970年代）以来的首个总冠军。杰伦·布伦森（Jalen Brunson）被赞为全国第一球员。","keywords":"New York Knicks · NBA Finals · Jalen Brunson · championship"},{"title":"MMA乘客制服闹事者","content":"一名综合格斗（MMA）选手在飞机上制服了失控乘客，避免了潜在危险。他称练习柔术（Jiu Jitsu）和武术是为了在真实情况下保护自己。","keywords":"MMA · Jiu Jitsu · unruly passenger · martial arts"}],"quiz":[{"type":"vocab","question":"在 'GOP defectors crossing party lines' 中，'defectors' 最接近的意思是？","options":["A. 支持者","B. 叛离者","C. 领导者","D. 观察者"],"answer":1,"explanation":"defector 意为‘叛离者、倒戈者’，指脱离原有政党或阵营的人。文中指共和党人跨党派投票。"},{"type":"vocab","question":"在 'the erosion of some support' 中，'erosion' 的含义是？","options":["A. 增加","B. 侵蚀","C. 巩固","D. 转移"],"answer":1,"explanation":"erosion 本义‘侵蚀’，引申为‘逐渐削弱、减少’。文中指战争投票的支持率下降。"},{"type":"vocab","question":"在 'show some empathy' 中，'empathy' 的意思是？","options":["A. 同情","B. 共情","C. 冷漠","D. 愤怒"],"answer":1,"explanation":"empathy 指‘共情、同理心’，即理解他人感受的能力。与 sympathy（同情）不同，empathy 更强调感同身受。"},{"type":"comprehension","question":"根据文章，四名共和党人投票支持伊朗战争权力决议的主要原因是什么？","options":["A. 他们支持伊朗核武器","B. 他们面临选区选民对经济压力的不满","C. 他们反对特朗普的所有政策","D. 他们希望增加军费开支"],"answer":1,"explanation":"文章指出，这些共和党人（如Fitzpatrick和Barrett）承受着选区选民对能源成本上涨的巨大压力，因此投票限制战争权力以回应民众关切。"},{"type":"comprehension","question":"财政部长贝森特在听证会上与参议员史密斯争论的焦点是什么？","options":["A. 伊朗核威胁是否真实","B. 战争是否导致化肥价格上涨","C. 农民是否已购买化肥","D. 是否应增加农业补贴"],"answer":2,"explanation":"贝森特声称75%的化肥已提前购买，暗示战争对农民影响有限；史密斯则反驳称农民仍面临高价，双方争论焦点在于农民是否已购买化肥。"},{"type":"comprehension","question":"关于特朗普发动战争的方式，文章批评了什么？","options":["A. 战争过于迅速","B. 未向美国人民解释原因","C. 战争花费过高","D. 未使用先进武器"],"answer":1,"explanation":"文章引用评论称：‘When Trump went to this war, he never went to the American people and said, this is why I'm going’，批评特朗普未向公众说明开战理由。"}],"paragraphs":[{"speaker":"ANCHOR","text":"CNN.com - Transcripts var cnnSiteWideCurrDate = new Date(2013, 1, 12); window.CNNSTATICSECTION = ''; var CNNENV = \"//www.cnn.com\"; Transcript Providers Return to Transcripts main page CNN This Morning Four Republicans Vote Yes on Iran War Powers Resolution; Knicks Fans Hopeful After Finals Game 1 Win; Blanche Tells Congress DOJ Fund is Dead, But Is It? Aired 6-6:30a ET Aired June 04, 2026 - 06:00"},{"speaker":"ANCHOR","text":"ET THIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED. [06:00:12] AUDIE CORNISH, CNN ANCHOR: Today in the group chat, the Republican rebuke. You've got four people in the president's party who have broken with him on the war with Iran. But will it have any impact? (BEGIN VIDEO CLIP) REP. TOM BARRETT (R-MI): -- do that."},{"speaker":"ANCHOR","text":"I definitely feel what people are experiencing back home. You know, I go back home to my district every single week. You know, I fill up my gas tank, too. (END VIDEO CLIP) CORNISH: President Trump calls his anti-weaponization fund a, quote, \"beautiful thing.\" Does anyone in Washington believe the plan is really dead? (BEGIN VIDEO CLIP) SCOTT BESSENT, U.S."},{"speaker":"ANCHOR","text":"TREASURY SECRETARY: I actually said it was going to kick his ass. (END VIDEO CLIP) CORNISH: Fighting words from the treasury secretary. But a real battle looms over Trump's pick to lead the national intelligence community. (BEGIN VIDEO CLIP) JOSH LONGOOD, RESTRAINED UNRULY PASSENGER: You know, that's why I do Jiu Jitsu."},{"speaker":"ANCHOR","text":"That's why I train martial arts, just so I can handle myself in a real-life situation like that. (END VIDEO CLIP) CORNISH: A do-or-die struggle on a plane. How an MMA fighter saved the day. And then, of course, the New York Knicks look to pull off something we have not seen since Nixon was in office. (BEGIN VIDEO CLIP) UNIDENTIFIED MALE: Oh, what a sweet move."},{"speaker":"ANCHOR","text":"UNIDENTIFIED MALE: Jalen Brunson, the No. 1 player in the country. No. 1 player in the NBA. Knicks in four, baby. That's how I feel. (END VIDEO CLIP) (BEGIN VIDEO CLIP) REP. THOMAS MASSIE (R-KY): People are tired of this. They're tired of $5 a gallon gas and $6 a gallon diesel and fertilizer. We can't afford to."},{"speaker":"ANCHOR","text":"I think it sends a good message that the people's House, which represents the people, is tired of this war. (END VIDEO CLIP) CORNISH: All right. GOP defectors crossing party lines to limit President Trump's war powers. Will anything come of this in the long term? Good morning, everybody. I'm Audie Cornish. And here's where we start, because this is a rare Republican rebuke on the Hill."},{"speaker":"ANCHOR","text":"You've got four Republicans siding with Democrats on that resolution that directs Trump to remove U.S. armed forces from hostilities with Iran. Before the vote, House Speaker Mike Johnson had this warning to members of his party looking to flip. (BEGIN VIDEO CLIP) REP."},{"speaker":"ANCHOR","text":"MIKE JOHNSON (R-KY): I think it is a -- a very dangerous prospect to take away from the administration and the commander in chief right now, the ability to negotiate. That's what this does. It -- it weakens us. CORNISH: But for the Republicans who ended up voting yes, they say several factors weighed into their decision. (BEGIN VIDEO CLIP) REP. BRIAN FITZPATRICK (R-pa): We have to follow the law."},{"speaker":"ANCHOR","text":"There's a law on the books. The War Powers Act of '73 says 48-hour notification and 60-day concurrence of Congress. We're past the 60 days. So, you have two choices. You either follow the law or you change the law. BARRETT: People are frustrated, certainly, but that's not the only consideration in this. I fill up my gas tank, too. I have four kids."},{"speaker":"ANCHOR","text":"I share the -- the interest in making sure that Iran does not develop a nuclear weapon. But we have to do this in a way that is done through the use of force authorization that Congress has the exclusive authority over. Congress alone declares war."},{"speaker":"ANCHOR","text":"(END VIDEO CLIP) CORNISH: Joining me now in the group chat, Eleanor Mueller, White House economics reporter from seminar -- from \"Semafor\"; of former Trump White House communications director Mike Dubke; and Meghan Hays, former Biden White House director of message planning."},{"speaker":"ANCHOR","text":"OK, so when it comes to a story like this, it's not the usual suspects, your Thomas Massie of Kentucky, that we are looking at. It's the other folks. Brian Fitzpatrick, Pennsylvania; Tom Barrett, Michigan; Warren Davidson, Ohio. All pretty important states, in general, in elections."},{"speaker":"ANCHOR","text":"Can you talk about what's going on, why these particular people might be the ones to make this shift? ELEANOR MUELLER, WHITE HOUSE ECONOMICS REPORTER, \"SEMAFOR\": I think it tells us a lot about how much pressure these Republican congressmen are under to show voters that they're doing something on affordability. You know -- CORNISH: We should be clear, they were just at home. MUELLER: Exactly."},{"speaker":"ANCHOR","text":"CORNISH: So, they were just there last week. MUELLER: They were just hearing from constituents. Fitzpatrick has been someone that leaders have had their eye on for a long time as somebody who might vote against this war. And I would argue that him and Barrett, specifically, right, are under a ton of pressure to, again, show their districts that they are doing something to bring energy costs down."},{"speaker":"ANCHOR","text":"And so, in addition to these concerns over constitutionality that I think Davidson and Massie share, Barrett and Fitzpatrick are really feeling the heat. And this vote was a sign of that. CORNISH: So, then you've got this \"New York Times\" reporting that even if oil prices peak soon, the global economy is going to slow down. Meaning the damage has been done."},{"speaker":"ANCHOR","text":"And Secretary Bessent was on the Hill yesterday, and he, of course, was asked about the economy for the same reasons that this war vote saw the erosion of some support, because people are worried. And here is what Bessent had to say on the Hill. [06:05:07] (BEGIN VIDEO CLIP) SEN."},{"speaker":"ANCHOR","text":"TINA SMITH (D-MN): Could you just explain to me and to farmers in Minnesota how those increased prices, driven by the war and Iran, are worth the pain that they are feeling right now? BESSENT: Senator, do you believe that Iran can have a nuclear weapon? As a former farmer, I will tell you that -- and maybe you know that 75 percent of the fertilizer had already been purchased this year."},{"speaker":"ANCHOR","text":"There -- SMITH: That is not -- not what my farmers in Minnesota are telling me, sir. BESSENT: They're -- they're -- SMITH: They are telling me that they cannot afford their fertilizer, and they know the reason why. They know the reason. BESSENT: There is -- there is no doubt -- SMITH: So -- BESSENT: -- that -- that farmers have been struggling."},{"speaker":"ANCHOR","text":"But much of that, that there was a record crop last year, Senator. And what do record crops lead to? SMITH: What my farmers are telling me -- BESSENT: Lower prices. (END VIDEO CLIP) CORNISH: OK."},{"speaker":"ANCHOR","text":"So, our messaging folks, what do you think of that back and forth, both sides of it, frankly? MEGHAN HAYS, FORMER BIDEN WHITE HOUSE DIRECTOR OF MESSAGE PLANNING: I mean, I think that there's a complete disconnect from how people are feeling. And I think if you're not going to show empathy from people, that's really what gets you here. It's not necessarily the policy."},{"speaker":"ANCHOR","text":"It's when people don't understand -- don't say to you, I understand where you're coming from. We are doing this for this reason. CORNISH: But his reply was pretty straightforward. HAYS: But I -- but I just don't think farmers have already bought fertilizer. They have no -- there's no empathy or humanity for people who are actually suffering, who are actually paying the bills."},{"speaker":"ANCHOR","text":"These people are multibillionaires. They are taking people for a ride. They are getting money from taxpayers. And that's all the American people see. We can't afford our gas. We can't afford electricity. We can't afford groceries. But you're down here building a ballroom and having a UFC fight. That is it."},{"speaker":"ANCHOR","text":"And so, when you sit up there in front of Congress and have no empathy for people, that is what they see. And that's the problem here. When Trump went to this war, he never went to the American people and said, this is why I'm going, and this is what I'm doing. So, this is what we're left with."},{"speaker":"ANCHOR","text":"CORNISH: Any lessons learned from the Biden era folks about empathy and the economy? MIKE DUBKE, FORMER TRUMP WHITE HOUSE COMMUNICATIONS DIRECTOR: Really? Yes. Of course. Don't do what Biden did. HAYS: Here we are. DUBKE: And that's exactly where we are. CORNISH: Oh, no, no. I'm being serious. So, when -- DUBKE: I'm being serious, too."},{"speaker":"ANCHOR","text":"CORNISH: -- you look at his answer, you see it as in the same way? DUBKE: I see it in the same way. Look, when I -- when I do, you know, media training or anything on a professional level in communications, one of the things that you need to talk about, especially with public officials, is to show some empathy. And I totally agree with Meghan on that."},{"speaker":"ANCHOR","text":"Now, I will take -- I will say that these four defectors, defectors on the House side, you know, there are other reasons that are going into it, I think -- CORNISH: For sure. DUBKE: -- besides affordability. And we can get into that if you want to. But yes, from -- from the message perspective, this administration does need to understand that there is pain being felt right now."},{"speaker":"ANCHOR","text":"CORNISH: And I understand what you're saying about someone like Thomas Massie, who's a perennial thorn in the side of the administration. I want to put up some information about Representative Tom Barrett, who is a first-term Republican. OK? So, you've got a newbie. But he also is a former Army helicopter pilot."},{"speaker":"ANCHOR","text":"I'm really paying attention to how veterans are behaving politically right now across the political spectrum. And he's facing reelection. And one other person I want to show you, Representative Brian Fitzpatrick of Pennsylvania, represents the Philadelphia suburbs, which I'm sure we'll hear about ad nauseam come election time."},{"speaker":"ANCHOR","text":"But more importantly, former FBI agent; has broken away from the administration before. There is a world of veteran law enforcement -- like, people who kind of speak the lingo and understand the conversation around conflict. And they are not afraid to have a different point of view. MUELLER: One hundred percent. I mean, they are bringing a perspective to this that not everyone on the Hill is."},{"speaker":"ANCHOR","text":"I think, you know, Republicans, congressional Republicans are constantly talking to constituents who are veterans. But it's one thing to be having those conversations and another thing to be coming at it, having done this work yourself. CORNISH: OK, you guys, we're going to talk more about this and some other topics later."},{"speaker":"ANCHOR","text":"Later on CNN, though, I want to get to this, because it doesn't sound like the president is actually letting go of his plans for some sort of anti-weaponization payout fund. And what could, basically, that mean going forward? And then there's actually pandemonium on the streets of New York. The Knicks give fans a reason to be rowdy. And a plane passenger tries to open an exit door mid-flight."},{"speaker":"ANCHOR","text":"Luckily, there was a trained black belt on board. (BEGIN VIDEO CLIP) LONGOOD: The guy tried to, like, attack him and choked him, and I was already ready for something to happen. (END VIDEO CLIP) (COMMERCIAL BREAK) [06:13:42] CORNISH: It is 13 minutes past the hour. Here is your morning roundup. Now, you're looking at the moment an unruly passenger is subdued on a Frontier flight."},{"speaker":"ANCHOR","text":"So, the man allegedly tried to open an exit door, then breached the cockpit, and choked an off-duty flight attendant. Passengers quickly helped take him down. And it just so happens one of those good Samaritans is a trained fighter. (BEGIN VIDEO CLIP) LONGOOD: You can't control what people are going to do and where they're going to do it."},{"speaker":"ANCHOR","text":"So, I think it's just best to be trained, be trained in Jiu Jitsu. At least try out a class so you know how to take care of a real-life situation when something happens. (END VIDEO CLIP) CORNISH: So, the flight was diverted. The suspect was arrested, and he faces multiple charges. Secretary of State Marco Rubio calls Cuba a growing security concern for the U.S."},{"speaker":"ANCHOR","text":"Testifying before lawmakers, he says the administration is trying to figure out who they can talk to on the inside. (BEGIN VIDEO CLIP) MARCO RUBIO, U.S. SECRETARY OF STATE: I think the United States is open to a negotiated situation that puts Cuba on a path towards democracy, prosperity, freedom, normalcy. We would be open to that, and we would work with whoever is open to doing it."},{"speaker":"ANCHOR","text":"Obviously, it will be challenging. There are clearly individuals within the apparatus of power in that country that understand that what they have now is not sustainable and needs to be fixed. (END VIDEO CLIP) CORNISH: Cuba is currently facing an unprecedented energy crisis. For the last five months, the island nation has been cut off from almost any fuel supply."},{"speaker":"ANCHOR","text":"[06:15:10] And here in the U.S., the New York Knicks taking game one of the NBA finals on the road against the Spurs. Jalen Brunson scored 30 points in New York's 105-to-95 win over San Antonio. CNN's Omar Jimenez was outside of Madison Square Garden to see New York's characteristic calm response to the event."},{"speaker":"ANCHOR","text":"(BEGIN VIDEOTAPE) OMAR JIMENEZ, CNN ANCHOR/CORRESPONDENT: This is the reaction after a game one win in the NBA finals for the New York Knicks. We have been outside Madison Square Garden throughout all of this. And look, if you doubt any of the enthusiasm, even for an away game for the Knicks, look no further than the crowd that gathered over the course of this game."},{"speaker":"ANCHOR","text":"But I want to show you what we've been seeing over the course of this as a celebration really begins here in New York City. It's the beginning of a long series. You know that if you're a basketball fan. But you can't tell the people here who have been chanting \"Knicks in four\" for hours. I was talking to them beforehand. They were saying \"Knicks in four\" beforehand, too."},{"speaker":"ANCHOR","text":"So, this is just the beginning. They got a game one. It came down to a back-and-forth game throughout all of it. But the excitement in New York City is the chance to do something they have not done in over five decades. Now that they are back in a place they have not been in more than two decades."},{"speaker":"ANCHOR","text":"So, moving forward, like we said, is a long series, but the enthusiasm here -- UNIDENTIFIED MALE: Yes!!! JIMENEZ: -- it is not going anywhere. It's not going anywhere. See, you can't go far. This is New York. Back to you guys. (END VIDEOTAPE) CORNISH: And Omar was never seen again. Omar is fine. He's going to be following game two. Tips off tomorrow night in San Antonio. I love a happy fandom."},{"speaker":"ANCHOR","text":"DUBKE: I'm glad you've heard from him, though. CORNISH: Yes. He's good. He's good. DUBKE: Yes, OK. CORNISH: He's also tall. You know, he's very, very lucky. OK, you guys, after the break on CNN THIS MORNING, the White House Correspondents' Dinner is getting a second act. Plus, the anti-weaponization fund may be dead, but the president isn't done talking about it."},{"speaker":"ANCHOR","text":"In the meantime, good morning to our viewers in New York, just waking up or still awake after a Knicks win. (COMMERCIAL BREAK) [06:21:41] (BEGIN VIDEO CLIP) TODD BLANCHE, U.S. ACTING ATTORNEY GENERAL: Look, we're not moving forward with the fund. We are not moving forward with the fund, period. We are not moving forward with the fund. REP."},{"speaker":"ANCHOR","text":"GRACE MENG (D-NY): Not moving forward ever? BLANCHE: Correct. We're not moving forward with the fund. We're not moving forward with the fund. We're not moving forward with the fund. We're not moving forward with the fund. (END VIDEO CLIP) CORNISH: Here's the thing. Somehow, people are still asking, are they moving forward with the fund? That $1.776 billion so-called anti-weaponization fund."},{"speaker":"ANCHOR","text":"That was quickly condemned in a bipartisan way when it was rolled out a few weeks ago. But even as the acting attorney general -- you're seeing him right there -- saying it's over, there are other mixed signals. So, Lindsey Graham, for instance, suggested another way to pay out the fund."},{"speaker":"ANCHOR","text":"A top DOJ official, Stanley Woodward, replied, saying, \"We're on it.\" And ABC News reports Woodward posted Tuesday evening in response to Graham's post. And Woodward's post was deleted by Wednesday morning. President Trump also seems unwilling to let the idea go entirely. (BEGIN VIDEO CLIP) DONALD TRUMP, U.S. PRESIDENT: The weaponization fund, as far as I'm concerned, was a beautiful thing."},{"speaker":"ANCHOR","text":"It was something I was -- I didn't make it, but I was -- I heard that, I thought that was the greatest thing. (END VIDEO CLIP) CORNISH: The group chat is back. I'm under the impression that, under federal law, they can't bring it back. So, help me understand. MUELLER: They can't."},{"speaker":"ANCHOR","text":"But they also -- it's very hard to find a plaintiff here, right? Because this is a settlement between two government agencies that are both controlled by Trump. And so, who's the person that can come forward and say they were wronged and challenge this? CORNISH: What about all those people who raised their hands, like, you know, call me? MUELLER: We've seen -- exactly. CORNISH: Michael Cohen."},{"speaker":"ANCHOR","text":"MUELLER: That's what we've seen folks come out and do, for example. You know, folks who were injured in the January 6th riots have said, if you give money to my former attackers, then that is an attack against me. And that's part of why we're seeing this held up in the courts, at least temporarily. CORNISH: Yes."},{"speaker":"ANCHOR","text":"MUELLER: I think the Trump administration saying that this is, at least for now, dead, is a sign that they know the political opposition is too strong. CORNISH: But there's -- he's -- you've got Blanche saying, look, I'm not going to do this. And then you've got everyone else being like, well, maybe, maybe."},{"speaker":"ANCHOR","text":"And is that really just, like, to soften the blow of it not happening? DUBKE: I think we're all missing the -- the -- the active word here that the president used, which was \"was.\" It was a beautiful thing. CORNISH: That was -- and then -- DUBKE: And he -- he didn't. And he didn't bring that up. That was in a press conference yesterday in the Oval Office. CORNISH: Nor did he claim it."},{"speaker":"ANCHOR","text":"He said someone else came up with it. DUBKE: Well, and he was asked a question about it. So, I mean, we're talking about something that I do think is dead for political reasons, especially. But this also we've got a court order that this thing can't go forward. We have members of Congress, especially senators, who are about to enter a vote-a-rama today. CORNISH: Yes."},{"speaker":"ANCHOR","text":"DUBKE: I think Thom Tillis is going to bring his amendment forward. And when he does, I wouldn't be surprised if there's 10 to 15 Republican senators who vote for the Tillis measure to basically kill this thing. So, we can keep talking about it."},{"speaker":"ANCHOR","text":"But even the president said \"was.\" CORNISH: Well, then, let me add part two: the IRS settlement that says, thou shalt not do audits of me or my family in perpetuity. Is it -- basically, we've all distracted ourselves with the fund. And so, this part can go forward? MUELLER: Well, the fund was publicized by DOJ when the settlement was reached."},{"speaker":"ANCHOR","text":"The IRS agreement to not audit Trump or his family for past tax returns was not publicized. CORNISH: Yes. MUELLER: Which I think was an implicit acknowledgment by the administration that this is not a standard thing to do. [06:25:03] HAYS: I was just going to say, this is smoke and mirrors. Like, look over here to this shiny object that no one's ever going to get money."},{"speaker":"ANCHOR","text":"So, we don't have to pay taxes, and no one will ever know how much money my family and I have made off of the administration and or off of us being in office and off the taxpayers' dime. So, I actually think that that's right. And I think that there's more -- there should be more upright -- upheaval over the IRS settlement than this -- this fund that's never going to get any -- get any further."},{"speaker":"ANCHOR","text":"CORNISH: Will there be? Or is there any traction on that conversation on the Republican side? DUBKE: Well, there was at the beginning. CORNISH: Yes. DUBKE: I mean, if you remember when this first came out, that was really what got Republicans off the sideline, was this kind of blanket immunity for the Trump Organization and Trump family."},{"speaker":"ANCHOR","text":"Again, my understanding, staying at a Holiday Inn Express last night, I guess, and not a lawyer, or watching \"Law and Order.\" I don't know, whatever metaphor I -- CORNISH: You're really selling it. DUBKE: -- Can sell on this. Right. CORNISH: You're really selling it to me. DUBKE: Exactly."},{"speaker":"ANCHOR","text":"But my understanding is when the -- when the judge said we're -- we're putting a hold on -- on this, they put a hold on everything. CORNISH: On the -- all parts. Yes. DUBKE: Because it was a -- it was an amendment. Amendment to the larger agreement. CORNISH: Yes, yes. So, we should say there are some aspects of this that somehow are still in the courts, just because of the way it went down."},{"speaker":"ANCHOR","text":"But for now, we are hearing politically backing down. Straight ahead on CNN THIS MORNING, we're going to turn to the war with Iran. We're going to talk about whether this is over, whether it's the beginning of a long, bloody conflict. And then there is some pushback on Pulte. Republicans lashing out against the president's pick for interim director of national intelligence."},{"speaker":"ANCHOR","text":"(COMMERCIAL BREAK) [06:30:00] var CNN = CNN || {};"},{"speaker":"ANCHOR","text":"CNN.com - Transcripts var cnnSiteWideCurrDate = new Date(2013, 1, 12); window.CNNSTATICSECTION = ''; var CNNENV = \"//www.cnn.com\"; Transcript Providers Return to Transcripts main page CNN This Morning Trump To Nominate Blanche For Attorney General; House Rebukes Trump, Approves War Powers Resolution; Rubio To Lawmakers: War With Iran Is \"Over\"."},{"speaker":"ANCHOR","text":"Aired 6:30-7a ET Aired June 04, 2026 - 06:30 ET THIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED. (COMMERCIAL BREAK) [06:30:50] AUDIE CORNISH, CNN ANCHOR: Good morning, everybody. I'm Audie Cornish. Thank you for joining me on CNN THIS MORNING. It is half past the hour, and here's what's happening right now."},{"speaker":"ANCHOR","text":"President Trump expected to nominate Todd Blanche, the acting attorney general, to be the next attorney general. (BEGIN VIDEO CLIP) DONALD TRUMP, PRESIDENT OF THE UNITED STATES: He's acting attorney general."},{"speaker":"ANCHOR","text":"Tomorrow, I'm instructing Dan and everybody else that's involved in that very complicated process, which is going to go, I think, very quickly, that we are going to make him permanent attorney general. (END VIDEO CLIP) CORNISH: Now, Blanche previously served as one of the president's personal defense attorneys. He's been currently serving as acting AG since the firing of Pam Bondi back in April."},{"speaker":"ANCHOR","text":"The White House Correspondents Dinner rescheduled. The event back in April was disrupted by a gunman. President Trump said he wanted it back on. The new dinner will take place July 24th. In a \"Truth Social\" post, the president says he'll be there. And then, a stunning rebuke of Trump. The House approving a War Powers resolution on Wednesday that would halt the US military action against Iran."},{"speaker":"ANCHOR","text":"A handful of Republicans actually joined with Democrats this time, and the resolution is supposed to limit the president's ability to initiate or escalate military hostilities without congressional approval."},{"speaker":"ANCHOR","text":"So the question is, are we at the end or are as some lawmakers are worried about? Are we at the start of something that will be long and protracted with Iran? On Wednesday, Secretary of State Marco Rubio told lawmakers that the war is over. (BEGIN VIDEO CLIP) REP. SARA JACOBS (D-CA): We're taking you at your word. The war is over."},{"speaker":"ANCHOR","text":"Who won? MARCO RUBIO, SECRETARY OF STATE: But first of all, you're not taking me at my word. It's a fact. We're no longer conducting sustained strikes inside of Iran to degrade their military because Epic Fury is over. (END VIDEO CLIP) CORNISH: Here's how the president described it. (BEGIN VIDEO CLIP) TRUMP: We hit them pretty hard the night before and actually last night."},{"speaker":"ANCHOR","text":"(END VIDEO CLIP) CORNISH: So there are fresh hostilities between the U.S. and Iran overnight spilling into neighboring Gulf countries. One person was killed, more than 60 injured, in an Iranian drone strike on Kuwait's airport. So we're bringing in Harrison Mann to the Group Chat. He's a former U.S. Army major and former executive officer of the Defense Intelligence Agency."},{"speaker":"ANCHOR","text":"Thank you so much for being here. So as we talk, we talked about the potential, the hostilities here. I want to talk about the possibility for the deal. Iran over and over keeps bringing up restitution. It wants to be basically its assets unfrozen."},{"speaker":"ANCHOR","text":"Can you talk about what they're looking for and how much of a sticking point this is for the U.S.? HARRISON MANN, FORMER EXECUTIVE OFFICER, DEFENSE INTELLIGENCE AGENCY: First, I want to point out that, you know, this so-called sticking point was that was a demand from before the war, right? When Trump did the surprise attack with Israel in February, what the US and Iran were discussing was some ki"},{"speaker":"ANCHOR","text":"nd of sanctions relief, which would be a de facto release of funds in exchange for freeze on Iran's nuclear enrichment. And so I think it's, in my mind, a little misleading to say this thing that we've known is always going to be in Iranian demand is a sticking point. I think really the principal sticking point remains Trump's lack of interest in actually pushing for a deal."},{"speaker":"ANCHOR","text":"CORNISH: Okay, let me just play a little of it first -- MANN: Yeah. CORNISH: -- so people have some context for what you're talking about. Here's what he said about whether or not a deal could be reached in the coming days. (BEGIN VIDEO CLIP) TRUMP: The negotiation itself has gone very well, actually, very well. REPORTER: Mr."},{"speaker":"ANCHOR","text":"President -- TRUMP: It could have -- even if it happens, and it might not happen, who knows? But if it happens, it could happen like over the weekend. The blockade is the most powerful thing. I think the blockade maybe has more impact than the bombing has, but the blockade that we have the naval blockade is incredible. Not one ship has gotten through unless we wanted it to."},{"speaker":"ANCHOR","text":"And people respect it a lot. (END VIDEO CLIP) MANN: Yeah, so I think -- you know, Trump may actually believe that the blockade is working and he might believe that it's sustainable. The Iranians don't believe either. I think they're pretty confident their ability to withstand some loss of oil sales. [06:35:00] And they really don't like the status quo."},{"speaker":"ANCHOR","text":"It seems like Trump kind of thinks he basically ended the war, and occasional tit-for-tat strikes can go on really forever. The Iranians don't want that. They think they've got an advantage and they want to press it. And so, like we saw with the attack on the Kuwaiti airport, I think they're going to actually start escalating a little more to try and break this impasse."},{"speaker":"ANCHOR","text":"CORNISH: Against allies, U.S. allies of the region, this idea of just spreading it into the region more. MANN: I think against U.S. forces and against U.S. partners, which they still hold responsible because U.S. attacks are sometimes launched from their territory."},{"speaker":"ANCHOR","text":"And so I think they are going to basically -- they have found also their strategy is not working because Trump is not actually convinced that he has to change the status quo. So they're pretty willing to go back to war more than Trump is. And I think we're going to see them push closer and closer if Trump doesn't actually get serious about making a peace deal."},{"speaker":"ANCHOR","text":"CORNISH: Can I also get your opinion on this war vote? We were all talking about why these various Republicans, there's only a few, right, four, who have decided to vote against the president going to war and being able to do more hostilities. And we were looking at issues like reelection, what districts, what state."},{"speaker":"ANCHOR","text":"Can you talk about what you know about their backgrounds and whether you think there is also a broader conversation happening within the vet community about this? MANN: Yeah, I think these defections, which I don't want to call them that because these Congress members of Congress did the right thing, right? They're trying to end this war, represent two things."},{"speaker":"ANCHOR","text":"One, the costs of the war and the kind of stupidity of the war have become impossible to ignore, right? We're three months in. You can't pretend Trump's got a plan. You can't ignore the very visible and tangible economic effects, right? I saw you playing before fertilizer, increasing the cost of food, and of course, the pain at the gas pump."},{"speaker":"ANCHOR","text":"On top of that, I think the most recent generation of veterans who served in the war on terror in some capacity, contrasted maybe with Lindsey Graham, who's also a veteran. CORNISH: Well, Pete Hegseth. MANN: Or Pete Hegseth. CORNISH: I mean, remember, there are people in power here who have that same experience. That's why I'm wondering about the divide. MANN: Yeah, I do."},{"speaker":"ANCHOR","text":"You know, as a veteran, I don't want to say that putting a veteran in a leadership position automatically means they're going to make a good decision, right? You got Pete Hegseth. You got J.D. Vance. You had Tulsi Gabbard, you know, for her short-lived DNI career."},{"speaker":"ANCHOR","text":"But some of them clearly took the correct lesson away from the war on terror, which was we shouldn't be doing these stupid, destructive wars for no reason. And it's really clear, it's been clear from the start, that's what this is going to be."},{"speaker":"ANCHOR","text":"I think tons of Republicans, both veterans and not, have understood this, were biting their tongue basically to see if Trump could resolve this quickly and they could avoid having to take a stand. So yeah, I think these four are probably just the tip of the iceberg. You know, we've seen some Republican senators also threaten in the past to support War Powers resolutions."},{"speaker":"ANCHOR","text":"And I think we're only going to see more of this -- CORNISH: It is. MANN: -- especially as, you know folks understand that their lives are getting qualitatively worse and more expensive because of the war. CORNISH: Well, right now, it's still just a trickle politically. I'll let you know and bring you back when it becomes a wave, all right, if we see more people jump on."},{"speaker":"ANCHOR","text":"Thank you so much for being here. We just mentioned national intelligence and the president's choice to become acting director of national intelligence is actually getting a lot of blowback on Capitol Hill. The person he's chosen is named Bill Pulte to oversee the nation's intelligence agencies. He does not have a background in intelligence."},{"speaker":"ANCHOR","text":"His current job is at the administration's Federal Housing Finance Agency and Fannie Mae and Freddie Mac. But from that job, he's also managed to launch criminal investigations into several of the president's political foes. One White House source said the change from Trump was easy, saying, quote, Trump likes Tulsi, but she's very methodical. She's a thinker."},{"speaker":"ANCHOR","text":"Bill is a move fast and break things kind of guy, the source said. Many senators, including Republicans, but Pulte is not the right guy for the job. (BEGIN VIDEO CLIP) SEN. JOHN CORNYN (R-TX): I see no evidence of any qualifications for that job. SEN. THOM TILLIS (R-NC): I think he's the worst form of sycophant and advisor to the president that is going to hurt the president's legacy."},{"speaker":"ANCHOR","text":"(END VIDEO CLIP) CORNISH: So the group chat is back. I got to go to our friend here at \"Semafor\" because you got the scoop. You got scoops about how this guy got pushed to the forefront, how you went from, \"hey, handle the houses\" to \"hey, handle 18 intelligence agencies\"."},{"speaker":"ANCHOR","text":"ELEANOR MUELLER, WHITE HOUSE ECONOMY POLICY REPORTER, SEMAFOR: Yeah, I've been covering Bill Pulte for a long time since actually he was nominated as FHFA director and he came in hot. He laid off a ton of executives. He made himself chairman of Fannie and Freddie, which was an unprecedented move. And he completely overhauled a ton of different policies."},{"speaker":"ANCHOR","text":"And since then, he's kept up that momentum, right? We've seen him lead the charge. CORNISH: Which is hard, houses. Houses is your job. MUELLER: Well -- CORNISH: So how did he end -- (CROSSTALK) MUELLER: -- your job, right? We've seen him submit the criminal inquiry to the Justice Department that was the basis for Trump's attempt to fire Fed Governor Lisa Cook."},{"speaker":"ANCHOR","text":"[06:40:00] He's clashed with cabinet members, including Scott Bessent, over basically encouraging Trump to fire Fed Chair Jerome Powell. And that is what his supporters wanted him to bring to this job, right? Roger Stone, Tulsi Gabbard, these are folks who said, this is what we need. We need someone who's not going to necessarily respect the typical M.O."},{"speaker":"ANCHOR","text":"and instead come in and just get stuff done. And clearly Trump agreed. CORNISH: It's interesting because he's got, as you said, he comes in hot. And somebody who comes in equally hot in response is the Treasury Secretary Bessent. And it's been Washington lore that they had a fistfight for a long time, confirmed."},{"speaker":"ANCHOR","text":"And in this moment in a hearing on Wednesday, Tom Tillis asked about it, kind of as a character witness, so to speak. And here's what Bessent had to say. (BEGIN VIDEO CLIP) TILLIS: Did you actually tell Pulte you were going to punch him in the face? SCOTT BESSENT, TREASURY SECRETARY: No, sir. I actually said I was going to kick his ass. TILLIS: Good. Okay, good. I share the emotion. Thank you."},{"speaker":"ANCHOR","text":"BESSENT: And as I said, that was last summer, summer of '25. And many teams have fights in the locker room and then go out and win for the team on the table. TILLIS: Yeah. (END VIDEO CLIP) CORNISH: Fights in the locker room. I'm being judgmental. I'm like, you've seen a locker room. What do you see when he's talking about this? I don't think that's totally wrong."},{"speaker":"ANCHOR","text":"MANN: Yeah, I mean, I think first of all, like Trump, Trump loves it when people are competing for his affection. Like that's -- that's kind of his ideal. You know, I'm not. I'm not."},{"speaker":"ANCHOR","text":"It's tough for me to imagine him getting a fight with anybody, but I think like I'm much more kind of scared here about the idea of putting somebody who's even more of a kind of submissive loyalist than Tulsi Gabbard into this role. Yeah, Pulte has shown kind of extraordinary talent for weaponizing the pretty obscure position that he was originally in."},{"speaker":"ANCHOR","text":"But I think really anybody who's a loyalist to Trump, even if it's not Pulte, even if they find somebody who has like better resume than Pulte, could use the DNI position to cause a lot of harm. CORNISH: Yeah, and this is one of those things where it starts out about being one thing, like the weaponization fund, and it causes problems for other priorities. In that case, it was immigration."},{"speaker":"ANCHOR","text":"With this one, with Pulte, all of a sudden, you've got some senators like Warner who had been working on a bipartisan deal on FISA being like, oh, you want this guy? Well, let's have a conversation about the FISA rules."},{"speaker":"ANCHOR","text":"And can it disrupt other priorities? Is it worth it to get this guy in? MIKE DUBKE, FORMER TRUMP WHITE HOUSE COMMUNICATIONS DIRECTOR: Well, first of all, Pulte's never going to be the nominee, and I'll just say that. I don't think he -- CORNISH: Oh, really? DUBKE: I believe that. I think that this is -- MUELLER: That is true. Trump said he was making him acting DNI."},{"speaker":"ANCHOR","text":"I think they knew from the jump that he could never get confirmed by the Senate. DUBKE: The bigger political question here is why poke the bear of the Senate for any reason on this by putting Pulte in this position? And that, I think, especially when you've got FISA reauthorization, you know, that the deadline for that coming up -- CORNISH: Yeah, it's going to sunset."},{"speaker":"ANCHOR","text":"DUBKE: It is a -- it is a fight that maybe wasn't worth picking for this guy. But let's be just clear about this. Pulte is a flash in the pan in terms of DNI. MEGHAN HAYS, FORMER BIDEN WHITE HOUSE DIRECTOR OF MESSAGE PLANNING: Yeah, I just think he can do a lot of harm while he's there, right? We have elections coming up. Their whole thing is to prove that the '20 elections didn't happen."},{"speaker":"ANCHOR","text":"Tulsi Gabbard was in Georgia. Why? Who knows? This guy's already shown that he's going to weaponize more. Now you're going to weaponize 18 intelligence agencies. I mean, it's just disgusting. I just didn't know -- to his point, I just didn't know that you could have someone less qualified to be in this role. And I think it should scare the American people."},{"speaker":"ANCHOR","text":"And it's clearly making noise in the Senate. DUBKE: Just because she was a Democrat. I didn't think she was less qualified."},{"speaker":"ANCHOR","text":"HAYS: I mean -- CORNISH: I just want to say that -- I want to end with you, Eleanor, because you talked to like industry people from banking and even they were like, we don't understand why you would put this guy who in his regular real-time job went into the tickle files unprompted. He gained files for people to investigate and presented them and now put him in front of top secret documentation."},{"speaker":"ANCHOR","text":"MUELLER: I think it shocked many people within the banking industry who have seen firsthand what he's done at FHFA since he was picked last year. I was with Senator Warner when the last DNI stepped down and he said explicitly, you know, we want to see someone who's going to stay in their lane like past DNIs have."},{"speaker":"ANCHOR","text":"And with Pulte, he has a very cut and dry track record of very much not doing that, not only on these issues of mortgage fraud, but also on housing policies like the 50-year mortgage, where he's taken advantage of this personal relationship with Trump to bring him ideas that the rest of the party has then immediately said, absolutely not. CORNISH: Blown up. Yeah, yeah."},{"speaker":"ANCHOR","text":"Before I let you go, can I ask how much damage can they do? Is this a job -- some people thought Tulsi was sidelined in a lot of ways. People have always complained about this gig, whether it really does do anything. What kind of access will he have to top secret materials and what's the concern? MANN: So he won't just have incredible access. There's 18 intelligence agencies."},{"speaker":"ANCHOR","text":"[06:45:00] Other than the CIA and the FBI, the rest of them don't really have representation in the White House. They don't have the same representation or the same level on the Hill. So they are much more sensitive to the demands of the DNI, right? We saw there's a feud between Ratcliffe, the CIA, and Gabbard."},{"speaker":"ANCHOR","text":"That's not going to happen with the Office of Naval Intelligence or, you know, even the intel agency that's under DHS. He sets budgetary priorities, like in bureaucratic world, he can exercise a lot of control over these other agencies, and he can use that to basically investigate Americans or target Americans."},{"speaker":"ANCHOR","text":"I think it's a good thing that Trump's authoritarianism basically got in the way of itself, and he's disrupting the renewal of FISA Section 702, because I don't want somebody like Pulte or Kash Patel to have access to that kind of basically warrantless surveillance of us. But that's the kind of stuff he could do and could exploit. A lot of the authorities of the I.C."},{"speaker":"ANCHOR","text":"have already been abused or misused, you know, not just under Gabbard, but under previous administrations. If this is a guy who could weaponize, you know, housing finance, there is a lot he can do with the intel world. CORNISH: Okay, Harrison, thank you so much for being here. Coming up on CNN, there's another setback for the president. We mentioned the anti-weaponization fund, all but dead."},{"speaker":"ANCHOR","text":"Are we at this kind of turning point in this presidency? (BEGIN VIDEO CLIP) REP. THOMAS MASSIE (R-KY): I think it sends a good message from the People's House that people are tired of war. (END VIDEO CLIP) CORNISH: Which leads us to that rebuke. The House passes a War Powers resolution to limit his authority in Iran."},{"speaker":"ANCHOR","text":"We're going to talk with Congressman Kevin Kiley, the only independent in the House, about it. He's here next. (COMMERCIAL BREAK) [06:50:48] CORNISH: So what's going on with Republicans and President Trump? Well, before the break, we were talking about this outcry over his pick for the interim director of National Intelligence. (BEGIN VIDEO CLIP) SEN."},{"speaker":"ANCHOR","text":"KEVIN CRAMER (R-ND): Well, I think it's a funny pick, to say the least. It seems like a funny pick. It's interim for now, I guess. We'll see. But I think it's a big -- but remember, he's replacing Tulsi Gabbard, who was a Democrat not very long ago. MASSIE: I don't think he has any experience whatsoever that translates into that position."},{"speaker":"ANCHOR","text":"So I'm not sure why he was put there other than maybe he's just considered to be very loyal to the president. (END VIDEO CLIP) CORNISH: Then there's that $1.776 billion anti-weaponization fund. Trump's DOJ is basically saying that's dead, even though some senators don't buy it. (BEGIN VIDEO CLIP) REP. BRIAN FITZPATRICK (R-PA): On this issue is not dead. It's not over. We have to fix the law."},{"speaker":"ANCHOR","text":"TILLIS: We got either eliminate it, streamline it, guardrail it. It can't go in its current form. And if that's the only choice we should have, we should eradicate it. (END VIDEO CLIP) CORNISH: And in the biggest backlash of his presidency, four Republicans voted to limit the president's war powers in Iran. (BEGIN VIDEO CLIP) REP."},{"speaker":"ANCHOR","text":"TOM BARRETT (R-MI): And I definitely feel what people are experiencing back home. You know, I go back home to my district every single week. You know, I fill up my gas tank too. I have four kids. We're taking them to practice. We're taking them to school. We're driving throughout my district. I see it as well. It's not something that I'm unaware of."},{"speaker":"ANCHOR","text":"(END VIDEO CLIP) CORNISH: So every one of the people we just heard from all Republicans. So we're asking whether or not we're at a kind of turning point for Trump's presidency. And joining the group chat, we have someone who used to be a Republican and is now an independent, Congressman Kevin Kiley of California. Welcome back."},{"speaker":"ANCHOR","text":"Congratulations are in order, I suppose, right? The last time you were here, we weren't -- REP. KEVIN KILEY (I-CA): Sure, I'll take it. CORNISH: You'll ta
