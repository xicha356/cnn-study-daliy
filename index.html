<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CNN 英语精读</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700;800&family=Literata:wght@500;600;700&display=swap');
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#232635;--bg4:#2a2d3e;
  --border:#2e3247;--border2:#3a4060;
  --text:#e8eaf0;--text2:#8b90a7;--text3:#5a5f7a;
  --blue:#4a9eff;--blue-dim:#1a3a5c;--blue2:#2563a8;
  --red:#cc0000;--green:#2ecc71;--amber:#f0a500;
  --coral:#e05a3a;--teal:#1abc9c;--purple:#a78bfa;
  --hl-yellow:rgba(250,200,40,.22);
  --hl-yellow-border:rgba(250,200,40,.7);
  --hl-active:rgba(250,200,40,.45);
  --r:10px;--font:'Segoe UI',system-ui,sans-serif;--mono:'Consolas',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}

/* ── Layout ── */
.layout{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
@media(max-width:800px){.layout{grid-template-columns:1fr}.sidebar{display:none}}

/* ── Sidebar ── */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:1.25rem 0;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:0}
.sidebar-logo{padding:.75rem 1.25rem 1rem;font-size:17px;font-weight:700;letter-spacing:-.5px;border-bottom:1px solid var(--border);margin-bottom:.5rem}
.sidebar-logo span{color:var(--red)}
.sidebar-section{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:.75rem 1.25rem .25rem}
.hist-item{display:flex;align-items:center;padding:.55rem 1.25rem;cursor:pointer;font-size:13px;color:var(--text2);gap:8px;transition:all .15s;border-left:2px solid transparent}
.hist-item:hover{background:var(--bg3);color:var(--text)}
.hist-item.active{background:var(--bg3);color:var(--blue);border-left-color:var(--blue)}
.hist-item .date{font-family:var(--mono);font-size:12px}
.hist-item .dot{width:6px;height:6px;border-radius:50%;background:var(--border2);flex-shrink:0}
.hist-item.active .dot{background:var(--blue)}
.sidebar-nav{margin-top:auto;border-top:1px solid var(--border);padding-top:.5rem}
.nav-item{display:flex;align-items:center;gap:8px;padding:.55rem 1.25rem;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s}
.nav-item:hover{color:var(--text)}
.nav-item.active{color:var(--blue)}

/* ── Main ── */
.main{display:flex;flex-direction:column;min-height:100vh;min-width:0}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.topbar-title{font-size:15px;font-weight:500;flex:1}
.topbar-date{font-size:12px;color:var(--text2);font-family:var(--mono)}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.badge-auto{background:#0d2a1a;color:var(--green);border:1px solid #1a4a2a}
.btn{padding:6px 14px;border:none;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.btn-src{background:var(--bg3);color:var(--text2);font-size:12px}
.btn-src:hover{color:var(--blue)}
.icon-btn{border:1px solid var(--border);background:var(--bg3);color:var(--text2);border-radius:7px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-width:32px;height:30px;padding:0 9px;font-size:12px;transition:all .15s;white-space:nowrap}
.icon-btn:hover:not(:disabled){color:var(--blue);border-color:var(--blue);background:var(--blue-dim)}
.icon-btn:disabled{opacity:.45;cursor:not-allowed}
.icon-btn.playing{color:#fff;border-color:var(--green);background:#0d2a1a}
.icon-btn.loading{color:var(--amber);border-color:var(--amber)}

.content{flex:1;padding:1.5rem;min-width:0}

/* ── Tabs ── */
.tabs{display:flex;gap:4px;margin-bottom:1.5rem;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:4px;max-width:100%}
.tab{flex:1;padding:7px 0;font-size:13px;text-align:center;border-radius:7px;cursor:pointer;color:var(--text2);transition:all .15s}
.tab.active{background:var(--blue);color:#fff}
.section{display:none;min-width:0;max-width:100%}.section.active{display:block}

/* ── Summary ── */
.summary-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:1.5rem;max-width:100%}
.card-label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.summary-text{font-size:15px;line-height:1.85}

/* ── Full Transcript ── */
.transcript-wrap{display:grid;grid-template-columns:1fr 320px;gap:1.25rem;align-items:start;min-width:0}
@media(max-width:900px){.transcript-wrap{grid-template-columns:1fr}}
.transcript-body{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;font-size:14.5px;line-height:2;position:relative;overflow-wrap:anywhere}
.transcript-hint{font-size:12px;color:var(--text2);margin-bottom:1rem;padding:.5rem .75rem;background:var(--bg3);border-radius:6px;border-left:2px solid var(--blue)}
.transcript-wrap>*,.transcript-hint,.transcript-body{min-width:0;max-width:100%}
.control-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:1rem;flex-wrap:wrap}
.filter-group{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:3px}
.filter-btn{border:0;background:transparent;color:var(--text2);font-size:12px;padding:5px 10px;border-radius:6px;cursor:pointer}
.filter-btn.active{background:var(--blue);color:#fff}
.review-btn{border:1px solid var(--border);background:var(--bg3);color:var(--text2);border-radius:999px;padding:3px 9px;font-size:11px;cursor:pointer;white-space:nowrap}
.review-btn.reviewing{border-color:var(--amber);color:var(--amber);background:#2a1a0a}
.review-btn.mastered{border-color:var(--green);color:var(--green);background:#0d2a1a}

/* paragraph */
.para{margin-bottom:1.1rem}
.para:last-child{margin-bottom:0}
.speaker-tag{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:3px;background:#1a2a4a;color:#7eb8f7;letter-spacing:.06em;margin-right:6px;vertical-align:middle;white-space:nowrap}

/* highlight */
.hl{background:var(--hl-yellow);border-bottom:2px solid var(--hl-yellow-border);border-radius:2px;cursor:pointer;transition:background .15s;padding:0 1px}
.hl:hover,.hl.active{background:var(--hl-active)}
.hl.level-考研{border-bottom-color:#f0a500}
.hl.level-六级{border-bottom-color:#4a9eff}
.hl.level-专八,.hl.level-专四{border-bottom-color:#a78bfa}
.hl.level-时事词汇{border-bottom-color:#2ecc71}

/* tooltip popup */
.vocab-popup{position:fixed;z-index:200;max-width:300px;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r);padding:1rem 1.1rem;box-shadow:0 8px 32px rgba(0,0,0,.5);display:none;pointer-events:none}
.vocab-popup.show{display:block}
.vp-head{display:flex;align-items:center;gap:8px}
.vp-main{flex:1;min-width:0}
.vp-word{font-size:17px;font-weight:700;color:#fff}
.vp-ph{font-size:12px;color:var(--text2);font-family:var(--mono);margin-left:6px}
.vp-badges{display:flex;gap:5px;margin:5px 0}
.vp-pos{font-size:11px;padding:1px 7px;border-radius:20px;background:#1a2a4a;color:#7eb8f7;font-weight:500}
.vp-lv{font-size:11px;padding:1px 7px;border-radius:20px;background:#2a1a0a;color:#f0a060;font-weight:500}
.vp-cn{font-size:14px;color:var(--blue);font-weight:500;margin-bottom:3px}
.vp-en{font-size:12px;color:var(--text2);line-height:1.6}

/* word panel (right side) */
.word-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem;position:sticky;top:80px}
.word-panel-title{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.word-list{display:flex;flex-direction:column;gap:4px;max-height:calc(100vh - 200px);overflow-y:auto}
.word-chip{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:7px;cursor:pointer;transition:all .15s;border:1px solid transparent}
.word-chip:hover{background:var(--bg3);border-color:var(--border)}
.word-chip.active{background:var(--blue-dim);border-color:var(--blue)}
.wc-word{font-size:14px;font-weight:500;color:var(--text)}
.wc-cn{font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wc-lv{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.wc-actions{display:flex;gap:4px;margin-left:auto}
.wc-actions .icon-btn{min-width:28px;width:28px;height:26px;padding:0}
.wc-actions .review-btn{font-size:10px;padding:2px 6px}

/* ── Vocab Cards ── */
.vocab-grid{display:flex;flex-direction:column;gap:10px}
.vcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;transition:border .15s}
.vcard:hover{border-color:var(--border2)}
.vhead{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.vhead-main{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;flex:1}
.vactions{display:flex;gap:6px;align-items:center;margin-left:auto;flex-wrap:wrap}
.vword{font-size:18px;font-weight:700;color:#fff}
.vph{font-size:13px;color:var(--text2);font-family:var(--mono)}
.bpos{font-size:11px;padding:2px 8px;border-radius:20px;background:#1a2a4a;color:#7eb8f7;font-weight:500}
.blv{font-size:11px;padding:2px 8px;border-radius:20px;background:#2a1a0a;color:#f0a060;font-weight:500}
.vcn{font-size:14px;color:var(--blue);font-weight:500;margin-bottom:4px}
.ven{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:8px}
.veg{padding:8px 12px;background:var(--bg3);border-left:2px solid var(--blue);border-radius:0 6px 6px 0;font-size:13px;line-height:1.75}
.veg em{color:var(--blue);font-style:normal;font-weight:600}
.vegcn{font-size:12px;color:var(--text2);margin-top:4px}

/* ── Sentences ── */
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:12px}
.shead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
.snum{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;font-size:12px;font-weight:700;margin-bottom:10px}
.shead .snum{margin-bottom:0}
.sen-en{font-size:15px;line-height:1.9;margin-bottom:10px}
.sen-cn{font-size:14px;color:#6ab4f5;line-height:1.75;padding:8px 12px;background:var(--bg3);border-radius:6px;margin-bottom:10px}
.alabel{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.abody{font-size:13px;line-height:1.75;margin-bottom:8px}
.hl2{color:var(--coral);font-weight:600}
.divider{height:1px;background:var(--border);margin:10px 0}

/* ── Topics ── */
.tcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:12px}
.ttitle{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:600;margin-bottom:10px}
.tdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tcontent{font-size:13px;color:var(--text2);line-height:1.85;margin-bottom:8px}
.tkw{font-size:12px;color:var(--blue)}

/* ── Quiz ── */
.qmeta{display:flex;align-items:center;gap:10px;margin-bottom:14px;font-size:12px;color:var(--text2)}
.qbar-w{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.qbar-f{height:100%;background:var(--blue);border-radius:3px;transition:width .3s}
.qcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem}
.qbadge{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;margin-bottom:12px;font-weight:600}
.qbadge.vocab{background:#1a2a4a;color:#7eb8f7}
.qbadge.sentence{background:#2a1a2a;color:#c090f0}
.qqtext{font-size:15px;line-height:1.8;margin-bottom:1.25rem;white-space:pre-line}
.qopts{display:flex;flex-direction:column;gap:8px}
.qopt{padding:11px 16px;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px;background:var(--bg3);transition:all .15s;line-height:1.5}
.qopt:hover:not(.disabled){border-color:var(--blue);color:var(--blue);background:var(--blue-dim)}
.qopt.correct{border-color:var(--green);color:var(--green);background:#0d2a1a}
.qopt.wrong{border-color:var(--coral);color:var(--coral);background:#2a120a}
.qopt.disabled{cursor:default}
.qexp{margin-top:12px;padding:12px 14px;background:var(--bg3);border-radius:8px;font-size:13px;color:var(--text2);display:none;line-height:1.75;border-left:3px solid var(--amber)}
.qexp.show{display:block}
.qnext{margin-top:12px;padding:9px 20px;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;display:none}
.qnext:hover{background:#3a8ef0}
.qnext.show{display:inline-block}
.score-panel{text-align:center;padding:2.5rem}
.score-num{font-size:64px;font-weight:800;color:var(--blue);line-height:1}
.score-sub{font-size:16px;color:var(--text2);margin-top:8px}
.score-stars{font-size:28px;margin:10px 0}
.btn-restart{margin-top:16px;padding:10px 24px;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500}

/* ── Empty ── */
.empty{text-align:center;padding:5rem 1rem;color:var(--text2)}
.empty h3{font-size:18px;color:var(--text);margin-bottom:8px}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

@media(max-width:800px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .topbar{flex-wrap:wrap;gap:8px;padding:.75rem 1rem}
  .topbar-title{flex:1 0 100%}
  .content{padding:1rem}
  .tabs{overflow-x:auto}
  .tab{flex:0 0 auto;min-width:82px;padding:7px 10px}
}
@media(max-width:520px){
  .badge-auto{display:none}
  .btn{padding:6px 10px}
  .topbar-date{font-size:11px}
}

/* ── Editorial redesign ── */
:root{
  --paper:#f3efe4;--paper2:#fbf7ed;--paper3:#e8decd;
  --ink:#14171f;--ink2:#47505a;--muted:#7c7367;
  --line:#d7cbb8;--line2:#b9aa93;
  --red:#c5222b;--red2:#8f1620;--blue:#155d73;--blue-dim:#dcecf0;
  --green:#1d7d55;--amber:#a96612;--coral:#bf4c34;--purple:#6d4ea1;
  --bg:var(--paper);--bg2:var(--paper2);--bg3:#eee5d4;--bg4:#fffaf0;
  --border:var(--line);--border2:var(--line2);
  --text:var(--ink);--text2:var(--ink2);--text3:var(--muted);
  --hl-yellow:rgba(197,34,43,.1);--hl-yellow-border:rgba(197,34,43,.82);
  --hl-active:rgba(197,34,43,.2);
  --r:6px;--font:'IBM Plex Sans Condensed','Avenir Next Condensed','Arial Narrow',sans-serif;
  --serif:'Newsreader',Georgia,serif;--mono:'SFMono-Regular','Consolas',monospace;
}
body{
  background:
    linear-gradient(90deg,rgba(20,23,31,.035) 1px,transparent 1px) 0 0/34px 34px,
    radial-gradient(circle at 85% 12%,rgba(197,34,43,.12),transparent 32%),
    linear-gradient(180deg,#f8f3e8 0%,#eee4d2 100%);
  color:var(--ink);
}
body:before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(rgba(20,23,31,.18) .45px,transparent .45px);
  background-size:4px 4px;opacity:.18;mix-blend-mode:multiply;
}
.layout{position:relative;z-index:1;grid-template-columns:238px minmax(0,1fr)}
.sidebar{
  background:#151922;color:#f5eddf;border-right:0;box-shadow:10px 0 36px rgba(20,23,31,.18);
}
.sidebar-logo{
  font-family:var(--serif);font-size:26px;line-height:1;padding:1.35rem 1.2rem 1.2rem;
  border-bottom:1px solid rgba(255,255,255,.16);letter-spacing:-.03em;
}
.sidebar-logo span{
  display:inline-grid;place-items:center;width:46px;height:34px;margin-right:7px;
  background:var(--red);color:#fff;font-family:var(--font);font-size:16px;letter-spacing:.04em;
}
.sidebar-section{color:#bcae98;padding:1rem 1.2rem .35rem}
.hist-item{padding:.66rem 1.2rem;color:#d8ccb9;border-left:4px solid transparent;font-size:14px}
.hist-item:hover{background:rgba(255,255,255,.07);color:#fff}
.hist-item.active{background:rgba(197,34,43,.18);color:#fff;border-left-color:var(--red)}
.hist-item .dot{background:#695f50}.hist-item.active .dot{background:#fff}
.sidebar-nav{border-top:1px solid rgba(255,255,255,.14)}.nav-item{color:#d8ccb9}.nav-item:hover{color:#fff}
.topbar{
  background:rgba(248,243,232,.88);backdrop-filter:blur(16px);border-bottom:1px solid rgba(20,23,31,.1);
  padding:.9rem clamp(1rem,3vw,2.3rem);box-shadow:0 8px 28px rgba(20,23,31,.07);
}
.topbar-title{font-family:var(--serif);font-size:20px;font-weight:700;letter-spacing:-.025em}
.badge-auto{background:#e3efe6;color:var(--green);border-color:#b6d1bd;border-radius:2px;text-transform:uppercase;letter-spacing:.05em}
.btn,.icon-btn,.qnext,.btn-restart{border-radius:2px;font-family:var(--font);font-weight:700;letter-spacing:.03em}
.btn-src,.icon-btn{background:#171b23;color:#fff;border:1px solid #171b23;box-shadow:3px 3px 0 rgba(197,34,43,.25)}
.btn-src:hover,.icon-btn:hover:not(:disabled){background:var(--red);border-color:var(--red);color:#fff;transform:translate(-1px,-1px)}
.icon-btn:disabled{background:#d9cfbd;color:#938977;border-color:#c7bba8;box-shadow:none}
.icon-btn.playing{background:var(--green);border-color:var(--green);color:#fff}
.icon-btn.loading{background:var(--amber);border-color:var(--amber);color:#fff}
.content{padding:clamp(1rem,3vw,2.5rem);max-width:1360px;width:100%;margin:0 auto}
.study-hero{
  position:relative;overflow:hidden;background:#151922;color:#fff;border:1px solid #151922;
  border-radius:2px;padding:clamp(1.4rem,4vw,3rem);margin-bottom:1.4rem;
  box-shadow:12px 12px 0 rgba(197,34,43,.12);
}
.study-hero:before{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 0 56%,rgba(197,34,43,.26) 56% 58%,transparent 58%),radial-gradient(circle at 82% 25%,rgba(255,255,255,.12),transparent 28%);pointer-events:none}
.kicker{position:relative;color:#f3c3b0;font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;margin-bottom:.55rem}
.hero-title{position:relative;font-family:var(--serif);font-size:clamp(36px,7vw,78px);line-height:.94;letter-spacing:-.055em;max-width:900px}
.hero-meta{position:relative;display:flex;gap:8px;flex-wrap:wrap;margin-top:1rem;color:#d7cbb8;font-size:13px}
.meta-pill{border:1px solid rgba(255,255,255,.2);padding:4px 9px;background:rgba(255,255,255,.06)}
.summary-card{
  background:var(--paper2);border:1px solid var(--line);border-left:8px solid var(--red);
  border-radius:2px;padding:1.15rem 1.25rem;box-shadow:0 14px 34px rgba(20,23,31,.08);
}
.card-label,.word-panel-title,.alabel{color:var(--red2);font-weight:700;letter-spacing:.14em}
.summary-text{font-family:var(--serif);font-size:18px;line-height:1.75;color:#252a32}
.tabs{
  background:transparent;border:0;border-bottom:2px solid #171b23;border-radius:0;padding:0;gap:0;margin-bottom:1.35rem;
}
.tab{
  flex:0 0 auto;padding:9px 16px;border:1px solid var(--line);border-bottom:0;border-radius:2px 2px 0 0;
  background:#e8decd;color:#4b443b;font-weight:700;margin-right:5px;
}
.tab:hover{background:#f6efe2;color:#171b23}.tab.active{background:#171b23;color:#fff}
.transcript-wrap{grid-template-columns:minmax(0,1fr) 310px;gap:1.1rem}

<script>
const ALL_DATA = {"2026-06-08":{"date":"2026-06-08","source_url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-08/segment/01","summary":"以色列与伊朗相互发射导弹，伊朗瞄准以色列拉马特戴维空军基地，以色列打击伊朗石化厂和防空系统。胡塞武装向以色列发射导弹。黎巴嫩总统指责伊朗利用黎巴嫩作为谈判筹码。特朗普与内塔尼亚胡通话，试图控制局势。油价上涨。菲律宾发生7.8级地震。","vocabulary":[{"word":"trade missile attacks","phonetic":"/treɪd ˈmɪsaɪl əˈtæks/","pos":"phrase","level":"时事词汇","cn":"相互发动导弹袭击","en":"to exchange missile strikes","excerpt":"Israel and Iran trading missile attacks","example_cn":"以色列和伊朗相互发动导弹袭击。","audio_url":"output/audio/vocab/2026-06-08/trade-missile-attacks-80e6bbd5.mp3"},{"word":"fragile ceasefire","phonetic":"/ˈfrædʒaɪl ˈsiːsfaɪər/","pos":"noun phrase","level":"考研","cn":"脆弱的停火","en":"a ceasefire that is easily broken","excerpt":"the fragile ceasefire survive this test","example_cn":"脆弱的停火经受住了这次考验。","audio_url":"output/audio/vocab/2026-06-08/fragile-ceasefire-faf52573.mp3"},{"word":"in defiance of","phonetic":"/ɪn dɪˈfaɪəns ʌv/","pos":"prepositional phrase","level":"六级","cn":"无视；违抗","en":"in opposition to; disregarding","excerpt":"those retaliatory strikes appear to be in defiance of President Trump","example_cn":"那些报复性打击似乎是在违抗特朗普总统。","audio_url":"output/audio/vocab/2026-06-08/in-defiance-of-d36d46cf.mp3"},{"word":"hold off on","phonetic":"/hoʊld ɔːf ɒn/","pos":"phrasal verb","level":"考研","cn":"推迟；暂缓","en":"to delay doing something","excerpt":"told him to hold off on striking back","example_cn":"告诉他暂缓反击。","audio_url":"output/audio/vocab/2026-06-08/hold-off-on-b351159f.mp3"},{"word":"barrage","phonetic":"/bəˈrɑːʒ/","pos":"noun","level":"六级","cn":"弹幕；齐射","en":"a concentrated artillery or missile bombardment","excerpt":"approximately three barrages in that first wave","example_cn":"第一波大约有三轮齐射。","audio_url":"output/audio/vocab/2026-06-08/barrage-622886cf.mp3"},{"word":"intercept","phonetic":"/ˌɪntərˈsept/","pos":"verb","level":"考研","cn":"拦截","en":"to stop or catch something in transit","excerpt":"most of those have been intercepted","example_cn":"大多数已被拦截。","audio_url":"output/audio/vocab/2026-06-08/intercept-c1feeaa7.mp3"},{"word":"escalation ladder","phonetic":"/ˌeskəˈleɪʃən ˈlædər/","pos":"noun phrase","level":"时事词汇","cn":"升级阶梯（冲突逐步升级的步骤）","en":"a series of steps that lead to increased conflict","excerpt":"on the escalation ladder","example_cn":"在升级阶梯上。","audio_url":"output/audio/vocab/2026-06-08/escalation-ladder-fca1b991.mp3"},{"word":"proxy","phonetic":"/ˈprɒksi/","pos":"noun","level":"考研","cn":"代理人；代理","en":"a person or group authorized to act on behalf of another","excerpt":"the Houthis in Yemen; an Iranian proxy","example_cn":"也门的胡塞武装，伊朗的代理人。","audio_url":"output/audio/vocab/2026-06-08/proxy-d799bae6.mp3"},{"word":"bargaining chip","phonetic":"/ˈbɑːrɡɪnɪŋ tʃɪp/","pos":"noun phrase","level":"六级","cn":"谈判筹码","en":"something used to gain an advantage in negotiations","excerpt":"using Lebanon as a chip -- bargaining chip","example_cn":"把黎巴嫩当作谈判筹码。","audio_url":"output/audio/vocab/2026-06-08/bargaining-chip-697eb43d.mp3"},{"word":"volatile","phonetic":"/ˈvɒlətaɪl/","pos":"adjective","level":"考研","cn":"动荡的；易变的","en":"likely to change suddenly and unpredictably","excerpt":"over what was a very volatile weekend","example_cn":"在一个非常动荡的周末。","audio_url":"output/audio/vocab/2026-06-08/volatile-5b12b97a.mp3"},{"word":"red line","phonetic":"/red laɪn/","pos":"noun phrase","level":"时事词汇","cn":"红线（不可逾越的界限）","en":"a limit beyond which action will be taken","excerpt":"That crossed Israel's red line","example_cn":"那越过了以色列的红线。","audio_url":"output/audio/vocab/2026-06-08/red-line-5efb7d2d.mp3"},{"word":"rein in","phonetic":"/reɪn ɪn/","pos":"phrasal verb","level":"六级","cn":"控制；约束","en":"to restrain or control","excerpt":"to try to rein in Prime Minister Benjamin Netanyahu","example_cn":"试图约束总理本雅明·内塔尼亚胡。","audio_url":"output/audio/vocab/2026-06-08/rein-in-6c063cd4.mp3"}],"sentences":[{"en":"Israel says it has identified a wave of missiles launched from Iran.","cn":"以色列称已识别出一波从伊朗发射的导弹。","structure":"主句：Israel says + 宾语从句：it has identified a wave of missiles launched from Iran（过去分词短语作定语）","analysis":"宾语从句中过去分词短语 'launched from Iran' 修饰 'missiles'，表示被动。","audio_url":"output/audio/sentences/2026-06-08/israel-says-it-has-identified-a-wave-of-missiles-launched-fr-46f6f515.mp3"},{"en":"Now, those retaliatory strikes appear to be in defiance of President Trump, who called Israeli Prime Minister Benjamin Netanyahu and had told him to hold off on striking back.","cn":"现在，这些报复性打击似乎是在违抗特朗普总统，他打电话给以色列总理本雅明·内塔尼亚胡，并告诉他暂缓反击。","structure":"主句：those retaliatory strikes appear to be in defiance of President Trump + 非限制性定语从句：who called... and had told...","analysis":"定语从句中 'who' 指代 President Trump，两个并列谓语 'called' 和 'had told'，'had told' 表示过去的过去。","audio_url":"output/audio/sentences/2026-06-08/now-those-retaliatory-strikes-appear-to-be-in-defiance-of-pr-2b49c16b.mp3"},{"en":"According to Israel's military, most of those have been intercepted.","cn":"据以色列军方称，其中大多数已被拦截。","structure":"状语：According to Israel's military + 主句：most of those have been intercepted","analysis":"被动语态 'have been intercepted' 表示动作已完成。","audio_url":"output/audio/sentences/2026-06-08/according-to-israel-s-military-most-of-those-have-been-inter-e86bbc3f.mp3"},{"en":"It is possible that Trump essentially gave this the green light and said, yes, Israel has to respond in some fashion, but keep that response limited.","cn":"有可能特朗普基本上开了绿灯，说，是的，以色列必须以某种方式回应，但保持回应有限。","structure":"主句：It is possible + 主语从句：that Trump... said... + 直接引语：yes, Israel has to respond... but keep...","analysis":"主语从句中 'gave the green light' 是习语，意为'开绿灯'；直接引语中 'keep that response limited' 是祈使语气。","audio_url":"output/audio/sentences/2026-06-08/it-is-possible-that-trump-essentially-gave-this-the-green-li-2129ffe8.mp3"},{"en":"What's crucial here, Audie, is that what happens in Lebanon affects the U.S.-Iran ceasefire.","cn":"关键的是，Audie，黎巴嫩发生的事情会影响美伊停火。","structure":"主句：What's crucial here is + 表语从句：that what happens in Lebanon affects the U.S.-Iran ceasefire","analysis":"主语从句 'What's crucial here' 作主语；表语从句中又包含主语从句 'what happens in Lebanon'。","audio_url":"output/audio/sentences/2026-06-08/what-s-crucial-here-audie-is-that-what-happens-in-lebanon-af-b549c6c9.mp3"}],"topics":[{"title":"以色列与伊朗冲突升级","content":"2026年6月8日，以色列和伊朗相互发动导弹袭击。伊朗瞄准以色列拉马特戴维空军基地，以色列打击伊朗石化厂和防空系统。这是自4月停火以来最严重的升级。冲突涉及代理人如胡塞武装和真主党。","keywords":"Israel · Iran · missile attacks · ceasefire · escalation"},{"title":"特朗普的角色与美以关系","content":"美国总统特朗普曾要求以色列总理内塔尼亚胡暂缓报复，但以色列仍发动打击。分析认为特朗普可能默许有限回应。特朗普此前曾迫使以色列结束加沙、黎巴嫩和伊朗的战争，此次可能再次介入。","keywords":"Trump · Netanyahu · green light · U.S.-Israel relations"},{"title":"黎巴嫩与真主党问题","content":"黎巴嫩总统约瑟夫·奥恩指责伊朗利用黎巴嫩作为谈判筹码。真主党是伊朗在黎巴嫩的代理人，其活动影响美伊停火。以色列在黎巴嫩南部打击真主党，导致超过3600人死亡。","keywords":"Lebanon · Hezbollah · proxy · bargaining chip"},{"title":"胡塞武装与也门局势","content":"也门胡塞武装作为伊朗代理人，向以色列发射导弹。胡塞武装威胁封锁曼德海峡，影响全球航运。该组织是伊朗在中东影响力的一部分，加剧地区紧张。","keywords":"Houthis · Yemen · Bab al-Mandab · proxy"}],"quiz":[{"type":"vocab","question":"在 'those retaliatory strikes appear to be in defiance of President Trump' 中，'in defiance of' 最接近的意思是？","options":["A. 支持","B. 无视","C. 听从","D. 解释"],"answer":1,"explanation":"'in defiance of' 意为'无视、违抗'，与选项B相符。原文指以色列的打击违抗了特朗普的要求。"},{"type":"vocab","question":"短语 'hold off on' 在 'told him to hold off on striking back' 中的含义是？","options":["A. 继续","B. 推迟","C. 加速","D. 取消"],"answer":1,"explanation":"'hold off on' 意为'推迟、暂缓'，特朗普要求内塔尼亚胡暂缓反击。"},{"type":"vocab","question":"在 'using Lebanon as a chip -- bargaining chip' 中，'bargaining chip' 指的是？","options":["A. 谈判筹码","B. 军事基地","C. 经济援助","D. 政治联盟"],"answer":0,"explanation":"'bargaining chip' 是固定短语，意为'谈判筹码'，指在谈判中用来获取优势的东西。"},{"type":"comprehension","question":"根据报道，以色列对伊朗的报复性打击包括哪些目标？","options":["A. 核设施","B. 石化厂和防空系统","C. 军事基地","D. 石油港口"],"answer":1,"explanation":"报道提到以色列打击了伊朗的石化厂和战略防御系统（防空系统），而非核设施或石油港口。"},{"type":"comprehension","question":"黎巴嫩总统约瑟夫·奥恩对伊朗的主要批评是什么？","options":["A. 伊朗支持真主党","B. 伊朗利用黎巴嫩作为谈判筹码","C. 伊朗攻击以色列","D. 伊朗破坏停火"],"answer":1,"explanation":"奥恩说：'They are using Lebanon as a chip -- bargaining chip in their negotiation with the United States.' 即伊朗把黎巴嫩当作谈判筹码。"},{"type":"comprehension","question":"关于特朗普与内塔尼亚胡的通话，报道暗示了什么？","options":["A. 特朗普明确禁止以色列报复","B. 特朗普可能默许了有限回应","C. 特朗普支持全面战争","D. 特朗普没有干预"],"answer":1,"explanation":"报道说'It is possible that Trump essentially gave this the green light... but keep that response limited'，暗示特朗普可能默许了有限回应。"}],"paragraphs":[{"speaker":"ANCHOR","text":"CNN.com - Transcripts var cnnSiteWideCurrDate = new Date(2013, 1, 12); window.CNNSTATICSECTION = ''; var CNNENV = \"//www.cnn.com\"; Transcript Providers Return to Transcripts main page CNN This Morning Israel, Iran Trade Missile Attacks After Iran Targets Israeli Ramat David Airbase; Iran Threatens to Block Critical Bab al-Mandab Strait; Deadly 7.8 Magnitude Earthquake Hits Southern Philippines."},{"speaker":"ANCHOR","text":"Aired 5-5:30a ET Aired June 08, 2026 - 05:00 ET THIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED. [05:00:00] ANNOUNCER: This is CNN Breaking News! AUDIE CORNISH, ANCHOR, CNN THIS MORNING: We are following this breaking news out of the Middle East. Israel and Iran trading missile attacks, and the fragile ceasefire survive this test."},{"speaker":"ANCHOR","text":"Good morning, everybody, I'm Audie Cornish. We're going to start with the strikes that have happened in the last few hours. Israel says it has identified a wave of missiles launched from Iran. New video into CNN overnight showing damage inside a home in the West Bank. Now, this follows Israeli strikes on an Iranian petrochemical plant. The IDF saying that it hit several targets at that complex."},{"speaker":"ANCHOR","text":"Now, those retaliatory strikes appear to be in defiance of President Trump, who called Israeli Prime Minister Benjamin Netanyahu and had told him to hold off on striking back. As tensions rise in the Middle East, so do oil prices. Both Brent Crude and WTI Crude up this morning. We've got live team coverage throughout the region. And we're going to start in Jerusalem with CNN's Oren Liebermann."},{"speaker":"ANCHOR","text":"Oren, first, can you just give us the latest on the strikes, what you've witnessed today? OREN LIEBERMANN, CNN JERUSALEM BUREAU CHIEF: We have seen and heard several waves of incoming Iranian ballistic missiles since about 10:00 or 11 O'clock at night here local time. So, this has been going on for several hours. There were approximately three barrages in that first wave."},{"speaker":"ANCHOR","text":"And then we have seen a few subsequent waves of incoming Iranian ballistic missiles. According to Israel's military, most of those have been intercepted. At first, they said all of those -- but when we followed up after what appeared to be some Iranian video of missiles getting through, they said it only applied to an earlier wave. So, we're waiting to see if there is an update there."},{"speaker":"ANCHOR","text":"Meanwhile, Iran's military said they targeted the Ramat David Air Force Base in northern Israel. Israel has responded with its own attacks, and we have seen those progressively escalate from what Israel's ambassador to the U.S. described as attacks on surface-to-surface missiles and non-energy infrastructure to the strike. You mentioned on the petrochemical facility in western Iran."},{"speaker":"ANCHOR","text":"And then just an hour-and-a-half ago or so, the Israeli military said they carried out strikes against what they called strategic defense systems that would open up the skies to the Israeli Air Force if it moves in that direction."},{"speaker":"ANCHOR","text":"We saw at the beginning of this war a few months ago that one of the first targets was Iran's surface-to-air missiles, and the idea there is that, if you take those out, then Israel's Air Force has to a large extent, freedom of the skies over Iran. And that would also include the U.S. Air Force should this turn into a joint operation. Obviously, that's something we're watching very closely."},{"speaker":"ANCHOR","text":"Crucially, this very much looks like it's heating up, and on the escalation ladder, it's also worth noting, Audie, that the Houthis in Yemen; an Iranian proxy there, fired at least, one missile towards Israel several hours ago that was intercepted here. We have heard interceptions behind us over Jerusalem. We have seen warnings of incoming missiles in several other areas across the country."},{"speaker":"ANCHOR","text":"Here, as both Israel and Iran have indicated and publicly stated that they are prepared for at least days of this to continue. CORNISH: You talked about that escalation ladder, and we have been hearing for weeks about Israel's sort of move into southern Lebanon as it goes after Hezbollah."},{"speaker":"ANCHOR","text":"We have the President of Lebanon here -- I want to play this clip so you can help us understand how these things intersect. Here he is. (BEGIN VIDEO CLIP) JOSEPH AOUN, PRESIDENT, LEBANON: Our people being killed, our people being -- our houses being destroyed. They are using Lebanon as a chip -- bargaining chip in their negotiation with the United States. It's unacceptable."},{"speaker":"ANCHOR","text":"(END VIDEO CLIP) CORNISH: So, he was speaking there about Tehran. Can you talk about their most recent strike in southern Lebanon, why it triggered this escalation? LIEBERMANN: Well, Iran said last week that if Israel were to carry out an attack, the capital of Beirut, then Iran would directly attack Israel."},{"speaker":"ANCHOR","text":"And that's what we saw happen over what was a very volatile weekend between Israel and Hezbollah. We saw -- we saw the number of people killed in Israeli strikes in Lebanon, according to the Lebanese Ministry of Public Health, rise above 3,600 since this war began some three months ago."},{"speaker":"ANCHOR","text":"And then, even since the latest U.S.-brokered ceasefire which was just several days ago, we saw Hezbollah carry out an attack on northern Israel. [05:05:00] That crossed Israel's red line, and Israel then carried out a strike on the Dahiya neighborhood in Beirut, which is considered a Hezbollah stronghold."},{"speaker":"ANCHOR","text":"Iran then carried out its threat or carried out on its threat launching those ballistic missiles on Sunday night directly at Israel. And that has led us to where we are right now."},{"speaker":"ANCHOR","text":"President Joseph Aoun, who was interviewed by our Christiane Amanpour, he made clear that he is trying to exercise Lebanese sovereignty, and that includes getting some sort of control over Iran's proxy, Hezbollah, and trying to find some sort of agreement that will lead to a withdrawal of Israeli forces from southern Lebanon and make Lebanon more whole."},{"speaker":"ANCHOR","text":"The problem is, you have an Israeli government that isn't in a position and doesn't want to withdraw from southern Lebanon now. You have an Iranian government that sees Hezbollah as its foothold in Lebanon, Hezbollah rejected the latest iteration of the -- of the ceasefire there. And that puts the President Joseph Aoun in a very difficult situation."},{"speaker":"ANCHOR","text":"His Lebanese Armed Forces don't have the power and perhaps don't have the will to carry out any serious action against Hezbollah, even as he has tried to outlaw and ban Hezbollah's military activity. What's crucial here, Audie, is that what happens in Lebanon affects the U.S.-Iran ceasefire. Iran knows that."},{"speaker":"ANCHOR","text":"They know that President Donald Trump wants to get to a deal, and they're able to try to use Hezbollah and to some extent, use Lebanon as a bargaining chip to pressure Trump to try to rein in Prime Minister Benjamin Netanyahu when it comes to Lebanon."},{"speaker":"ANCHOR","text":"CORNISH: Is there any chance of doing that? I think a lot of people are looking at these actions and thinking about how the President has spoken to Netanyahu, talked about taking down the temperature."},{"speaker":"ANCHOR","text":"What's the view in Israel about how Trump has been talking? LIEBERMANN: Trump made a number of public statements, or rather, gave a number of interviews to reporters in which he said it is Trump who calls the shots, not Netanyahu, saying he would -- he would urge Israel not to retaliate or delay Israel's retaliation. That's at least, the public part of the messaging."},{"speaker":"ANCHOR","text":"What we don't really know, and this is the key question for us to have a much better sense of what's happening here is, what was the phone call like between Trump and Netanyahu? It is possible that Trump essentially gave this the green light and said, yes, Israel has to respond in some fashion, but keep that response limited."},{"speaker":"ANCHOR","text":"It's also possible that Trump told Israel not to respond, and Netanyahu is acting on his own here, though I think that's unlikely, given how much Netanyahu needs Trump to be on his side, and has never sort of publicly criticized him. So, there's a spectrum here of what Trump is allowing of Netanyahu."},{"speaker":"ANCHOR","text":"It's worth remembering here that Trump has forced Netanyahu to end wars in Gaza, Lebanon, and previously in Iran. And I think right now, it's still the expectation that Trump will do that once again. The question is when and how. For that, Trump needs to essentially get the day started in D.C., so, we can learn more about what's happening behind the scenes. Audie."},{"speaker":"ANCHOR","text":"CORNISH: That's right, we're waking up here in Washington, Oren Liebermann talking to us from Jerusalem. Our breaking news coverage continues after the break on CNN THIS MORNING. We're going to talk about under what circumstance would Trump consider bringing U.S. troops home? His answer next. Plus, a deadly quake hits in the Philippines. The urgent search for survivors."},{"speaker":"ANCHOR","text":"(COMMERCIAL BREAK) [05:10:00] CORNISH: Breaking news this morning. Israel and Iran trading strikes in the worst escalation since the ceasefire agreement in April. We just heard from our CNN's Oren Liebermann in Jerusalem, where there are sounds of sirens and explosions after the interception of missiles. A U.S."},{"speaker":"ANCHOR","text":"official told CNN that President Trump urged Israeli Prime Minister Benjamin Netanyahu to hold off on retaliating against Iran. So, joining us to talk more about the military strategy here is retired Air Force Colonel and CNN military analyst Cedric Leighton. Good morning."},{"speaker":"ANCHOR","text":"So, first, I want to talk about this escalation because people may be hearing about the back-and-forth between Israel and Hezbollah for many weeks. Why did this particular round of strikes kick off? CEDRIC LEIGHTON, CNN MILITARY ANALYST: Yes, good morning, Audie. The reason this particular round of strikes kicked off was because the Israelis hit the suburb of Beirut, suburb of Dahiya."},{"speaker":"ANCHOR","text":"That's where Hezbollah has its main headquarters. And there are a lot of Hezbollah personnel for lack of a better term, in the Dahiya neighborhood."},{"speaker":"ANCHOR","text":"So, the reason the Iranians basically came to the defense of the Hezbollah entities there was because Hezbollah is basically Iran's main proxy in the region, and they need Hezbollah in order not only to keep an eye on Israel, but also to potentially mount attacks on Israel."},{"speaker":"ANCHOR","text":"So, every time that there is destruction to Hezbollah, Iran sees this as not only destruction of Hezbollah, but also of their own forces, even though they are absolutely separate. So, this is, in essence, what's going on. They decided -- the Iranians decided that it was time to respond to the Israeli attacks, and especially one as blatant as the one on Dahiya, in their view."},{"speaker":"ANCHOR","text":"And the reason they did that is because they want the ceasefire to cover not just Iran, but also the Lebanese territory, where the Israelis have conducted repeated actions against Hezbollah."},{"speaker":"ANCHOR","text":"[05:15:00] CORNISH: You talked about proxies, and then this also brings me to the Houthis in Yemen, because there's some reporting there that they were saying they wanted to prevent shipping through the Red Sea, which sounds very familiar to those of us who have been hearing about Iran preventing shipping through the Strait of Hormuz."},{"speaker":"ANCHOR","text":"Does this threaten broader conflict? Are we seeing hints of that? LEIGHTON: Yes, there's definitely the possibility that this could widen into a bigger regional conflict, at least. So, on the eastern side of the Arabian Peninsula, you have the Strait of Hormuz, which is the area that we've been talking about for quite some time."},{"speaker":"ANCHOR","text":"And then on the western side, you have what's known as the Bab al- Mandab, and that is that very narrow point between the Red Sea as it empties out into the Indian Ocean. So, this is an area where these are so-called choke points. And every time those are cut off, that impacts global shipping, global trade. And it means that prices go up, oil becomes scarcer."},{"speaker":"ANCHOR","text":"And that creates the economic issues that we're seeing in a lot of the world right now. CORNISH: We hear President Trump framing the U.S. involvement more as precaution, not escalation. I want to play for you something that happened on \"NBC's\" \"Meet the Press\". This was before all of this news about this escalation. But here it is."},{"speaker":"ANCHOR","text":"(BEGIN VIDEO CLIP) UNIDENTIFIED FEMALE: If you're not specifically calling it a war, would you consider sending some of the troops who are stationed there, who were sent because of Operation Epic Fury -- DONALD TRUMP, PRESIDENT OF THE UNITED STATES: You mean boots on the ground -- UNIDENTIFIED FEMALE: There at home? No -- TRUMP: Are you talking -- UNIDENTIFIED FEMALE: Would you consider sending th"},{"speaker":"ANCHOR","text":"em home if it's not technically a war? TRUMP: We don't need as many troops. I think you just -- like it's on the -- to err on the side of caution. (END VIDEO CLIP) CORNISH: What are we looking at? Is it a kind of carrot and stick? Meaning the U.S. is doing the negotiating, but Israel is leaning hard on the military pressure? LEIGHTON: Well, potentially so."},{"speaker":"ANCHOR","text":"You know, it's interesting when you look at President Trump's remarks, they -- you know, on the one hand, he's kind of hedging his bets here. He does, you know, admit to the possibility of withdrawing some of the troops that are in the Middle East. And I think what he's referring to, are the troops that came in, in addition to the ones that were already stationed in the Middle East."},{"speaker":"ANCHOR","text":"So, what he doesn't want to do is withdraw completely from the region, which is actually Iran's goal. So, if he withdrew completely from the region, that would satisfy Iran. But it wouldn't protect the Arab Gulf states like Saudi Arabia, Qatar, the UAE, Kuwait and Bahrain. So, that becomes a critical point right here."},{"speaker":"ANCHOR","text":"He, in essence, really can't withdraw if he -- if he doesn't want to show weakness. And that becomes, I think, the critical point right here. CORNISH: One more thing. We know that these strikes started back earlier in the year. They were U.S.-Israeli joint strikes, the U.S. gives a lot of military support, Intelligence support to Israel."},{"speaker":"ANCHOR","text":"So, could what we're seeing right now even happen without U.S. support. LEIGHTON: It could. And the reason I think we see limited strikes in the western and central parts of Iran, at least so far, is because the Israelis do have a capability to conduct those strikes on their own. They have their own refueling capability, although it's somewhat limited compared to what the U.S. can offer."},{"speaker":"ANCHOR","text":"Generally-speaking, if the strikes were much more extensive or repeated over a series of days, then that would probably indicate a greater U.S. involvement. There may be some U.S. involvement, but it is absolutely possible that these strikes are occurring without direct U.S. involvement at the moment. CORNISH: OK, that's Colonel Cedric Leighton, thank you for your insight. Appreciate you."},{"speaker":"ANCHOR","text":"After the break on CNN THIS MORNING, our breaking news coverage continues. (BEGIN VIDEO CLIP) UNIDENTIFIED MALE: To turn this on Israel, it would be a bit of a joke. Iran is the one that decided to break the truce. (END VIDEO CLIP) CORNISH: President Trump urged Israel not to retaliate. We're going to talk about that more. Plus, Trump's cage fight just days away."},{"speaker":"ANCHOR","text":"Could it get knocked out before round one? There's a new lawsuit looking to stop it. (COMMERCIAL BREAK) [05:20:00] CORNISH: It's now 23 minutes past the hour. Here are five things making the news this morning. Democratic Senate primary candidate Graham Platner held an event in Maine in front of an enthusiastic and cheering crowd just two days before the primary."},{"speaker":"ANCHOR","text":"He declared he is very much just some random guy from Sullivan, Maine. (BEGIN VIDEO CLIP) GRAHAM PLATNER, SENATE PRIMARY CANDIDATE: In a moment like this in history, if we can show that a regular person from the regular world who simply comes out with a message saying that we all have to work together to push back against all of the structures of power that have been exploiting and oppressing us f"},{"speaker":"ANCHOR","text":"or generations. If we show that, that works, we get to show this country the way forward. (END VIDEO CLIP) CORNISH: Platner is still favored to win Tuesday's primary, despite the \"New York Times\" publishing a report from three of Platner's ex- girlfriends describing, quote, \"volatile and toxic relationships\". And in one account, physical intimidation. Platner has denied that."},{"speaker":"ANCHOR","text":"As New York is set to host the NBA finals and President Trump tonight, security concerns have been heightened after six people were hurt in a stabbing at Penn station. Officials say one of the victims suffered serious injuries, the others suffered non-life-threatening injuries. [05:25:00] The suspect is in custody. And there was a deadly 7.8 magnitude earthquake in the Philippines."},{"speaker":"ANCHOR","text":"Video from the area is showing you here, massive damage, crumbling buildings and several people were killed. Rescues are currently underway. And then in just a few hours, the U.S. special forces soldier charged with betting on the raid to capture Nicolas Maduro will appear in court. Gannon Ken Van Dyke is due for a status hearing in Manhattan federal court."},{"speaker":"ANCHOR","text":"Prosecutors are alleging that he made more than $400,000 on prediction markets by making trades related to Venezuela before that January raid to capture Maduro. In a cage fight on President Trump's birthday this weekend is in danger of being knocked out. Two Virginia residents have filed a lawsuit to stop the UFC fight at the White House."},{"speaker":"ANCHOR","text":"The suit argues that the claw, built on the White House grounds was not approved by Congress or an environmental review. It also cited that UFC is selling VIP packages of more than a million dollars. And they argue that due to Trump's stock in UFC, he would profit off the fight. The fight is scheduled for this Saturday. And our breaking news coverage continues next."},{"speaker":"ANCHOR","text":"CNN is on the ground in Tehran with their new warning to Israel this morning as more missiles fly. Plus, six days after the elections, the reality TV villain hoping to be the hero for L.A., could Spencer Pratt's bid for mayor be crumbling? (COMMERCIAL BREAK) [05:30:00] var CNN = CNN || {};"},{"speaker":"ANCHOR","text":"CNN.com - Transcripts var cnnSiteWideCurrDate = new Date(2013, 1, 12); window.CNNSTATICSECTION = ''; var CNNENV = \"//www.cnn.com\"; Transcript Providers Return to Transcripts main page CNN This Morning Israel, Iran Trade Missile Attacks, Fragile Ceasefire Tested; Nithya Raman Pulls Ahead Of Spencer Pratt In L.A. Mayor's Race; Trump: Israel And Iran Must Immediately Stop 'Shooting'."},{"speaker":"ANCHOR","text":"Aired 5:30-6a ET Aired June 08, 2026 - 05:30 ET THIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED. (COMMERCIAL) [05:31:10] ANNOUNCER: This is CNN breaking news. AUDIE CORNISH, CNN ANCHOR: We are covering this breaking news this morning. Tensions flaring once again in the Middle East as Iran and Israel trade missile attacks."},{"speaker":"ANCHOR","text":"Iran state media released these images showing missiles being fired toward Israel. This was just a few hours ago. Israeli defense forces saying they are intercepting the attacks. Now the fighting this morning represents the worst escalation since the ceasefire went into effect in April. The two countries started exchanging missile attacks early Sunday, which then carried on into Monday."},{"speaker":"ANCHOR","text":"Iranian officials say the new attacks were in response to Israel's ongoing strikes against Lebanon. (BEGIN VIDEO CLIP) EBRAHIM ZOLFAQARI, IRGC SPOKESPERSON (through translator): The Zionist Army must stop its attacks on southern Lebanon in the suburbs."},{"speaker":"ANCHOR","text":"And if it expands its attacks on that region or responds to Iran's actions it will face more crushing and regrettable blows and destructive attacks will begin against the regime and its supporters. (END VIDEO CLIP) CORNISH: CNN senior international correspondent Fred Pleitgen also filed this report from Tehran."},{"speaker":"ANCHOR","text":"We want to note that CNN operates in Iran with permission of the government but maintains full editorial control of our reporting."},{"speaker":"ANCHOR","text":"(BEGIN VIDEOTAPE) FREDERIK PLEITGEN, CNN SENIOR INTERNATIONAL CORRESPONDENT: On our rooftop position here overlooking Iran's capital Tehran we have been able to hear a couple of very loud thuds that could be explosions, and then also some smaller ones in pretty close succession that might have been anti-aircraft fire. Now that's not confirmed. It's not exactly clear what that is."},{"speaker":"ANCHOR","text":"However, we do know that the Israelis say that they have been striking targets, as they put in, in Iran's capital Tehran but also on other Iranian cities like, for instance, Isfahan and Tabriz. That's also confirmed by the Iranians. And the Iranians also say and the Israelis also confirm that Israel has hit a petrochemical facility in the south of Iran."},{"speaker":"ANCHOR","text":"It's very close to the Iraqi border and very close to the city of Basrah. The Iranians are saying that the staff of that petrochemical facility has been ordered to evacuate that facility. And the Iranians are also saying that they are hitting back in a major way."},{"speaker":"ANCHOR","text":"They say in retaliation for the attack on that petrochemical facility that they launched ballistic missiles towards a similar facility, they put it, in the Israeli city of Haifa. The Iranians also earlier saying that there had been a wave of Iranian ballistic missile attacks targeting two Israeli air bases and specifically, radar installations affiliated with those air bases."},{"speaker":"ANCHOR","text":"The Iranians are saying right now their missile forces and generally their forces are in a state of complete readiness, and they are also warning the Israelis to stop their military action. Of course, all of this coming as the ceasefire between the U.S. and Iran continues to very much hang in the balance. Iran and the U.S."},{"speaker":"ANCHOR","text":"saying that they are trying to work towards a memorandum of understanding to end the conflict between Iran and the United States but also to then move towards broader peace talks aimed at achieving a larger peace agreement. The Iranians are saying those talks are in a difficult state. They want some of their frozen assets to be unfrozen immediately."},{"speaker":"ANCHOR","text":"And both sides are acknowledging, of course, right now, that especially with these attacks going on it certainly seems as though that ceasefire and the general situation right now very volatile. Fred Pleitgen, CNN, Tehran. (END VIDEOTAPE) CORNISH: OK. Once again, Fred Pleitgen talking to us from Iran. Now I want to bring in Avi Mayer. He's the founder of the Jerusalem Journal."},{"speaker":"ANCHOR","text":"He joins us live from Israel where missile sirens have been active throughout the day. So first, Avi, can you tell us at this time of day there what's happening where you are? [05:35:00] AVI MAYER, FOUNDER, JERUSALEM JOURNAL (via Webex by Cisco): Well Audie, good morning. I'm actually here in suburban Maryland, not too far from you."},{"speaker":"ANCHOR","text":"But throughout the night my phone has been buzzing with notifications of missiles falling in locations throughout Israel. Millions of Israeli families have spent the entire night in bomb shelters, which is a condition with which we are now long familiar. And in many respects, this is not much of a surprise."},{"speaker":"ANCHOR","text":"To most of us in Israel we have enjoyed some period of calm over the past two months, but the residents of northern Israel will be asking what ceasefire? There has been ongoing missile and drone fire by Hezbollah towards northern Israel for the entirety of this period. Fifteen Israeli personnel have been killed by Israeli -- by Iranian-backed Hezbollah drone and missile strikes."},{"speaker":"ANCHOR","text":"That is more than the entirety of the 13 U.S. personnel killed in the war so far. And so in some respects this is not much of a surprise, but it is, of course, a dramatic escalation by the Islamic regime."},{"speaker":"ANCHOR","text":"CORNISH: Uh, can you talk about that idea of escalation? We were talking with military expert Cedric Leighton earlier about why Iran retaliated on this -- in regard to this attack on Lebanon, on Hezbollah, in Dahiya. That they treated that as a red line of some kind and escalated as a result."},{"speaker":"ANCHOR","text":"How is this being talked about by Israel? Do they see it as deterrent? Was it just another strike in the back-and-forth or was there something qualitatively different about that target? MAYER: Well, it's important to note that Dahiya is a suburb of Beirut that holds the headquarters of Hezbollah. Essentially, a Hezbollah stronghold."},{"speaker":"ANCHOR","text":"And what happened on Sunday over the weekend is that Israel finally struck that stronghold after months of ongoing missile and drone fire targeting northern Israel and injured hundreds of thousands of Israelis. And the Iranians decided that was going to be their red line. Now again, it's very -- to be very clear, there has not been a ceasefire in effect in the north of Israel."},{"speaker":"ANCHOR","text":"It has been bombarded by Iran through its proxy, Hezbollah, over the course of this entire period by hundreds of drone and missile attacks. And this was Israel finally responding and saying enough is enough."},{"speaker":"ANCHOR","text":"CORNISH: Um, what is the relationship -- how is it talked about in terms of how Trump is talking publicly and the reporting about his frustrations with Netanyahu? MAYER: Well, we understand that there have been several testy conversations between the two, but both have stated openly that they are aligned on the overall goals here."},{"speaker":"ANCHOR","text":"The goals being, of course, denying Iran the capacity to develop a nuclear weapon and severely degrading its military capabilities. We did hear President Trump say yesterday that it was -- he was calling on Israel not to retaliate. But we're hearing from Israeli officials that the Israel response to the Iranian missile fire was fully coordinated with the United States, and the U.S."},{"speaker":"ANCHOR","text":"has been engaged in defending Israeli skies. So I think we're seeing certain messaging happening publicly but more happening behind the scenes. CORNISH: Just so we're clear, again, comparing to the military notes from earlier, is it your sense that these are independent strikes Israel is doing or that this is happening with more than U.S. support? That it's happening with material backing."},{"speaker":"ANCHOR","text":"MAYER: As of right now, what we know is that these are Israeli airstrikes carried out by Israeli aircraft and other armaments but with full coordination with the United States. Meaning as far as we know right now, the U.S. is not actively engaged in offensive activity in Iran. But we have heard from various reports that the U.S."},{"speaker":"ANCHOR","text":"and perhaps other countries in the region have been involved in air defense, meaning preventing those missiles from reaching Israel -- reaching their targets as has happened throughout this war. CORNISH: OK. That's Avi Mayer speaking to us here in Maryland. Thanks so much. And next on CNN THIS MORNING, our breaking news coverage continues."},{"speaker":"ANCHOR","text":"Yemen's Houthi rebels get in on the action targeting Israel. Are these latest escalations bound to expand? Plus -- (BEGIN VIDEO CLIP) UNIDENTIFIED FEMALE: He has taken away the attention. We don't need that negativity. We need nothing by positive vibes."},{"speaker":"ANCHOR","text":"(END VIDEO CLIP) CORNISH: Tonight, game three of the NBA final between the Knicks and the Spurs, but with President Trump in attendance some fans worry it's going to take away from the game. (COMMERCIAL) [05:43:52] CORNISH: Back to our breaking news as strikes are escalating between Israel and Iran. Now we're learning about another player in these latest attacks."},{"speaker":"ANCHOR","text":"Iran-backed Houthi rebels in Yemen claiming responsibility for launching a missile towards Israel -- a missile Israeli forces say they intercepted. But the warning goes further. The Houthis are now declaring that they call a total ban on Israeli-linked shipping in the Red Sea, threatening to target vessels and potentially disrupt another critical global trade route."},{"speaker":"ANCHOR","text":"CNN's Paula Hancocks is live from Abu Dhabi for us. Can you help us understand the timeline here of when Houthis launched this strike with this back-and-forth between Iran and Israel? PAULA HANCOCKS, CNN CORRESPONDENT: So Audie, this is information coming to us from the Houthis this morning -- this Monday morning -- and it follows what we have seen as the largest escalation in strikes and tensions"},{"speaker":"ANCHOR","text":"between Israel and Iran since that ceasefire was signed back in April. [05:45:03] Now the Houthis are a proxy of Iran. They have in the past been believed to be operating fairly autonomously but they certainly have got involved on a number of occasions in support of Iran, specifically firing rockets and missiles towards Israel."},{"speaker":"ANCHOR","text":"So what we've heard from this morning is that they say that they had a missile barrage targeting sensitive Israeli enemy targets. Israel says that they did intercept a projectile from Yemen itself. But, of course, the second part of this is that the Houthi rebels are threatening to disrupt global commerce even more than it is already."},{"speaker":"ANCHOR","text":"There is a very key maritime area, the Bab al-Mandab Strait, which is an area that runs into the Red Sea. They have threatened to disrupt traffic going through that area, specifically saying that Israeli vessels will not be allowed to navigate into the Red Sea."},{"speaker":"ANCHOR","text":"Now they have done this in the past and they did not restrict themselves to Israeli vessels even though they said that was their intention. We have seen that they have fired upon vessels over recent years causing devastation, really, in that very critical water chokepoint."},{"speaker":"ANCHOR","text":"And it comes at the same time as we are seeing very little getting through the Strait of Hormuz as well, further to the north. So if there was disruption for both of these key waterways then it would cause chaos in the global economy -- even more than we have seen from the Strait of Hormuz. So certainly, this is being taken seriously."},{"speaker":"ANCHOR","text":"Israel says that it is able to intercept missiles from Yemen -- from these Houthi rebels. But, of course, in this escalation it does show another front potentially opening up in the midst of this very shaking ceasefire -- Audie. CORNISH: OK. That's Paula Hancocks speaking to us from Abu Dhabi. Now it is 46 minutes past the hour. This is your morning roundup."},{"speaker":"ANCHOR","text":"Almost a week out, the votes are still being counted in L.A. Nithya Raman is pulling ahead of former reality TV star Spencer Pratt in the Los Angeles mayoral race. Raman, an L.A. City Council member, gained about 3,000 more votes than Pratt on Sunday. The two are fighting to see who will face off against incumbent Mayor Karen Bass in November."},{"speaker":"ANCHOR","text":"Right now, Chinese leader Xi Jinping is in North Korea for rare diplomatic talks with Kim Jong Un. He's expected to spend two days there. This is his first trip since 2019, and it's seen as an important opportunity to strengthen relations. And it's game three of the NBA Finals between the Knicks and Spurs. Thanks to President Trump's attendance there will be heavy security."},{"speaker":"ANCHOR","text":"Secret Service will deploy snipers, intelligence, and surveillance teams. The watch party outside Madison Square Garden has also been canceled. (BEGIN VIDEO CLIP) UNIDENTIFIED MALE: Unfortunately, I think it's kind of a shame. I really would like it, you know, because we've been waiting for this for, like, how long? And, you know, a lot of people can't afford to get into the game."},{"speaker":"ANCHOR","text":"I'm one of those people. So I was actually looking forward to going to one of these watch parties. UNIDENTIFIED FEMALE: This is a monumental day in New York City and you're going to cancel it? It's all right. We going to find a way, OK? If you guys know real New Yorkers, we going to find a way. (END VIDEO CLIP) CORNISH: The Knicks are up by two against the Spurs."},{"speaker":"ANCHOR","text":"And next on CNN THIS MORNING, President Trump says he calls the shots and Israel will fall in line, but did Israel just prove him wrong? And in our next hour it's the final stretch in Maine where Democratic Senate candidate Graham Platner is looking to stabilize his campaign days before the election."},{"speaker":"ANCHOR","text":"(BEGIN VIDEO CLIP) GRAHAM PLATNER, (D) MAINE SENATE CANDIDATE: It doesn't matter what you do, but you gotta do something because the moment we're in right now, it's going to require all of us. (END VIDEO CLIP) (COMMERCIAL) [05:53:35] (BEGIN VIDEO CLIP) UNIDENTIFIED MALE: This shows you where Iran is right now."},{"speaker":"ANCHOR","text":"They've always been a sponsor of terror, and they are continuing it here against our allies in Israel. UNIDENTIFIED MALE: Suddenly for Iran, after all this time, to decide that they were going to attack Israel for Hezbollah's actions make no sense. (END VIDEO CLIP) CORNISH: Lawmakers on both sides of the aisle weighing in on the renewed strikes between Iran and Israel."},{"speaker":"ANCHOR","text":"On Sunday, President Trump held a phone call with Israel Prime Minister Benjamin Netanyahu after Iran launched ballistic missiles aimed at Israel. He urged Netanyahu not to retaliate, according to a U.S. official. Netanyahu went against Trump's urging and hit targets in Iran leaving the existing ceasefire vulnerable."},{"speaker":"ANCHOR","text":"Trump has also boasted to the Financial Times Netanyahu \"won't have a choice but to accept any deal the U.S. negotiates with Iran,\" declaring \"I call the shots. Netanyahu does not call the shots.\" But Netanyahu has defied him, so President Trump is trying again. He just posted on Truth Social moments ago, \"Israel and Iran must immediately stop 'shooting.'\" Ambassador Alon Pinkas joins me now."},{"speaker":"ANCHOR","text":"He's the former Israeli consul general in New York. First, can I ask you about that Truth Social post? The president saying both Israel and Iran must stop. [05:55:00] ALON PINKAS, FORMER ISRAELI CONSUL GENERAL IN NEW YORK (via Webex by Cisco): Yeah. Good morning, Audie."},{"speaker":"ANCHOR","text":"This is something you would expect from the president to say, you know -- the diplomatic lingo of show restraint, exercise caution, patience, and so on. It's clear that he -- President Trump has to make this statement. But basically, what this statement is saying -- you know, the underlining -- the underlining logic of it is that this is not my war anymore -- I, President Trump."},{"speaker":"ANCHOR","text":"This is not my way anymore. This is between Israel and Iran and I'm not part of this. I'm pursuing negotiations to get a deal -- good deal, bad deal, mediocre deal. We could discuss this. CORNISH: Yeah. PINKAS: He's basically saying to Mr. Netanyahu, Audie, you're on your own. And he's basically saying to the Iranians well, you're not necessarily going to have a deal if you keep on shooting."},{"speaker":"ANCHOR","text":"But the bottom line is this -- I'm not involved in this. CORNISH: Can I ask you about that, though? What we're hearing about what he's saying on Sunday to Netanyahu is very different from what you're explaining. He is trying to say -- PINKAS: Right. CORNISH: -- I'm the one in the lead here. I think the viewers are looking and wondering if Israel is in the lead here."},{"speaker":"ANCHOR","text":"PINKAS: Yeah, it's a very good question and, you know, it's open for interpretation. Let me put it in context and be brief about this. Netanyahu and Trump have a different political calculus. Trump is saying I want to end this war, and I can rein in Israel, and I -- and I will tell them what to do and they will do what I tell them. And I call the shots, et cetera, et cetera."},{"speaker":"ANCHOR","text":"Netanyahu, on the other hand, has defied Trump three times in the last three weeks with breaking -- violating the ceasefire in Lebanon. With attacking the Dahiya, which is the corridor -- CORNISH: Yes. PINKAS: -- the neighborhood -- the area in Beirut where Hezbollah mostly is centered -- despite Trump's warnings. And again, last night when Iran launched a barrage of missiles."},{"speaker":"ANCHOR","text":"Trump called on Netanyahu to show restraint -- exercise restraint and not retaliate, and three times Netanyahu defied him. Netanyahu is speaking to a domestic audience. He's got an election in two or three months, either in September or October -- three or four months."},{"speaker":"ANCHOR","text":"So Netanyahu wants to brag that I stood up to the American president and when it came to national security and when it came to the defense of Israel, I stood up. And only I could do this. OK, et cetera, et cetera, et cetera. What Mr."},{"speaker":"ANCHOR","text":"Trump is doing, Audie, in stating more than once that he calls the shots and Netanyahu will have no choice but to accept, he's talking not necessarily about the ceasefire but about a framework or a provisional memorandum type of deal with Iran, meaning that -- CORNISH: So you -- is there a red line? Can I just interrupt for a second? Is there a red line or is -- PINKAS: Yes."},{"speaker":"ANCHOR","text":"CORNISH: -- the messaging from Israel, regardless of what -- Netanyahu can make any decision and the U.S. will -- PINKAS: Right. CORNISH: -- essentially follow with a security guarantee. PINKAS: Right."},{"speaker":"ANCHOR","text":"Well, not necessarily because if I'm right and Trump is essentially saying, Audie, that Israel is on its own and I'm not involved in this, Israel cannot sustain a prolonged conflict with Iran in terms of munitions, missile interceptor, depletion rate, and so on. And what Trump is basically saying, I'm calling the shots here. And yeah, there is a red line."},{"speaker":"ANCHOR","text":"If the red line is that -- well, the red line is further escalation -- CORNISH: Um-hum. PINKAS: -- that could inadvertently involve the U.S. That, I think, for Trump is a red line. I also think -- this perhaps is for a different segment -- that Trump is dissatisfied, disillusioned, and livid at Mr."},{"speaker":"ANCHOR","text":"Netanyahu for the basic -- CORNISH: So then can there be a ceasefire going forward if this continues between Israel and Iran's proxies, meaning obviously, Israel has wanted to keep Lebanon out of the conversation. Iran keeps trying to pull it back in. It feels -- PINKAS: Right. CORNISH: -- as though this ceasefire could be over."},{"speaker":"ANCHOR","text":"It feels as though the war could go longer because Israel's prerogatives are different. That's what you're describing. PINKAS: Absolutely. You're absolutely right, Audie. Netanyahu has several vested interests in this. He needs to maintain a permanent state of war."},{"speaker":"ANCHOR","text":"He needs to -- he wants politically to distance himself from the calamity of October 7, 2023, and somehow turn it into a strategic triumph, which could only come through Iran. That failed in the war. var CNN = CNN || {};"},{"speaker":"ANCHOR","text":"CNN.com - Transcripts var cnnSiteWideCurrDate = new Date(2013, 1, 12); window.CNNSTATICSECTION = ''; var CNNENV = \"//www.cnn.com\"; Transcript Providers Return to Transcripts main page CNN This Morning Israel, Iran Trade Missile Attacks, Fragile Ceasefire Tested; Trump Says Starting War with Iran Did Not Violate Campaign Promises."},{"speaker":"ANCHOR","text":"Aired 6-6:30a ET Aired June 08, 2026 - 06:00 ET THIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED. ALON PINKAS, FORMER ISRAELI CONSUL GENERAL IN NEW YORK: And somehow, turned it into a strategic triumph which could only come through Iran. That failed in the war."},{"speaker":"ANCHOR","text":"[06:00:10] So, he needs to, at least, going into an election period, he needs to at least maintain a permanent state of war. In that respect, he's been failing. And Trump has been dragged into this, and the failure is on Trump, as well. AUDIE CORNISH, CNN ANCHOR: That's Ambassador Alon Pinkas. Thank you for your time. I appreciate it. PINKAS: Thank you. CORNISH: All right. Good morning."},{"speaker":"ANCHOR","text":"Thank you for waking up with us. I'm Audie Cornish, and our breaking news coverage continues right now. ANNOUNCER: This is CNN breaking news. CORNISH: So, we are following the news out of the Middle East. That's where Israel and Iran are engaging in a barrage of fresh strikes. It is a major test for negotiations that President Trump said just yesterday were very close to being done."},{"speaker":"ANCHOR","text":"So, we're going to start with a new wave of Iranian missile strikes that were launched towards Israel. This is new video into CNN overnight, showing damage inside a home in the West Bank. Now, this follows Israeli strikes on an Iranian petrochemical plant. The IDF said it hit several targets at that complex."},{"speaker":"ANCHOR","text":"Now these retaliatory strikes appear to be in defiance of President Trump, who called Israeli Prime Minister Benjamin Netanyahu and told him to hold off on striking back."},{"speaker":"ANCHOR","text":"Iran's foreign ministry spokesperson said Monday that the U.S., quote, \"bears responsibility\" for Israel's actions, going on to say, quote, \"whatever happens in the region, the direct responsibility of the United States is established, and it will also bear responsibility for the consequences of any escalation."},{"speaker":"ANCHOR","text":"Now, just now on Truth Social, President Trump, just in the last 30 minutes, writing, quote, \"Israel and Iran must immediately stop shooting.\" We've got live team coverage throughout the region. We're going to start in Jerusalem with CNN's Oren Liebermann."},{"speaker":"ANCHOR","text":"Oren, can you give us the latest on the strike so far this morning? OREN LIEBERMANN, CNN JERUSALEM BUREAU CHIEF: Audie, we just got a briefing a short time ago from an Israeli military official who said that Israel is preparing for the possibility of several days of fighting. And beyond that, the potential for this to become a more prolonged conflict."},{"speaker":"ANCHOR","text":"And that's important, because it gives you a sense of -- of what Israel is preparing for. Meanwhile, Tehran has also said they're prepared for a week of conflict. So, both Israel and Iran are clearly signaling right now that they're in this for the long haul, if that's what this turns into. If it turns into a few days or more of fighting, then they are prepared for that."},{"speaker":"ANCHOR","text":"In fact, it seems the one person who isn't prepared for that is President Donald Trump, who is trying to force, through his social media, a deescalation on both sides, in that post on -- on Truth Social that you pointed out."},{"speaker":"ANCHOR","text":"That Israeli military official says that, since the start of this, which was only about 13 or 14 hours ago or so, Iran has launched some 30 ballistic missiles at Israel in several barrages. Meanwhile, Israel has carried out its own set of strikes on Iran, targeting surface-to-air missiles, as well as that petrochemical facility that you pointed out."},{"speaker":"ANCHOR","text":"That's key, because that may mean that energy infrastructure is fair game for Iran. We should keep an eye on -- on the Gulf region to see if Iran carries out strikes on energy infrastructure there. That would, of course, send oil markets and the -- the energy part of this into turmoil, as well, or at least has the potential to do so. So, that's a very key element to keep an eye on here."},{"speaker":"ANCHOR","text":"Meanwhile, the Houthis in Yemen have also launched at least two missiles at Israel. So, right now, it seems like we are climbing the escalation ladder potentially quickly, even as Trump tries to impose a ceasefire here. He has done it on Prime Minister Benjamin Netanyahu before when it comes to Gaza and Lebanon and even previous conflicts with Iran."},{"speaker":"ANCHOR","text":"And it seems like he is trying to do so once again. CORNISH: You said it seems like he's trying to do so, going as far as saying that he calls the shots, saying that Netanyahu will have no choice but to accept a deal with Iran."},{"speaker":"ANCHOR","text":"How is this being telegraphed in Israel? Are people hearing the way Trump is trying to rein Netanyahu in? And what has the Israeli government talked about? LIEBERMANN: It's safe to assume that, if Trump posts something related to Israel on -- on his social media or makes a public statement about it, it gets circulated here very, very quickly."},{"speaker":"ANCHOR","text":"As of right now, we haven't seen any sort of public statement from Netanyahu openly saying that he's going to defy Trump. Quite the opposite. Netanyahu would almost certainly never make a statement like that. He is perhaps Trump's biggest international cheerleader. And it's -- and it's going to stay that way, because Netanyahu knows that he needs Trump's support."},{"speaker":"ANCHOR","text":"Back in the previous fighting that we saw end in early April, Israel believed that the fighting would continue until Trump decides that it will stop. And that's likely the same scenario right now, even as -- as we're only a few hours into this. This will continue. Israel will have some rope, some decision-making autonomy in how this plays out, until Trump puts his foot down."},{"speaker":"ANCHOR","text":"And that's what we're looking for here. Trump has posted on -- on social media. He spoke with Netanyahu last night, although we don't have a real sense of -- of what was said there. But Trump tried to urge either a holding off of or a delay of -- of retaliation."},{"speaker":"ANCHOR","text":"Netanyahu, clearly because of domestic political pressure here and because of incoming Iranian ballistic missiles, felt an absolute need to respond. And the question now to watch is how much space will Trump give him to maneuver and to strike? CORNISH: OK, that's Oren Liebermann speaking to us from Jerusalem. Thank you. And our breaking news coverage is going to continue next."},{"speaker":"ANCHOR","text":"As we talked about Israel and Iran trading new strikes, did President Trump violate a campaign promise by starting this war in the first place? He's going to explain why he did not. We'll have that next. Plus, a deadly quake hits in the Philippines. The urgent search for survivors."},{"speaker":"ANCHOR","text":"(COMMERCIAL BREAK) [06:10:48] CORNISH: So, we are following the latest developments out of the Middle East, where the ceasefire is teetering after Iran and Israel traded the worst strikes in months. Despite the renewed strikes, Trump says he did not violate one of his core campaign promises: no new wars."},{"speaker":"ANCHOR","text":"(BEGIN VIDEO CLIP) KRISTEN WELKER, HOST, NBC'S \"MEET THE PRESS\": One of your consistent campaign promises was no new wars, going all the way back to 2015. Did you break that promise to the American people? DONALD TRUMP, U.S. PRESIDENT: No. No. I had to stop a country, a very powerful, very dangerous country from having a nuclear weapon. because they'd use it. They'd blow up the world."},{"speaker":"ANCHOR","text":"They'd blow up the Middle East. They'd blow up Israel. They'd come here, they blow up Europe. It's America first. I'm doing our country a service. When you say I promised, I didn't promise anything. I don't like these endless wars. This is not an endless war."},{"speaker":"ANCHOR","text":"(END VIDEO CLIP) CORNISH: Joining me now in the group chat, Sara Fischer, CNN's senior media analyst and senior media reporter at Axios; Elena Schneider, national political reporter at \"NOTUS\"; and Seung Min Kim, CNN political analyst and White House reporter at the Associated Press."},{"speaker":"ANCHOR","text":"Now, this ended up being a pretty testy interview for a variety of reasons, but I want to talk about this part about no endless wars. Because we're in a moment where the regional conflict is escalating. We just don't know how far this is going to spread. Is this a sensitivity for this White House? When Hegseth is asked, he often says something like, Well, we meant no stupid wars."},{"speaker":"ANCHOR","text":"And I think that's sort of eye in -- of the beholder. SEUNG MIN KIM, CNN POLITICAL ANALYST: Right, right. And when you ask Trump about it, especially, you know, in these gaggles or in the interview yesterday, he says, no endless wars. He says he's talking about, you know, extricating ourselves from conflicts such as Afghanistan. CORNISH: And he says it's only been three months."},{"speaker":"ANCHOR","text":"KIM: Exactly, exactly. And you saw that kind of messaging, even, you know, even a couple of months ago. I remember when he was talking about, in his Oval Office address, about when -- around the time the war started, he's talking about all of these conflicts in the past, such as Vietnam. And that he's like, we're not talking about those types of conflicts. But the sensitivity's there."},{"speaker":"ANCHOR","text":"It's because he did make that promise of no new wars during the campaign. That's why this -- kind of this unusual coalition, especially younger voters, really rallied around this president. CORNISH: Yes. KIM: Because he made that promise."},{"speaker":"ANCHOR","text":"And now he's in a conflict that is so much more difficult than just a simple kind of -- a more -- a more simple strike that he made last summer in Iran on those nuclear facilities. And he -- he's struggling to get out of it. And that's why -- that's where that sensitivity is coming from, because it's kind of out of his control."},{"speaker":"ANCHOR","text
