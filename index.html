g to decide that at the time."},{"speaker":"ANCHOR","text":"And ideally, you wouldn't have to caucus with one side or the other. CORNISH: That's how it works, my friend. KILEY: Right, exactly. That's what's kind of messed up about the way the rules are right now is that the committee assignments, for example, are the properties of the parties. And so you have to caucus with one or the other. CORNISH: So you're going to campaign on that question."},{"speaker":"ANCHOR","text":"A lot of people are going to wonder that. Mike, what about you? DUBKE: Live events are back. People want real experiences, not reality \"Summer House\" crap. CORNISH: I will not stay for \"Summer House\" slander. DUBKE: There's going to be \"Summer House\" slander. Live events are back. The movie theaters are having their biggest summer since 2019 and Hollywood's not happy."},{"speaker":"ANCHOR","text":"CORNISH: Oh yeah, wait for this. DUBKE: Which I'm very -- I am very happy about that. Hollywood is upset because the top two grossing films are done by 20-somethings that started on YouTube. These projects started on YouTube. CORNISH: A24 Focus feature, but you -- DUBKE: Fine. You know who's dead? You know who was dead last week? Baby Yoda. Baby Yoda came in third. This is huge."},{"speaker":"ANCHOR","text":"CORNISH: Let's put under him local man -- DUBKE: It's a paradigm shift. HAYES: Let's go back to \"Summer House\". (LAUGHTER) CORNISH: Eleanor, what's your group chat? MUELLER: Got to say it is my engagement last week. (CHEERS) CORNISH: Oh my gosh. Where did you get engaged? Where was that a picture of? MUELLER: Zion National Park. So Canyon Overlook Trail at sunrise. It was amazing. And yeah."},{"speaker":"ANCHOR","text":"HAYS: Well, cheers to you. CORNISH: Congratulations. Engagement ring emoji in the group chat. I'm Audie Cornish and stay with us. The headlines are next. var CNN = CNN || {};"}]}};

// ── State ──────────────────────────────────────────
let currentData = null;
let qState = { cur:0, score:0, answered:false, qs:[] };
const COLORS = ['#4a9eff','#e05a3a','#1abc9c','#f0a500'];
const LV_COLORS = {'考研':'#f0a500','六级':'#4a9eff','专四':'#a78bfa','专八':'#a78bfa','时事词汇':'#2ecc71'};

// ── Init ───────────────────────────────────────────
(function init(){
  const latest = '2026-06-05';
  if(ALL_DATA[latest]) loadDate(latest);
  // highlight active hist item
  document.querySelector(`[data-date="${latest}"]`)?.classList.add('active');
})();

function openSource(){
  if(currentData?.source_url) window.open(currentData.source_url,'_blank');
}

// ── Load Date ──────────────────────────────────────
function loadDate(date){
  if(!ALL_DATA[date]) return;
  document.querySelectorAll('.hist-item').forEach(b=>
    b.classList.toggle('active', b.dataset.date===date));
  renderAll(ALL_DATA[date]);
}

// ── Render All ─────────────────────────────────────
function renderAll(data){
  currentData = data;
  document.getElementById('summaryText').textContent = data.summary||'';
  document.getElementById('topbarDate').textContent = data.date||'';
  document.getElementById('topbarTitle').textContent =
    'CNN This Morning · ' + (data.date||'');

  renderTranscript(data.paragraphs||[], data.vocabulary||[]);
  renderWordList(data.vocabulary||[]);
  renderVocab(data.vocabulary||[]);
  renderSentences(data.sentences||[]);
  renderTopics(data.topics||[]);
  initQuiz(data.quiz||[]);
  switchTab('transcript');
}

// ── Transcript with Highlights ─────────────────────
function renderTranscript(paragraphs, vocab){
  const body = document.getElementById('transcriptBody');
  if(!paragraphs.length){
    body.innerHTML = '<div style="color:var(--text2)">暂无全文稿数据，请重新运行 Actions 生成。</div>';
    return;
  }

  // Build word→vocab map (longest match first)
  const vocabMap = {};
  vocab.forEach(v=>{ vocabMap[v.word.toLowerCase()] = v; });
  const sortedWords = Object.keys(vocabMap).sort((a,b)=>b.length-a.length);

  body.innerHTML = paragraphs.map((p,pi)=>{
    const tag = `<span class="speaker-tag">${esc(p.speaker||'ANCHOR')}</span>`;
    const highlighted = highlightWords(p.text, sortedWords, vocabMap);
    return `<div class="para">${tag}${highlighted}</div>`;
  }).join('');
}

function highlightWords(text, sortedWords, vocabMap){
  // Mark positions to highlight
  let result = esc(text);
  // Work on original text to find positions, then rebuild
  const positions = []; // {start, end, word, vocab}

  const lc = text.toLowerCase();
  sortedWords.forEach(word=>{
    // Find all occurrences
    let idx = 0;
    while((idx = lc.indexOf(word, idx)) !== -1){
      // Check it's a word boundary (simple check)
      const before = idx === 0 || !/[a-z]/i.test(text[idx-1]);
      const after  = idx+word.length >= text.length || !/[a-z]/i.test(text[idx+word.length]);
      if(before && after){
        // Check not already covered
        const overlaps = positions.some(p=> idx < p.end && idx+word.length > p.start);
        if(!overlaps){
          positions.push({start:idx, end:idx+word.length, word, vocab:vocabMap[word]});
        }
      }
      idx += word.length;
    }
  });

  if(!positions.length) return esc(text);

  // Sort by start position
  positions.sort((a,b)=>a.start-b.start);

  // Build HTML
  let html = '';
  let last = 0;
  positions.forEach(p=>{
    html += esc(text.slice(last, p.start));
    const lv = p.vocab.level||'';
    const lvClass = `level-${lv.replace(/[\/\s]/g,'')}`;
    const vidx = encodeURIComponent(p.vocab.word);
    html += `<span class="hl ${lvClass}" data-word="${esc(p.vocab.word)}" onclick="showVocabPopup(event,'${esc(p.vocab.word)}')">${esc(text.slice(p.start,p.end))}</span>`;
    last = p.end;
  });
  html += esc(text.slice(last));
  return html;
}

// ── Vocab Popup ────────────────────────────────────
let popupTimeout = null;
function showVocabPopup(e, word){
  e.stopPropagation();
  const data = currentData?.vocabulary?.find(v=>v.word===word);
  if(!data) return;

  // Highlight all instances of this word
  document.querySelectorAll('.hl').forEach(el=>{
    el.classList.toggle('active', el.dataset.word===word);
  });
  // Highlight word chip
  document.querySelectorAll('.word-chip').forEach(el=>{
    el.classList.toggle('active', el.dataset.word===word);
  });

  document.getElementById('vpWord').textContent = data.word;
  document.getElementById('vpPh').textContent   = data.phonetic||'';
  document.getElementById('vpPos').textContent  = data.pos||'';
  document.getElementById('vpLv').textContent   = data.level||'';
  document.getElementById('vpCn').textContent   = data.cn||'';
  document.getElementById('vpEn').textContent   = data.en||'';

  const popup = document.getElementById('vocabPopup');
  popup.classList.add('show');
  popup.style.pointerEvents = 'auto';

  // Position popup near click
  const vw = window.innerWidth, vh = window.innerHeight;
  let x = e.clientX + 12, y = e.clientY + 12;
  if(x + 300 > vw) x = e.clientX - 312;
  if(y + 160 > vh) y = e.clientY - 160;
  popup.style.left = x + 'px';
  popup.style.top  = y + 'px';
}

document.addEventListener('click', e=>{
  if(!e.target.classList.contains('hl') && !e.target.closest('.vocab-popup') && !e.target.closest('.word-chip')){
    document.getElementById('vocabPopup').classList.remove('show');
    document.querySelectorAll('.hl.active').forEach(el=>el.classList.remove('active'));
    document.querySelectorAll('.word-chip.active').forEach(el=>el.classList.remove('active'));
  }
});

// ── Word List (right panel) ────────────────────────
function renderWordList(vocab){
  document.getElementById('wordList').innerHTML = vocab.map(v=>`
    <div class="word-chip" data-word="${esc(v.word)}" onclick="jumpToWord('${esc(v.word)}')">
      <span class="wc-lv" style="background:${LV_COLORS[v.level]||'#4a9eff'}"></span>
      <span class="wc-word">${esc(v.word)}</span>
      <span class="wc-cn">${esc(v.cn||'')}</span>
    </div>`).join('');
}

function jumpToWord(word){
  // Switch to transcript tab
  switchTab('transcript');
  // Find first highlight
  setTimeout(()=>{
    const el = document.querySelector(`.hl[data-word="${word}"]`);
    if(el){
      el.scrollIntoView({behavior:'smooth', block:'center'});
      // Simulate click to show popup
      el.click();
    }
  }, 50);
}

// ── Vocab Cards ────────────────────────────────────
function renderVocab(list){
  document.getElementById('vocabGrid').innerHTML = list.map(v=>`
    <div class="vcard">
      <div class="vhead">
        <span class="vword">${esc(v.word)}</span>
        <span class="vph">${esc(v.phonetic||'')}</span>
        <span class="bpos">${esc(v.pos||'')}</span>
        <span class="blv">${esc(v.level||'')}</span>
      </div>
      <div class="vcn">${esc(v.cn)}</div>
      <div class="ven">${esc(v.en||'')}</div>
      <div class="veg">
        ${hlWord(v.excerpt||v.example||'', v.word)}
        <div class="vegcn">${esc(v.example_cn||'')}</div>
      </div>
    </div>`).join('');
}

function hlWord(text, word){
  if(!word||!text) return esc(text);
  const re = new RegExp(`(${word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return esc(text).replace(re,'<em>$1</em>');
}

// ── Sentences ──────────────────────────────────────
function renderSentences(list){
  document.getElementById('sentenceList').innerHTML = list.map((s,i)=>`
    <div class="scard">
      <div class="snum">${i+1}</div>
      <div class="sen-en">${esc(s.en)}</div>
      <div class="sen-cn">${esc(s.cn)}</div>
      <div class="divider"></div>
      <div class="alabel">句子结构</div>
      <div class="abody">${esc(s.structure||'')}</div>
      <div class="alabel">语法分析</div>
      <div class="abody">${esc(s.analysis||'')}</div>
    </div>`).join('');
}

// ── Topics ─────────────────────────────────────────
function renderTopics(list){
  document.getElementById('topicList').innerHTML = list.map((t,i)=>`
    <div class="tcard">
      <div class="ttitle">
        <span class="tdot" style="background:${COLORS[i%COLORS.length]}"></span>
        ${esc(t.title)}
      </div>
      <div class="tcontent">${esc(t.content)}</div>
      <div class="tkw">🔑 ${esc(t.keywords||'')}</div>
    </div>`).join('');
}

// ── Quiz ───────────────────────────────────────────
function initQuiz(qs){ qState={cur:0,score:0,answered:false,qs}; renderQ(); }
function renderQ(){
  const {cur,qs,score}=qState;
  if(!qs.length) return;
  if(cur>=qs.length){
    const pct=Math.round(score/qs.length*100);
    document.getElementById('quizContainer').innerHTML=`
      <div class="qcard score-panel">
        <div class="score-num">${score}<span style="font-size:28px;color:var(--text2)">/${qs.length}</span></div>
        <div class="score-stars">${pct>=80?'⭐⭐⭐':pct>=60?'⭐⭐':'⭐'}</div>
        <div class="score-sub">答对 ${score} 题（${pct}%）</div>
        <button class="btn-restart" onclick="initQuiz(currentData.quiz)">重新测验</button>
      </div>`;
    document.getElementById('qProgText').textContent='测验完成';
    document.getElementById('qBarF').style.width='100%';
    return;
  }
  const q=qs[cur];
  document.getElementById('qProgText').textContent=`第 ${cur+1} 题 / 共 ${qs.length} 题`;
  document.getElementById('qBarF').style.width=(cur/qs.length*100)+'%';
  document.getElementById('qScoreT').textContent=score>0?`✓ ${score}`:'';
  qState.answered=false;
  document.getElementById('quizContainer').innerHTML=`
    <div class="qcard">
      <div class="qbadge ${q.type==='vocab'?'vocab':'sentence'}">${q.type==='vocab'?'词汇题':'理解题'}</div>
      <div class="qqtext">${esc(q.question)}</div>
      <div class="qopts">${(q.options||[]).map((o,i)=>`
        <div class="qopt" id="opt${i}" onclick="pick(${i})">${esc(o)}</div>`).join('')}
      </div>
      <div class="qexp" id="qexp"></div>
      <button class="qnext" id="qnext" onclick="nextQ()">${cur<qs.length-1?'下一题 →':'查看结果'}</button>
    </div>`;
}
function pick(i){
  if(qState.answered) return;
  qState.answered=true;
  const q=qState.qs[qState.cur], ans=q.answer??0;
  document.querySelectorAll('.qopt').forEach((el,j)=>{
    el.classList.add('disabled');
    if(j===ans) el.classList.add('correct');
    else if(j===i) el.classList.add('wrong');
  });
  if(i===ans) qState.score++;
  const exp=document.getElementById('qexp');
  exp.textContent='解析：'+(q.explanation||'');
  exp.classList.add('show');
  document.getElementById('qnext').classList.add('show');
}
function nextQ(){ qState.cur++; renderQ(); }

// ── Tab Switch ─────────────────────────────────────
function switchTab(id){
  ['transcript','vocab','sentences','topics','quiz'].forEach((t,i)=>{
    document.querySelectorAll('.tab')[i].classList.toggle('active',t===id);
    document.getElementById(t).classList.toggle('active',t===id);
  });
}

// ── Util ───────────────────────────────────────────
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
