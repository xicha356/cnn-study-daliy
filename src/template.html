<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CNN 英语精读</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Condensed:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,500;6..72,700&display=swap');
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#232635;--bg4:#2a2d3e;
  --border:#2e3247;--border2:#3a4060;
  --text:#e8eaf0;--text2:#8b90a7;--text3:#5a5f7a;
  --blue:#4a9eff;--blue-dim:#1a3a5c;--blue2:#2563a8;
  --red:#cc0000;--green:#2ecc71;--amber:#f0a500;
  --coral:#e05a3a;--teal:#1abc9c;--purple:#a78bfa;
  --hl-yellow:rgba(250,200,40,.22);
  --hl-yellow-border:rgba(250,200,40,.7);
  --hl-active:rgba(250,200,40,.45);
  --r:10px;--font:'Segoe UI',system-ui,sans-serif;--mono:'Consolas',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}

/* ── Layout ── */
.layout{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
@media(max-width:800px){.layout{grid-template-columns:1fr}.sidebar{display:none}}

/* ── Sidebar ── */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:1.25rem 0;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:0}
.sidebar-logo{padding:.75rem 1.25rem 1rem;font-size:17px;font-weight:700;letter-spacing:-.5px;border-bottom:1px solid var(--border);margin-bottom:.5rem}
.sidebar-logo span{color:var(--red)}
.sidebar-section{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:.75rem 1.25rem .25rem}
.hist-item{display:flex;align-items:center;padding:.55rem 1.25rem;cursor:pointer;font-size:13px;color:var(--text2);gap:8px;transition:all .15s;border-left:2px solid transparent}
.hist-item:hover{background:var(--bg3);color:var(--text)}
.hist-item.active{background:var(--bg3);color:var(--blue);border-left-color:var(--blue)}
.hist-item .date{font-family:var(--mono);font-size:12px}
.hist-item .dot{width:6px;height:6px;border-radius:50%;background:var(--border2);flex-shrink:0}
.hist-item.active .dot{background:var(--blue)}
.sidebar-nav{margin-top:auto;border-top:1px solid var(--border);padding-top:.5rem}
.nav-item{display:flex;align-items:center;gap:8px;padding:.55rem 1.25rem;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s}
.nav-item:hover{color:var(--text)}
.nav-item.active{color:var(--blue)}

/* ── Main ── */
.main{display:flex;flex-direction:column;min-height:100vh;min-width:0}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.topbar-title{font-size:15px;font-weight:500;flex:1}
.topbar-date{font-size:12px;color:var(--text2);font-family:var(--mono)}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.badge-auto{background:#0d2a1a;color:var(--green);border:1px solid #1a4a2a}
.btn{padding:6px 14px;border:none;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.btn-src{background:var(--bg3);color:var(--text2);font-size:12px}
.btn-src:hover{color:var(--blue)}
.icon-btn{border:1px solid var(--border);background:var(--bg3);color:var(--text2);border-radius:7px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-width:32px;height:30px;padding:0 9px;font-size:12px;transition:all .15s;white-space:nowrap}
.icon-btn:hover:not(:disabled){color:var(--blue);border-color:var(--blue);background:var(--blue-dim)}
.icon-btn:disabled{opacity:.45;cursor:not-allowed}
.icon-btn.playing{color:#fff;border-color:var(--green);background:#0d2a1a}
.icon-btn.loading{color:var(--amber);border-color:var(--amber)}

.content{flex:1;padding:1.5rem;min-width:0}

/* ── Tabs ── */
.tabs{display:flex;gap:4px;margin-bottom:1.5rem;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:4px;max-width:100%}
.tab{flex:1;padding:7px 0;font-size:13px;text-align:center;border-radius:7px;cursor:pointer;color:var(--text2);transition:all .15s}
.tab.active{background:var(--blue);color:#fff}
.section{display:none;min-width:0;max-width:100%}.section.active{display:block}

/* ── Summary ── */
.summary-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:1.5rem;max-width:100%}
.card-label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.summary-text{font-size:15px;line-height:1.85}

/* ── Full Transcript ── */
.transcript-wrap{display:grid;grid-template-columns:1fr 320px;gap:1.25rem;align-items:start;min-width:0}
@media(max-width:900px){.transcript-wrap{grid-template-columns:1fr}}
.transcript-body{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;font-size:14.5px;line-height:2;position:relative;overflow-wrap:anywhere}
.transcript-hint{font-size:12px;color:var(--text2);margin-bottom:1rem;padding:.5rem .75rem;background:var(--bg3);border-radius:6px;border-left:2px solid var(--blue)}
.transcript-wrap>*,.transcript-hint,.transcript-body{min-width:0;max-width:100%}
.control-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:1rem;flex-wrap:wrap}
.filter-group{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:3px}
.filter-btn{border:0;background:transparent;color:var(--text2);font-size:12px;padding:5px 10px;border-radius:6px;cursor:pointer}
.filter-btn.active{background:var(--blue);color:#fff}
.review-btn{border:1px solid var(--border);background:var(--bg3);color:var(--text2);border-radius:999px;padding:3px 9px;font-size:11px;cursor:pointer;white-space:nowrap}
.review-btn.reviewing{border-color:var(--amber);color:var(--amber);background:#2a1a0a}
.review-btn.mastered{border-color:var(--green);color:var(--green);background:#0d2a1a}

/* paragraph */
.para{margin-bottom:1.1rem}
.para:last-child{margin-bottom:0}
.speaker-tag{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:3px;background:#1a2a4a;color:#7eb8f7;letter-spacing:.06em;margin-right:6px;vertical-align:middle;white-space:nowrap}

/* highlight */
.hl{background:var(--hl-yellow);border-bottom:2px solid var(--hl-yellow-border);border-radius:2px;cursor:pointer;transition:background .15s;padding:0 1px}
.hl:hover,.hl.active{background:var(--hl-active)}
.hl.level-考研{border-bottom-color:#f0a500}
.hl.level-六级{border-bottom-color:#4a9eff}
.hl.level-专八,.hl.level-专四{border-bottom-color:#a78bfa}
.hl.level-时事词汇{border-bottom-color:#2ecc71}

/* tooltip popup */
.vocab-popup{position:fixed;z-index:200;max-width:300px;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r);padding:1rem 1.1rem;box-shadow:0 8px 32px rgba(0,0,0,.5);display:none;pointer-events:none}
.vocab-popup.show{display:block}
.vp-head{display:flex;align-items:center;gap:8px}
.vp-main{flex:1;min-width:0}
.vp-word{font-size:17px;font-weight:700;color:#fff}
.vp-ph{font-size:12px;color:var(--text2);font-family:var(--mono);margin-left:6px}
.vp-badges{display:flex;gap:5px;margin:5px 0}
.vp-pos{font-size:11px;padding:1px 7px;border-radius:20px;background:#1a2a4a;color:#7eb8f7;font-weight:500}
.vp-lv{font-size:11px;padding:1px 7px;border-radius:20px;background:#2a1a0a;color:#f0a060;font-weight:500}
.vp-cn{font-size:14px;color:var(--blue);font-weight:500;margin-bottom:3px}
.vp-en{font-size:12px;color:var(--text2);line-height:1.6}

/* word panel (right side) */
.word-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem;position:sticky;top:80px}
.word-panel-title{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.word-list{display:flex;flex-direction:column;gap:4px;max-height:calc(100vh - 200px);overflow-y:auto}
.word-chip{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:7px;cursor:pointer;transition:all .15s;border:1px solid transparent}
.word-chip:hover{background:var(--bg3);border-color:var(--border)}
.word-chip.active{background:var(--blue-dim);border-color:var(--blue)}
.wc-word{font-size:14px;font-weight:500;color:var(--text)}
.wc-cn{font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wc-lv{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.wc-actions{display:flex;gap:4px;margin-left:auto}
.wc-actions .icon-btn{min-width:28px;width:28px;height:26px;padding:0}
.wc-actions .review-btn{font-size:10px;padding:2px 6px}

/* ── Vocab Cards ── */
.vocab-grid{display:flex;flex-direction:column;gap:10px}
.vcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;transition:border .15s}
.vcard:hover{border-color:var(--border2)}
.vhead{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.vhead-main{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;flex:1}
.vactions{display:flex;gap:6px;align-items:center;margin-left:auto;flex-wrap:wrap}
.vword{font-size:18px;font-weight:700;color:#fff}
.vph{font-size:13px;color:var(--text2);font-family:var(--mono)}
.bpos{font-size:11px;padding:2px 8px;border-radius:20px;background:#1a2a4a;color:#7eb8f7;font-weight:500}
.blv{font-size:11px;padding:2px 8px;border-radius:20px;background:#2a1a0a;color:#f0a060;font-weight:500}
.vcn{font-size:14px;color:var(--blue);font-weight:500;margin-bottom:4px}
.ven{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:8px}
.veg{padding:8px 12px;background:var(--bg3);border-left:2px solid var(--blue);border-radius:0 6px 6px 0;font-size:13px;line-height:1.75}
.veg em{color:var(--blue);font-style:normal;font-weight:600}
.vegcn{font-size:12px;color:var(--text2);margin-top:4px}

/* ── Sentences ── */
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:12px}
.shead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
.snum{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;font-size:12px;font-weight:700;margin-bottom:10px}
.shead .snum{margin-bottom:0}
.sen-en{font-size:15px;line-height:1.9;margin-bottom:10px}
.sen-cn{font-size:14px;color:#6ab4f5;line-height:1.75;padding:8px 12px;background:var(--bg3);border-radius:6px;margin-bottom:10px}
.alabel{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.abody{font-size:13px;line-height:1.75;margin-bottom:8px}
.hl2{color:var(--coral);font-weight:600}
.divider{height:1px;background:var(--border);margin:10px 0}

/* ── Topics ── */
.tcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:12px}
.ttitle{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:600;margin-bottom:10px}
.tdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tcontent{font-size:13px;color:var(--text2);line-height:1.85;margin-bottom:8px}
.tkw{font-size:12px;color:var(--blue)}

/* ── Quiz ── */
.qmeta{display:flex;align-items:center;gap:10px;margin-bottom:14px;font-size:12px;color:var(--text2)}
.qbar-w{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.qbar-f{height:100%;background:var(--blue);border-radius:3px;transition:width .3s}
.qcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem}
.qbadge{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;margin-bottom:12px;font-weight:600}
.qbadge.vocab{background:#1a2a4a;color:#7eb8f7}
.qbadge.sentence{background:#2a1a2a;color:#c090f0}
.qqtext{font-size:15px;line-height:1.8;margin-bottom:1.25rem;white-space:pre-line}
.qopts{display:flex;flex-direction:column;gap:8px}
.qopt{padding:11px 16px;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px;background:var(--bg3);transition:all .15s;line-height:1.5}
.qopt:hover:not(.disabled){border-color:var(--blue);color:var(--blue);background:var(--blue-dim)}
.qopt.correct{border-color:var(--green);color:var(--green);background:#0d2a1a}
.qopt.wrong{border-color:var(--coral);color:var(--coral);background:#2a120a}
.qopt.disabled{cursor:default}
.qexp{margin-top:12px;padding:12px 14px;background:var(--bg3);border-radius:8px;font-size:13px;color:var(--text2);display:none;line-height:1.75;border-left:3px solid var(--amber)}
.qexp.show{display:block}
.qnext{margin-top:12px;padding:9px 20px;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;display:none}
.qnext:hover{background:#3a8ef0}
.qnext.show{display:inline-block}
.score-panel{text-align:center;padding:2.5rem}
.score-num{font-size:64px;font-weight:800;color:var(--blue);line-height:1}
.score-sub{font-size:16px;color:var(--text2);margin-top:8px}
.score-stars{font-size:28px;margin:10px 0}
.btn-restart{margin-top:16px;padding:10px 24px;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500}

/* ── Empty ── */
.empty{text-align:center;padding:5rem 1rem;color:var(--text2)}
.empty h3{font-size:18px;color:var(--text);margin-bottom:8px}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

@media(max-width:800px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .topbar{flex-wrap:wrap;gap:8px;padding:.75rem 1rem}
  .topbar-title{flex:1 0 100%}
  .content{padding:1rem}
  .tabs{overflow-x:auto}
  .tab{flex:0 0 auto;min-width:82px;padding:7px 10px}
}
@media(max-width:520px){
  .badge-auto{display:none}
  .btn{padding:6px 10px}
  .topbar-date{font-size:11px}
}

/* ── Editorial redesign ── */
:root{
  --paper:#f3efe4;--paper2:#fbf7ed;--paper3:#e8decd;
  --ink:#14171f;--ink2:#47505a;--muted:#7c7367;
  --line:#d7cbb8;--line2:#b9aa93;
  --red:#c5222b;--red2:#8f1620;--blue:#155d73;--blue-dim:#dcecf0;
  --green:#1d7d55;--amber:#a96612;--coral:#bf4c34;--purple:#6d4ea1;
  --bg:var(--paper);--bg2:var(--paper2);--bg3:#eee5d4;--bg4:#fffaf0;
  --border:var(--line);--border2:var(--line2);
  --text:var(--ink);--text2:var(--ink2);--text3:var(--muted);
  --hl-yellow:rgba(197,34,43,.1);--hl-yellow-border:rgba(197,34,43,.82);
  --hl-active:rgba(197,34,43,.2);
  --r:6px;--font:'IBM Plex Sans Condensed','Avenir Next Condensed','Arial Narrow',sans-serif;
  --serif:'Newsreader',Georgia,serif;--mono:'SFMono-Regular','Consolas',monospace;
}
body{
  background:
    linear-gradient(90deg,rgba(20,23,31,.035) 1px,transparent 1px) 0 0/34px 34px,
    radial-gradient(circle at 85% 12%,rgba(197,34,43,.12),transparent 32%),
    linear-gradient(180deg,#f8f3e8 0%,#eee4d2 100%);
  color:var(--ink);
}
body:before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(rgba(20,23,31,.18) .45px,transparent .45px);
  background-size:4px 4px;opacity:.18;mix-blend-mode:multiply;
}
.layout{position:relative;z-index:1;grid-template-columns:238px minmax(0,1fr)}
.sidebar{
  background:#151922;color:#f5eddf;border-right:0;box-shadow:10px 0 36px rgba(20,23,31,.18);
}
.sidebar-logo{
  font-family:var(--serif);font-size:26px;line-height:1;padding:1.35rem 1.2rem 1.2rem;
  border-bottom:1px solid rgba(255,255,255,.16);letter-spacing:-.03em;
}
.sidebar-logo span{
  display:inline-grid;place-items:center;width:46px;height:34px;margin-right:7px;
  background:var(--red);color:#fff;font-family:var(--font);font-size:16px;letter-spacing:.04em;
}
.sidebar-section{color:#bcae98;padding:1rem 1.2rem .35rem}
.hist-item{padding:.66rem 1.2rem;color:#d8ccb9;border-left:4px solid transparent;font-size:14px}
.hist-item:hover{background:rgba(255,255,255,.07);color:#fff}
.hist-item.active{background:rgba(197,34,43,.18);color:#fff;border-left-color:var(--red)}
.hist-item .dot{background:#695f50}.hist-item.active .dot{background:#fff}
.sidebar-nav{border-top:1px solid rgba(255,255,255,.14)}.nav-item{color:#d8ccb9}.nav-item:hover{color:#fff}
.topbar{
  background:rgba(248,243,232,.88);backdrop-filter:blur(16px);border-bottom:1px solid rgba(20,23,31,.1);
  padding:.9rem clamp(1rem,3vw,2.3rem);box-shadow:0 8px 28px rgba(20,23,31,.07);
}
.topbar-title{font-family:var(--serif);font-size:20px;font-weight:700;letter-spacing:-.025em}
.badge-auto{background:#e3efe6;color:var(--green);border-color:#b6d1bd;border-radius:2px;text-transform:uppercase;letter-spacing:.05em}
.btn,.icon-btn,.qnext,.btn-restart{border-radius:2px;font-family:var(--font);font-weight:700;letter-spacing:.03em}
.btn-src,.icon-btn{background:#171b23;color:#fff;border:1px solid #171b23;box-shadow:3px 3px 0 rgba(197,34,43,.25)}
.btn-src:hover,.icon-btn:hover:not(:disabled){background:var(--red);border-color:var(--red);color:#fff;transform:translate(-1px,-1px)}
.icon-btn:disabled{background:#d9cfbd;color:#938977;border-color:#c7bba8;box-shadow:none}
.icon-btn.playing{background:var(--green);border-color:var(--green);color:#fff}
.icon-btn.loading{background:var(--amber);border-color:var(--amber);color:#fff}
.content{padding:clamp(1rem,3vw,2.5rem);max-width:1360px;width:100%;margin:0 auto}
.study-hero{
  position:relative;overflow:hidden;background:#151922;color:#fff;border:1px solid #151922;
  border-radius:2px;padding:clamp(1.4rem,4vw,3rem);margin-bottom:1.4rem;
  box-shadow:12px 12px 0 rgba(197,34,43,.12);
}
.study-hero:before{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 0 56%,rgba(197,34,43,.26) 56% 58%,transparent 58%),radial-gradient(circle at 82% 25%,rgba(255,255,255,.12),transparent 28%);pointer-events:none}
.kicker{position:relative;color:#f3c3b0;font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;margin-bottom:.55rem}
.hero-title{position:relative;font-family:var(--serif);font-size:clamp(36px,7vw,78px);line-height:.94;letter-spacing:-.055em;max-width:900px}
.hero-meta{position:relative;display:flex;gap:8px;flex-wrap:wrap;margin-top:1rem;color:#d7cbb8;font-size:13px}
.meta-pill{border:1px solid rgba(255,255,255,.2);padding:4px 9px;background:rgba(255,255,255,.06)}
.summary-card{
  background:var(--paper2);border:1px solid var(--line);border-left:8px solid var(--red);
  border-radius:2px;padding:1.15rem 1.25rem;box-shadow:0 14px 34px rgba(20,23,31,.08);
}
.card-label,.word-panel-title,.alabel{color:var(--red2);font-weight:700;letter-spacing:.14em}
.summary-text{font-family:var(--serif);font-size:18px;line-height:1.75;color:#252a32}
.tabs{
  background:transparent;border:0;border-bottom:2px solid #171b23;border-radius:0;padding:0;gap:0;margin-bottom:1.35rem;
}
.tab{
  flex:0 0 auto;padding:9px 16px;border:1px solid var(--line);border-bottom:0;border-radius:2px 2px 0 0;
  background:#e8decd;color:#4b443b;font-weight:700;margin-right:5px;
}
.tab:hover{background:#f6efe2;color:#171b23}.tab.active{background:#171b23;color:#fff}
.transcript-wrap{grid-template-columns:minmax(0,1fr) 310px;gap:1.1rem}

<body>
<div class="layout">

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo"><span>CNN</span> 英语精读</div>
  <div class="sidebar-section">历史记录</div>
  <div id="histList"><!-- HISTORY_ITEMS --></div>
  <div class="sidebar-nav">
    <div class="nav-item" onclick="window.open('https://transcripts.cnn.com','_blank')">🔗 CNN Transcripts</div>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbarTitle">CNN This Morning</div>
    <span class="topbar-date" id="topbarDate"></span>
    <span class="badge badge-auto">⚡ 每日自动更新</span>
    <button class="btn btn-src" id="srcBtn" onclick="openSource()">查看原文 →</button>
  </div>

  <div class="content">

    <section class="study-hero">
      <div class="kicker">Daily News Lab</div>
      <h1 class="hero-title">CNN 英语精读</h1>
      <div class="hero-meta">
        <span class="meta-pill" id="heroDate">今日材料</span>
        <span class="meta-pill">美式男音</span>
        <span class="meta-pill">词汇复习</span>
        <span class="meta-pill">长难句朗读</span>
      </div>
    </section>

    <!-- Summary -->
    <div class="summary-card">
      <div class="card-label">📰 内容摘要</div>
      <div class="summary-text" id="summaryText">加载中...</div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('transcript')">📝 全文稿</div>
      <div class="tab" onclick="switchTab('vocab')">📚 词汇</div>
      <div class="tab" onclick="switchTab('sentences')">🔍 难句</div>
      <div class="tab" onclick="switchTab('topics')">🌐 背景</div>
      <div class="tab" onclick="switchTab('quiz')">✅ 测验</div>
    </div>

    <!-- Transcript Tab -->
    <div id="transcript" class="section active">
      <div class="transcript-wrap">
        <div>
          <div class="transcript-hint">💡 点击 <span style="background:var(--hl-yellow);padding:0 4px;border-radius:2px;border-bottom:2px solid var(--hl-yellow-border)">高亮词汇</span> 查看注释并播放发音 · 颜色代表难度：<span style="color:#f0a500">■</span>考研 <span style="color:#4a9eff">■</span>六级 <span style="color:#a78bfa">■</span>专四/八 <span style="color:#2ecc71">■</span>时事</div>
          <div class="transcript-body" id="transcriptBody"></div>
        </div>
        <div>
          <div class="word-panel">
            <div class="word-panel-title">词汇索引</div>
            <div class="word-list" id="wordList"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Vocab Tab -->
    <div id="vocab" class="section">
      <div class="control-row">
        <div class="card-label" style="margin-bottom:0">词汇复习</div>
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all" onclick="setVocabFilter('all')">全部</button>
          <button class="filter-btn" data-filter="reviewing" onclick="setVocabFilter('reviewing')">待复习</button>
          <button class="filter-btn" data-filter="mastered" onclick="setVocabFilter('mastered')">已掌握</button>
        </div>
      </div>
      <div class="vocab-grid" id="vocabGrid"></div>
    </div>

    <!-- Sentences Tab -->
    <div id="sentences" class="section">
      <div id="sentenceList"></div>
    </div>

    <!-- Topics Tab -->
    <div id="topics" class="section">
      <div id="topicList"></div>
    </div>

    <!-- Quiz Tab -->
    <div id="quiz" class="section">
      <div class="qmeta">
        <span id="qProgText">第 1 题 / 共 6 题</span>
        <div class="qbar-w"><div class="qbar-f" id="qBarF" style="width:0%"></div></div>
        <span id="qScoreT" style="color:var(--green)"></span>
      </div>
      <div id="quizContainer"></div>
    </div>

  </div>
</div>
</div>

<!-- Vocab Popup Tooltip -->
<div class="vocab-popup" id="vocabPopup">
  <div class="vp-head">
    <div class="vp-main"><span class="vp-word" id="vpWord"></span><span class="vp-ph" id="vpPh"></span></div>
    <button class="icon-btn" id="vpPlay" onclick="playCurrentPopupWord(event)" title="播放单词发音">▶</button>
  </div>
  <div class="vp-badges"><span class="vp-pos" id="vpPos"></span><span class="vp-lv" id="vpLv"></span></div>
  <div class="vp-cn" id="vpCn"></div>
  <div class="vp-en" id="vpEn"></div>
</div>

<button class="mobile-word-fab" onclick="toggleMobileWords(true)" aria-label="打开词汇索引">词</button>
<div class="mobile-word-scrim" id="mobileWordScrim" onclick="toggleMobileWords(false)"></div>
<aside class="mobile-word-sheet" id="mobileWordSheet">
  <div class="mobile-word-head">
    <strong>词汇索引</strong>
    <button class="icon-btn" onclick="toggleMobileWords(false)">收起</button>
  </div>
  <div class="word-list" id="mobileWordList"></div>
</aside>
<div class="toast" id="toast"></div>

<script>
/* ALL_DATA_PLACEHOLDER */

// ── State ──────────────────────────────────────────
let currentData = null;
let currentPopupWord = '';
let vocabFilter = 'all';
let qState = { cur:0, score:0, answered:false, qs:[] };
let audioPlayer = new Audio();
let activeAudioBtn = null;
const COLORS = ['#4a9eff','#e05a3a','#1abc9c','#f0a500'];
const LV_COLORS = {'考研':'#f0a500','六级':'#4a9eff','专四':'#a78bfa','专八':'#a78bfa','时事词汇':'#2ecc71'};
const REVIEW_KEY_PREFIX = 'cnn_vocab_status:';
let toastTimer = null;

audioPlayer.addEventListener('ended', clearAudioButton);
audioPlayer.addEventListener('error', clearAudioButton);

// ── Init ───────────────────────────────────────────
(function init(){
  const latest = '<!-- LATEST_DATE -->';
  if(ALL_DATA[latest]) loadDate(latest);
  // highlight active hist item
  document.querySelector(`[data-date="${latest}"]`)?.classList.add('active');
})();

function openSource(){
  if(currentData?.source_url) window.open(currentData.source_url,'_blank');
}

// ── Load Date ──────────────────────────────────────
function loadDate(date){
  if(!ALL_DATA[date]) return;
  document.querySelectorAll('.hist-item').forEach(b=>
    b.classList.toggle('active', b.dataset.date===date));
  renderAll(ALL_DATA[date]);
}

// ── Render All ─────────────────────────────────────
function renderAll(data){
  currentData = data;
  document.getElementById('summaryText').textContent = data.summary||'';
  document.getElementById('topbarDate').textContent = data.date||'';
  document.getElementById('heroDate').textContent = data.date||'今日材料';
  document.getElementById('topbarTitle').textContent =
    'CNN This Morning · ' + (data.date||'');

  renderTranscript(data.paragraphs||[], data.vocabulary||[]);
  renderWordList(data.vocabulary||[]);
  renderVocab(data.vocabulary||[]);
  renderSentences(data.sentences||[]);
  renderTopics(data.topics||[]);
  initQuiz(data.quiz||[]);
  switchTab('transcript');
}

// ── Transcript with Highlights ─────────────────────
function renderTranscript(paragraphs, vocab){
  const body = document.getElementById('transcriptBody');
  if(!paragraphs.length){
    body.innerHTML = '<div style="color:var(--text2)">暂无全文稿数据，请重新运行 Actions 生成。</div>';
    return;
  }

  // Build word→vocab map (longest match first)
  const vocabMap = {};
  vocab.forEach(v=>{ vocabMap[v.word.toLowerCase()] = v; });
  const sortedWords = Object.keys(vocabMap).sort((a,b)=>b.length-a.length);

  body.innerHTML = paragraphs.map((p,pi)=>{
    const tag = `<span class="speaker-tag">${esc(p.speaker||'ANCHOR')}</span>`;
    const highlighted = highlightWords(p.text, sortedWords, vocabMap);
    return `<div class="para">${tag}${highlighted}</div>`;
  }).join('');
}

function highlightWords(text, sortedWords, vocabMap){
  // Mark positions to highlight
  // Work on original text to find positions, then rebuild
  const positions = []; // {start, end, word, vocab}

  const lc = text.toLowerCase();
  sortedWords.forEach(word=>{
    // Find all occurrences
    let idx = 0;
    while((idx = lc.indexOf(word, idx)) !== -1){
      // Check it's a word boundary (simple check)
      const before = idx === 0 || !/[a-z]/i.test(text[idx-1]);
      const after  = idx+word.length >= text.length || !/[a-z]/i.test(text[idx+word.length]);
      if(before && after){
        // Check not already covered
        const overlaps = positions.some(p=> idx < p.end && idx+word.length > p.start);
        if(!overlaps){
          positions.push({start:idx, end:idx+word.length, word, vocab:vocabMap[word]});
        }
      }
      idx += word.length;
    }
  });

  if(!positions.length) return esc(text);

  // Sort by start position
  positions.sort((a,b)=>a.start-b.start);

  // Build HTML
  let html = '';
  let last = 0;
  positions.forEach(p=>{
    html += esc(text.slice(last, p.start));
    const lv = p.vocab.level||'';
    const lvClass = `level-${lv.replace(/[\/\s]/g,'')}`;
    html += `<span class="hl ${lvClass}" data-word="${attr(p.vocab.word)}" onclick="showVocabPopup(event,decodeURIComponent('${token(p.vocab.word)}'))">${esc(text.slice(p.start,p.end))}</span>`;
    last = p.end;
  });
  html += esc(text.slice(last));
  return html;
}

// ── Vocab Popup ────────────────────────────────────
let popupTimeout = null;
function hideVocabPopup(){
  clearTimeout(popupTimeout);
  document.getElementById('vocabPopup').classList.remove('show');
  document.querySelectorAll('.hl.active').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.word-chip.active').forEach(el=>el.classList.remove('active'));
}

function showVocabPopup(e, word){
  e.stopPropagation();
  clearTimeout(popupTimeout);
  const data = currentData?.vocabulary?.find(v=>v.word===word);
  if(!data) return;
  currentPopupWord = word;

  // Highlight all instances of this word
  document.querySelectorAll('.hl').forEach(el=>{
    el.classList.toggle('active', el.dataset.word===word);
  });
  // Highlight word chip
  document.querySelectorAll('.word-chip').forEach(el=>{
    el.classList.toggle('active', el.dataset.word===word);
  });

  document.getElementById('vpWord').textContent = data.word;
  document.getElementById('vpPh').textContent   = data.phonetic||'';
  document.getElementById('vpPos').textContent  = data.pos||'';
  document.getElementById('vpLv').textContent   = data.level||'';
  document.getElementById('vpCn').textContent   = data.cn||'';
  document.getElementById('vpEn').textContent   = data.en||'';
  const playBtn = document.getElementById('vpPlay');
  playBtn.disabled = !data.audio_url;
  playBtn.title = data.audio_url ? '播放单词发音' : '暂无预生成音频';

  const popup = document.getElementById('vocabPopup');
  popup.classList.add('show');
  popupTimeout = setTimeout(hideVocabPopup, 5000);

  playVocabAudio(data, playBtn);
}

document.addEventListener('click', e=>{
  if(!e.target.classList.contains('hl') && !e.target.closest('.vocab-popup') && !e.target.closest('.word-chip')){
    hideVocabPopup();
  }
});

// ── Word List (right panel) ────────────────────────
function renderWordList(vocab){
  const html = vocab.map(v=>`
    <div class="word-chip" data-word="${attr(v.word)}" onclick="jumpToWord(decodeURIComponent('${token(v.word)}'))">
      <span class="wc-lv" style="background:${LV_COLORS[v.level]||'#4a9eff'}"></span>
      <span class="wc-word">${esc(v.word)}</span>
      <span class="wc-cn">${esc(v.cn||'')}</span>
      <span class="wc-actions">
        <button class="icon-btn" onclick="playWordFromButton(event,decodeURIComponent('${token(v.word)}'))" ${v.audio_url?'':'disabled'} title="${v.audio_url?'播放单词发音':'暂无预生成音频'}">▶</button>
        ${reviewButton(v.word)}
      </span>
    </div>`).join('');
  document.getElementById('wordList').innerHTML = html;
  document.getElementById('mobileWordList').innerHTML = html;
}

function jumpToWord(word){
  // Switch to transcript tab
  switchTab('transcript');
  toggleMobileWords(false);
  // Find first highlight
  setTimeout(()=>{
    const el = Array.from(document.querySelectorAll('.hl')).find(node=>node.dataset.word===word);
    if(el){
      el.scrollIntoView({behavior:'smooth', block:'center'});
      // Simulate click to show popup
      el.click();
    }
  }, 50);
}

// ── Vocab Cards ────────────────────────────────────
function renderVocab(list){
  const filtered = list.filter(v=>{
    const status = getVocabStatus(v.word);
    return vocabFilter === 'all' || status === vocabFilter;
  });
  const grid = document.getElementById('vocabGrid');
  if(!filtered.length){
    grid.innerHTML = '<div class="empty"><h3>暂无匹配词汇</h3><p>切换筛选或继续学习后再回来看看。</p></div>';
    return;
  }
  grid.innerHTML = filtered.map(v=>`
    <div class="vcard">
      <div class="vhead">
        <div class="vhead-main">
          <span class="vword">${esc(v.word)}</span>
          <span class="vph">${esc(v.phonetic||'')}</span>
          <span class="bpos">${esc(v.pos||'')}</span>
          <span class="blv">${esc(v.level||'')}</span>
        </div>
        <div class="vactions">
          <button class="icon-btn" onclick="playWordFromButton(event,decodeURIComponent('${token(v.word)}'))" ${v.audio_url?'':'disabled'} title="${v.audio_url?'播放单词发音':'暂无预生成音频'}">▶ 发音</button>
          ${reviewButton(v.word)}
        </div>
      </div>
      <div class="vcn">${esc(v.cn)}</div>
      <div class="ven">${esc(v.en||'')}</div>
      <div class="veg">
        ${hlWord(v.excerpt||v.example||'', v.word)}
        <div class="vegcn">${esc(v.example_cn||'')}</div>
      </div>
    </div>`).join('');
}

function hlWord(text, word){
  if(!word||!text) return esc(text);
  const re = new RegExp(`(${word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return esc(text).replace(re,'<em>$1</em>');
}

// ── Sentences ──────────────────────────────────────
function renderSentences(list){
  document.getElementById('sentenceList').innerHTML = list.map((s,i)=>`
    <div class="scard">
      <div class="shead">
        <div class="snum">${i+1}</div>
        <button class="icon-btn" onclick="playSentenceTts(event,${i})" ${s.audio_url?'':'disabled'} title="${s.audio_url?'朗读长难句':'音频将在下次生成后可用'}">▶ 朗读</button>
      </div>
      <div class="sen-en">${esc(s.en)}</div>
      <div class="sen-cn">${esc(s.cn)}</div>
      <div class="divider"></div>
      <div class="alabel">句子结构</div>
      <div class="abody">${esc(s.structure||'')}</div>
      <div class="alabel">语法分析</div>
      <div class="abody">${esc(s.analysis||'')}</div>
    </div>`).join('');
}

// ── Topics ─────────────────────────────────────────
function renderTopics(list){
  document.getElementById('topicList').innerHTML = list.map((t,i)=>`
    <div class="tcard">
      <div class="ttitle">
        <span class="tdot" style="background:${COLORS[i%COLORS.length]}"></span>
        ${esc(t.title)}
      </div>
      <div class="tcontent">${esc(t.content)}</div>
      <div class="tkw">🔑 ${esc(t.keywords||'')}</div>
    </div>`).join('');
}

// ── Quiz ───────────────────────────────────────────
function initQuiz(qs){ qState={cur:0,score:0,answered:false,qs}; renderQ(); }
function renderQ(){
  const {cur,qs,score}=qState;
  if(!qs.length) return;
  if(cur>=qs.length){
    const pct=Math.round(score/qs.length*100);
    document.getElementById('quizContainer').innerHTML=`
      <div class="qcard score-panel">
        <div class="score-num">${score}<span style="font-size:28px;color:var(--text2)">/${qs.length}</span></div>
        <div class="score-stars">${pct>=80?'⭐⭐⭐':pct>=60?'⭐⭐':'⭐'}</div>
        <div class="score-sub">答对 ${score} 题（${pct}%）</div>
        <button class="btn-restart" onclick="initQuiz(currentData.quiz)">重新测验</button>
      </div>`;
    document.getElementById('qProgText').textContent='测验完成';
    document.getElementById('qBarF').style.width='100%';
    return;
  }
  const q=qs[cur];
  document.getElementById('qProgText').textContent=`第 ${cur+1} 题 / 共 ${qs.length} 题`;
  document.getElementById('qBarF').style.width=(cur/qs.length*100)+'%';
  document.getElementById('qScoreT').textContent=score>0?`✓ ${score}`:'';
  qState.answered=false;
  document.getElementById('quizContainer').innerHTML=`
    <div class="qcard">
      <div class="qbadge ${q.type==='vocab'?'vocab':'sentence'}">${q.type==='vocab'?'词汇题':'理解题'}</div>
      <div class="qqtext">${esc(q.question)}</div>
      <div class="qopts">${(q.options||[]).map((o,i)=>`
        <div class="qopt" id="opt${i}" onclick="pick(${i})">${esc(o)}</div>`).join('')}
      </div>
      <div class="qexp" id="qexp"></div>
      <button class="qnext" id="qnext" onclick="nextQ()">${cur<qs.length-1?'下一题 →':'查看结果'}</button>
    </div>`;
}
function pick(i){
  if(qState.answered) return;
  qState.answered=true;
  const q=qState.qs[qState.cur], ans=q.answer??0;
  document.querySelectorAll('.qopt').forEach((el,j)=>{
    el.classList.add('disabled');
    if(j===ans) el.classList.add('correct');
    else if(j===i) el.classList.add('wrong');
  });
  if(i===ans) qState.score++;
  else markMissedQuizWord(q);
  const exp=document.getElementById('qexp');
  exp.textContent='解析：'+(q.explanation||'');
  exp.classList.add('show');
  document.getElementById('qnext').classList.add('show');
}
function nextQ(){ qState.cur++; renderQ(); }

// ── Audio Playback ────────────────────────────────
function playCurrentPopupWord(e){
  e.stopPropagation();
  const data = currentData?.vocabulary?.find(v=>v.word===currentPopupWord);
  if(data) playVocabAudio(data, e.currentTarget);
}

function playWordFromButton(e, word){
  e.stopPropagation();
  const data = currentData?.vocabulary?.find(v=>v.word===word);
  if(data) playVocabAudio(data, e.currentTarget);
}

async function playVocabAudio(vocab, btn){
  if(!vocab?.audio_url) return;
  await playAudioUrl(vocab.audio_url, btn);
}

async function playAudioUrl(url, btn){
  try{
    setAudioButton(btn, 'loading');
    audioPlayer.pause();
    audioPlayer.currentTime = 0;
    audioPlayer.src = url;
    await audioPlayer.play();
    setAudioButton(btn, 'playing');
  }catch(err){
    showToast('播放失败：请检查音频文件或浏览器权限');
    clearAudioButton();
  }
}

function setAudioButton(btn, state){
  clearAudioButton();
  if(!btn) return;
  activeAudioBtn = btn;
  if(!btn.dataset.audioLabel) btn.dataset.audioLabel = btn.textContent;
  btn.classList.add(state);
  btn.textContent = state === 'loading' ? '…' : '播放中';
}

function clearAudioButton(){
  if(!activeAudioBtn) return;
  activeAudioBtn.classList.remove('loading','playing');
  activeAudioBtn.textContent = activeAudioBtn.dataset.audioLabel || '▶';
  activeAudioBtn = null;
}

// ── Sentence Audio ────────────────────────────────
async function playSentenceTts(e, index){
  e.stopPropagation();
  const btn = e.currentTarget;
  const sentence = currentData?.sentences?.[index];
  if(!sentence) return;
  if(!sentence.audio_url){
    showToast('这句音频还没生成，下次 Actions 运行后会自动补齐');
    return;
  }
  await playAudioUrl(sentence.audio_url, btn);
}

function toggleMobileWords(open){
  document.getElementById('mobileWordSheet').classList.toggle('show', !!open);
  document.getElementById('mobileWordScrim').classList.toggle('show', !!open);
}

function showToast(text){
  const el = document.getElementById('toast');
  if(!el) return;
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2600);
}

// ── Review State ──────────────────────────────────
function setVocabFilter(filter){
  vocabFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(btn=>btn.classList.toggle('active', btn.dataset.filter===filter));
  renderVocab(currentData?.vocabulary || []);
}

function getVocabStatus(word){
  try{ return localStorage.getItem(REVIEW_KEY_PREFIX + word) || ''; }
  catch(e){ return ''; }
}

function setVocabStatus(word, status, rerender=true){
  try{
    const key = REVIEW_KEY_PREFIX + word;
    if(status) localStorage.setItem(key, status);
    else localStorage.removeItem(key);
  }catch(e){}
  if(rerender) renderReviewViews();
}

function cycleVocabStatus(e, word){
  e.stopPropagation();
  const cur = getVocabStatus(word);
  const next = cur === 'reviewing' ? 'mastered' : cur === 'mastered' ? '' : 'reviewing';
  setVocabStatus(word, next);
}

function reviewButton(word){
  const status = getVocabStatus(word);
  const label = status === 'reviewing' ? '待复习' : status === 'mastered' ? '已掌握' : '标记';
  const cls = status ? ` ${status}` : '';
  return `<button class="review-btn${cls}" onclick="cycleVocabStatus(event,decodeURIComponent('${token(word)}'))">${label}</button>`;
}

function renderReviewViews(){
  renderWordList(currentData?.vocabulary || []);
  renderVocab(currentData?.vocabulary || []);
}

function markMissedQuizWord(q){
  if(q.type !== 'vocab' || !currentData?.vocabulary) return;
  const haystack = `${q.question||''} ${(q.options||[]).join(' ')} ${q.explanation||''}`.toLowerCase();
  const match = currentData.vocabulary.find(v=>haystack.includes(String(v.word||'').toLowerCase()));
  if(match && getVocabStatus(match.word) !== 'mastered') setVocabStatus(match.word, 'reviewing', false);
  renderReviewViews();
}

// ── Tab Switch ─────────────────────────────────────
function switchTab(id){
  ['transcript','vocab','sentences','topics','quiz'].forEach((t,i)=>{
    document.querySelectorAll('.tab')[i].classList.toggle('active',t===id);
    document.getElementById(t).classList.toggle('active',t===id);
  });
}

// ── Util ───────────────────────────────────────────
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
function attr(s){
  return esc(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function token(s){
  return encodeURIComponent(String(s||''));
}
</script>
